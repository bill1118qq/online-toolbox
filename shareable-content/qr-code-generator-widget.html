<body>
  <div class="widget-container">
    <!-- Brand Bar -->
    <div class="brand-bar">
      Powered by <a href="https://eitools.cn" target="_blank" rel="noopener">EITools.cn</a> - 100+ 免费在线工具
    </div>

    <!-- Hero -->
    <div class="hero-text">
      <h1>二维码生成器</h1>
      <p>输入文字或链接，生成二维码</p>
    </div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="qr-input" placeholder="输入文字或链接，例如：https://example.com"></textarea>
    </div>

    <!-- Options -->
    <div class="options-row">
      <div class="option-group">
        <label for="qr-size">尺寸</label>
        <select id="qr-size">
          <option value="200">200 x 200</option>
          <option value="300" selected>300 x 300</option>
          <option value="400">400 x 400</option>
        </select>
      </div>
      <div class="option-group">
        <label for="qr-color">颜色</label>
        <select id="qr-color">
          <option value="#1a1a2e">黑色</option>
          <option value="#4361ee">蓝色</option>
          <option value="#2f9e44">绿色</option>
          <option value="#e03131">红色</option>
          <option value="#1a1a2e" disabled>自定义（完整版）</option>
        </select>
      </div>
    </div>

    <!-- Buttons -->
    <div class="btn-group">
      <button class="gen-btn" id="generate-btn">生成二维码</button>
      <button class="dl-btn" id="download-btn" disabled>下载 PNG</button>
    </div>

    <!-- Error -->
    <div id="error-msg" class="error-msg"></div>

    <!-- QR Display -->
    <div id="qr-display" class="qr-display">
      <canvas id="qr-canvas"></canvas>
      <div class="qr-hint">右键图片另存为，或点击上方"下载 PNG"按钮</div>
    </div>

    <!-- Upsell -->
    <a href="https://eitools.cn/src/tools/qrcode.html" target="_blank" rel="noopener" class="upsell-banner">
      <h3>More Free Tools at EITools.cn</h3>
      <p>条形码生成、图片文字识别、颜色选择器等 100+ 免费工具</p>
      <div class="upsell-arrow">前往 EITools.cn &rarr;</div>
    </a>

    <!-- Footer -->
    <div class="footer-link">
      <a href="https://eitools.cn" target="_blank" rel="noopener">探索 100+ 免费在线工具 &rarr;</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    (function () {
      'use strict';

      function showToast(msg) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(function () {
          toast.classList.remove('show');
        }, 2000);
      }

      var input = document.getElementById('qr-input');
      var canvas = document.getElementById('qr-canvas');
      var display = document.getElementById('qr-display');
      var genBtn = document.getElementById('generate-btn');
      var dlBtn = document.getElementById('download-btn');
      var sizeSelect = document.getElementById('qr-size');
      var colorSelect = document.getElementById('qr-color');
      var errorMsg = document.getElementById('error-msg');

      function hideError() {
        errorMsg.classList.remove('visible');
        errorMsg.textContent = '';
      }

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
      }

      function generateQR() {
        var text = input.value.trim();
        hideError();

        if (!text) {
          showError('请输入文字或链接');
          showToast('请输入内容');
          return;
        }

        if (text.length > 2953) {
          showError('内容过长，请缩短至 2953 个字符以内');
          return;
        }

        try {
          var qr = qrcode(0, 'M');
          qr.addData(text);
          qr.make();

          var moduleCount = qr.getModuleCount();
          var targetSize = parseInt(sizeSelect.value, 10);
          var cellSize = Math.max(2, Math.floor(targetSize / moduleCount));
          var actualSize = moduleCount * cellSize;
          var fgColor = colorSelect.value;

          canvas.width = actualSize;
          canvas.height = actualSize;

          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, actualSize, actualSize);

          ctx.fillStyle = fgColor;
          for (var row = 0; row < moduleCount; row++) {
            for (var col = 0; col < moduleCount; col++) {
              if (qr.isDark(row, col)) {
                ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
              }
            }
          }

          display.classList.add('visible');
          dlBtn.disabled = false;
          showToast('二维码生成成功');
        } catch (err) {
          showError('生成失败：' + err.message);
          showToast('生成失败');
        }
      }

      function downloadQR() {
        if (!display.classList.contains('visible')) {
          showToast('请先生成二维码');
          return;
        }
        var link = document.createElement('a');
        link.download = 'qrcode-eitools.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('下载成功');
      }

      genBtn.addEventListener('click', generateQR);
      dlBtn.addEventListener('click', downloadQR);

      // Enter key to generate
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          generateQR();
        }
      });
    })();
  </script>
</body>
