<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>子网计算器</h1>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
      <input type="text" id="ipInput" placeholder="IP 地址，如 192.168.1.0" style="flex: 1; min-width: 200px;">
      <select id="cidr" style="padding: 10px; border-radius: 8px; border: 2px solid #e0e0e0; min-width: 100px;">
        <script>for (let i = 0; i <= 32; i++) document.write(`<option value="${i}">${i}</option>`);</script>
      </select>
      <button class="btn btn-primary" onclick="calculate()">计算</button>
    </div>

    <div style="background: white; padding: 20px; border-radius: 12px;">
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px;" id="results">
      </div>
    </div>
  </div>

  <script>
    function showToast(msg) {
      var t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;z-index:99999;font-size:0.9rem;opacity:0;transition:opacity 0.3s;';
      document.body.appendChild(t);
      requestAnimationFrame(function(){ t.style.opacity = '1'; });
      setTimeout(function(){ t.style.opacity = '0'; setTimeout(function(){ t.remove(); }, 300); }, 2000);
    }
    function calculate() {
      const ip = document.getElementById('ipInput').value.trim();
      const cidr = parseInt(document.getElementById('cidr').value);

      if (!ip) { showToast('请输入 IP 地址'); return; }
      const parts = ip.split('.').map(Number);
      if (parts.length !== 4 || parts.some(p => isNaN(p) || p < 0 || p > 255)) {
        showToast('IP 地址格式不正确'); return;
      }

      const ipNum = (parts[0] << 24 | parts[1] << 16 | parts[2] << 8 | parts[3]) >>> 0;
      const mask = cidr === 0 ? 0 : (~0 << (32 - cidr)) >>> 0;
      const network = (ipNum & mask) >>> 0;
      const broadcast = (network | ~mask) >>> 0;
      const firstHost = cidr >= 31 ? network : (network + 1) >>> 0;
      const lastHost = cidr >= 31 ? broadcast : (broadcast - 1) >>> 0;
      const totalHosts = Math.pow(2, 32 - cidr);
      const usableHosts = cidr >= 31 ? (cidr === 32 ? 1 : 2) : totalHosts - 2;

      const toIp = n => [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
      const maskIp = toIp(mask);
      const wildcard = toIp((~mask) >>> 0);
      const isPrivate = (parts[0] === 10) || (parts[0] === 172 && parts[1] >= 16 && parts[1] <= 31) || (parts[0] === 192 && parts[1] === 168);

      const items = [
        ['网络地址', toIp(network)],
        ['广播地址', toIp(broadcast)],
        ['子网掩码', maskIp],
        ['CIDR 表示法', `${toIp(network)}/${cidr}`],
        ['反掩码 (Wildcard)', wildcard],
        ['第一可用 IP', toIp(firstHost)],
        ['最后可用 IP', toIp(lastHost)],
        ['可用主机数', usableHosts.toLocaleString()],
        ['总 IP 数', totalHosts.toLocaleString()],
        ['IP 类别', parts[0] < 128 ? 'A 类' : parts[0] < 192 ? 'B 类' : parts[0] < 224 ? 'C 类' : parts[0] < 240 ? 'D 类 (组播)' : 'E 类 (保留)'],
        ['是否私有 IP', isPrivate ? '是' : '否'],
        ['二进制表示', parts.map(p => p.toString(2).padStart(8, '0')).join('.')]
      ];

      document.getElementById('results').innerHTML = items.map(([label, value]) =>
        `<div style="background:#f8f9fa;padding:12px 16px;border-radius:8px;"><div style="font-size:0.8rem;color:#999;margin-bottom:4px;">${label}</div><div style="font-weight:600;font-family:monospace;word-break:break-all;">${value}</div></div>`
      ).join('');
    }

    document.getElementById('ipInput').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
    calculate();
  </script>
  <div class="related-tools" style="margin-top:32px;padding:20px;background:#f8f9fa;border-radius:12px;">

      <a href="ip-converter.html" style="padding:6px 14px;background:white;border:1px solid #e0e0e0;border-radius:20px;text-decoration:none;color:#4361ee;font-size:0.85rem;">IP 转换</a>
    </div>
  </div>

</body>
</html>
