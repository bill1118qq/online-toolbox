<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 编解码 - 在线工具箱</title>
  <meta name="description" content="免费在线 Base64 编解码工具，支持文本与 Base64 互相转换。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>Base64 编解码</h1>
    </div>

    <textarea id="inputArea" placeholder="输入需要编码或解码的文本"></textarea>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="encodeBase64()">编码 (Text &rarr; Base64)</button>
      <button class="btn btn-primary" onclick="decodeBase64()">解码 (Base64 &rarr; Text)</button>
      <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>

    <div id="resultBox" class="result-box"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const input = document.getElementById('inputArea');
    const resultBox = document.getElementById('resultBox');

    function encodeBase64() {
      try {
        const result = btoa(unescape(encodeURIComponent(input.value)));
        resultBox.textContent = result;
        resultBox.style.borderColor = '#4caf50';
        showToast('编码成功');
      } catch (e) {
        resultBox.textContent = '编码错误: ' + e.message;
        resultBox.style.borderColor = '#f44336';
      }
    }

    function decodeBase64() {
      try {
        const result = decodeURIComponent(escape(atob(input.value.trim())));
        resultBox.textContent = result;
        resultBox.style.borderColor = '#4caf50';
        showToast('解码成功');
      } catch (e) {
        resultBox.textContent = '解码错误: 请检查输入是否为有效的 Base64 字符串';
        resultBox.style.borderColor = '#f44336';
      }
    }

    function copyResult() {
      if (!resultBox.textContent) {
        showToast('没有内容可复制');
        return;
      }
      navigator.clipboard.writeText(resultBox.textContent).then(() => {
        showToast('已复制到剪贴板');
      });
    }

    function clearAll() {
      input.value = '';
      resultBox.textContent = '';
      resultBox.style.borderColor = '#e0e0e0';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
