<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 编解码 - 在线工具箱</title>
  <meta name="description" content="在线Base64编解码工具：文本Base64编码解码、图片转Base64、Base64转图片。支持文件拖拽上传。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Base64 编解码 - 在线工具箱">
  <meta property="og:description" content="文本/图片Base64编码解码，支持文件上传。">
  <meta property="og:url" content="https://eitools.cn/src/tools/base64.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/base64.html">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {"@type": "Question", "name": "什么是Base64编码？", "acceptedAnswer": {"@type": "Answer", "text": "Base64是一种将二进制数据转换为64个可打印字符的编码方式，常用于在文本协议中传输二进制数据，如电子邮件附件和图片内嵌。"}},
      {"@type": "Question", "name": "Base64编码后数据会变大吗？", "acceptedAnswer": {"@type": "Answer", "text": "是的，Base64编码后的数据大约比原始数据大33%。因为每3个字节的原始数据会编码为4个字节的Base64字符。"}},
      {"@type": "Question", "name": "中文可以Base64编码吗？", "acceptedAnswer": {"@type": "Answer", "text": "可以。本工具先使用encodeURIComponent将中文转为UTF-8编码，然后再进行Base64编码，可以正确处理中文字符。"}}
    ]
  }
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>Base64 编解码</h1>
    </div>

    <h3>文本 Base64 编解码</h3>
    <div class="split-view">
      <div class="split-panel">
        <h3>输入</h3>
        <textarea id="inputArea" rows="8" placeholder="输入文本或Base64编码的字符串"></textarea>
        <div style="margin-top:8px;font-size:0.85rem;color:#666;">大小: <span id="inputSize">0</span></div>
      </div>
      <div class="split-panel">
        <h3>输出</h3>
        <textarea id="resultArea" rows="8" readonly></textarea>
        <div style="margin-top:8px;font-size:0.85rem;color:#666;">大小: <span id="outputSize">0</span></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="encodeBase64()">文本 &rarr; Base64</button>
      <button class="btn btn-primary" onclick="decodeBase64()">Base64 &rarr; 文本</button>
      <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>

    <h3>图片 Base64 转换</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0;">
      <div>
        <div id="dropZone" style="border:2px dashed #ddd;border-radius:12px;padding:40px;text-align:center;cursor:pointer;background:#fafafa;" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault();this.style.borderColor='#4361ee'" ondragleave="this.style.borderColor='#ddd'" ondrop="handleDrop(event)">
          <div style="font-size:2rem;">&#128193;</div>
          <p>点击或拖拽图片到此处</p>
          <p style="font-size:0.8rem;color:#999;">支持 PNG, JPG, GIF, SVG, WebP</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFile(event)">
      </div>
      <div>
        <h3>预览</h3>
        <div id="preview" style="border:1px solid #eee;border-radius:8px;min-height:200px;display:flex;align-items:center;justify-content:center;background:#fafafa;"></div>
      </div>
    </div>
    <textarea id="base64Output" rows="4" readonly placeholder="图片的Base64编码将显示在这里" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.8rem;box-sizing:border-box;"></textarea>
    <div style="margin-top:8px;display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="copyBase64()">复制Base64</button>
      <button class="btn btn-secondary" onclick="copyDataUrl()">复制完整Data URL</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    var inputEl = document.getElementById('inputArea');
    var outputEl = document.getElementById('resultArea');

    inputEl.addEventListener('input', function() {
      document.getElementById('inputSize').textContent = new Blob([inputEl.value]).size + ' 字节';
    });

    function encodeBase64() {
      try {
        var encoded = btoa(unescape(encodeURIComponent(inputEl.value)));
        outputEl.value = encoded;
        document.getElementById('outputSize').textContent = new Blob([encoded]).size + ' 字节';
        showToast('编码成功');
      } catch (e) { showToast('编码失败: ' + e.message); }
    }

    function decodeBase64() {
      try {
        var decoded = decodeURIComponent(escape(atob(inputEl.value.trim())));
        outputEl.value = decoded;
        document.getElementById('outputSize').textContent = new Blob([decoded]).size + ' 字节';
        showToast('解码成功');
      } catch (e) { showToast('解码失败，请确认是有效的Base64字符串'); }
    }

    function copyResult() {
      if (!outputEl.value) { showToast('没有结果'); return; }
      navigator.clipboard.writeText(outputEl.value).then(function() { showToast('已复制'); });
    }

    var currentDataUrl = '';
    function handleFile(e) {
      var file = e.target.files[0];
      if (file) processImage(file);
    }

    function handleDrop(e) {
      e.preventDefault();
      var file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processImage(file);
      document.getElementById('dropZone').style.borderColor = '#ddd';
    }

    function processImage(file) {
      var reader = new FileReader();
      reader.onload = function(e) {
        currentDataUrl = e.target.result;
        var base64 = currentDataUrl.split(',')[1];
        document.getElementById('preview').innerHTML = '<img src="' + currentDataUrl + '" style="max-width:100%;max-height:200px;border-radius:8px;">';
        document.getElementById('base64Output').value = base64;
        showToast('图片转换成功！文件大小: ' + (file.size / 1024).toFixed(1) + ' KB');
      };
      reader.readAsDataURL(file);
    }

    function copyBase64() {
      var val = document.getElementById('base64Output').value;
      if (!val) { showToast('没有Base64数据'); return; }
      navigator.clipboard.writeText(val).then(function() { showToast('已复制Base64'); });
    }

    function copyDataUrl() {
      if (!currentDataUrl) { showToast('没有Data URL'); return; }
      navigator.clipboard.writeText(currentDataUrl).then(function() { showToast('已复制完整Data URL'); });
    }

    function clearAll() {
      inputEl.value = '';
      outputEl.value = '';
      document.getElementById('inputSize').textContent = '0';
      document.getElementById('outputSize').textContent = '0';
      document.getElementById('base64Output').value = '';
      document.getElementById('preview').innerHTML = '';
      currentDataUrl = '';
    }

    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }
  </script>
<div style="margin-top:32px;padding:20px;background:#f0f2f5;border-radius:12px;">
  <h3 style="font-size:0.95rem;margin:0 0 12px;color:#333;">相关工具推荐</h3>

    <a href="image-base64.html" style="padding:6px 14px;background:white;border:1px solid #ddd;border-radius:16px;color:#4361ee;text-decoration:none;font-size:0.85rem;">图片转 Base64</a>
  </div>
</div>

<script src="../../js/share.js"></script>
</body>
</html>
