<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Box Shadow 生成器 - 在线阴影编辑 - 在线工具箱</title>
  <meta name="description" content="在线CSS Box Shadow生成器，可视化调整阴影参数，实时预览效果，一键复制CSS代码。支持多层阴影、内阴影。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="CSS Box Shadow 生成器 - 可视化阴影编辑">
  <meta property="og:description" content="可视化调整CSS阴影参数，实时预览，一键复制代码。">
  <meta property="og:url" content="https://eitools.cn/src/tools/box-shadow-generator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/box-shadow-generator.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"CSS Box Shadow生成器","description":"可视化CSS阴影代码生成","url":"https://eitools.cn/src/tools/box-shadow-generator.html","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>CSS Box Shadow 生成器</h1>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:800px;">
      <div>
        <div style="display:grid;gap:12px;">
          <div><label style="font-size:0.85rem;color:#888;">水平偏移 (x-offset)</label><input type="range" id="x" min="-50" max="50" value="5" oninput="update()" style="width:100%;"><span id="xv" style="font-size:0.85rem;">5px</span></div>
          <div><label style="font-size:0.85rem;color:#888;">垂直偏移 (y-offset)</label><input type="range" id="y" min="-50" max="50" value="5" oninput="update()" style="width:100%;"><span id="yv" style="font-size:0.85rem;">5px</span></div>
          <div><label style="font-size:0.85rem;color:#888;">模糊半径 (blur)</label><input type="range" id="b" min="0" max="100" value="15" oninput="update()" style="width:100%;"><span id="bv" style="font-size:0.85rem;">15px</span></div>
          <div><label style="font-size:0.85rem;color:#888;">扩展半径 (spread)</label><input type="range" id="s" min="-50" max="50" value="0" oninput="update()" style="width:100%;"><span id="sv" style="font-size:0.85rem;">0px</span></div>
          <div><label style="font-size:0.85rem;color:#888;">颜色</label><input type="color" id="c" value="#000000" oninput="update()" style="width:60px;height:36px;border:1px solid #ddd;border-radius:6px;cursor:pointer;"></div>
          <div><label style="font-size:0.85rem;color:#888;">透明度</label><input type="range" id="a" min="0" max="100" value="25" oninput="update()" style="width:100%;"><span id="av" style="font-size:0.85rem;">0.25</span></div>
          <label style="cursor:pointer;"><input type="checkbox" id="inset" onchange="update()"> 内阴影 (inset)</label>
        </div>
      </div>
      <div>
        <div style="height:200px;display:flex;align-items:center;justify-content:center;background:#f8f9fa;border-radius:12px;margin-bottom:16px;">
          <div id="preview" style="width:120px;height:120px;background:white;border-radius:12px;box-shadow:5px 5px 15px 0px rgba(0,0,0,0.25);"></div>
        </div>
        <div style="position:relative;">
          <label style="font-size:0.85rem;color:#888;display:block;margin-bottom:4px;">CSS 代码</label>
          <code id="code" style="display:block;padding:12px;background:#1a1a2e;color:#a8dadc;border-radius:8px;font-size:0.85rem;word-break:break-all;">box-shadow: 5px 5px 15px 0px rgba(0, 0, 0, 0.25);</code>
          <button class="btn btn-primary" onclick="copyCode()" style="position:absolute;top:4px;right:4px;padding:4px 12px;font-size:0.75rem;">复制</button>
        </div>
        <div style="margin-top:16px;">
          <label style="font-size:0.85rem;color:#888;display:block;margin-bottom:4px;">常用预设</label>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button class="btn btn-secondary" onclick="preset(0,1,3,0,0,0.12,true)" style="font-size:0.75rem;padding:4px 8px;">Material</button>
            <button class="btn btn-secondary" onclick="preset(0,4,6,0,0,0.1,false)" style="font-size:0.75rem;padding:4px 8px;">Bootstrap</button>
            <button class="btn btn-secondary" onclick="preset(0,0,20,0,0,0.15,false)" style="font-size:0.75rem;padding:4px 8px;">柔和</button>
            <button class="btn btn-secondary" onclick="preset(0,0,0,8,0,0.15,false)" style="font-size:0.75rem;padding:4px 8px;">实边</button>
            <button class="btn btn-secondary" onclick="preset(0,10,30,0,0,0.3,false)" style="font-size:0.75rem;padding:4px 8px;">深阴影</button>
            <button class="btn btn-secondary" onclick="preset(0,0,0,1,0,0.08,false)" style="font-size:0.75rem;padding:4px 8px;">极细边</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    function update() {
      const x=document.getElementById('x').value, y=document.getElementById('y').value,
            b=document.getElementById('b').value, s=document.getElementById('s').value,
            c=document.getElementById('c').value, a=(document.getElementById('a').value/100).toFixed(2),
            ins=document.getElementById('inset').checked;
      document.getElementById('xv').textContent=x+'px';
      document.getElementById('yv').textContent=y+'px';
      document.getElementById('bv').textContent=b+'px';
      document.getElementById('sv').textContent=s+'px';
      document.getElementById('av').textContent=a;
      const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),bl=parseInt(c.slice(5,7),16);
      const shadow=`${ins?'inset ':''}${x}px ${y}px ${b}px ${s}px rgba(${r},${g},${bl},${a})`;
      document.getElementById('preview').style.boxShadow=shadow;
      document.getElementById('code').textContent=`box-shadow: ${shadow};`;
    }
    function preset(x,y,b,s,a,al,ins) {
      document.getElementById('x').value=x;document.getElementById('y').value=y;
      document.getElementById('b').value=b;document.getElementById('s').value=s;
      document.getElementById('a').value=al*100;document.getElementById('c').value='#000000';
      document.getElementById('inset').checked=ins;update();
    }
    function copyCode() {
      navigator.clipboard.writeText(document.getElementById('code').textContent);
      const btn=document.querySelector('#code+button');btn.textContent='已复制!';setTimeout(()=>btn.textContent='复制',1500);
    }
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
