<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV转Markdown表格 - 在线转换工具 - 在线工具箱</title>
  <meta name="description" content="免费在线CSV转Markdown表格工具。将CSV数据转换为Markdown格式表格，支持自定义分隔符、对齐方式。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="CSV转Markdown表格">
  <meta property="og:description" content="CSV数据转Markdown表格格式。">
  <meta property="og:url" content="https://eitools.cn/src/tools/csv-to-markdown.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/csv-to-markdown.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"CSV转Markdown表格","description":"CSV数据转Markdown表格","url":"https://eitools.cn/src/tools/csv-to-markdown.html","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>CSV 转 Markdown 表格</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">将 CSV/TSV 数据转换为 Markdown 表格格式。</p>
    <div style="max-width:900px;">
      <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <label style="font-size:0.85rem;">分隔符：</label>
        <select id="delimiter" onchange="convert()" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;">
          <option value=",">逗号 (,)</option>
          <option value="tab">Tab</option>
          <option value=";">分号 (;)</option>
          <option value="|">竖线 (|)</option>
        </select>
        <label style="font-size:0.85rem;margin-left:8px;">对齐：</label>
        <select id="align" onchange="convert()" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;">
          <option value="left">左对齐</option>
          <option value="center">居中</option>
          <option value="right">右对齐</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <label style="font-size:0.85rem;color:#888;">CSV 输入</label>
          <textarea id="input" rows="12" oninput="convert()" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.85rem;resize:vertical;margin-top:4px;" placeholder="粘贴 CSV 数据...">姓名,年龄,城市,职业
张三,25,北京,工程师
李四,30,上海,设计师
王五,28,深圳,产品经理
赵六,35,杭州,数据分析师</textarea>
        </div>
        <div>
          <label style="font-size:0.85rem;color:#888;">Markdown 输出</label>
          <textarea id="output" rows="12" readonly style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.85rem;background:#f8f9fa;resize:vertical;margin-top:4px;"></textarea>
        </div>
      </div>
      <div style="margin-top:12px;">
        <button onclick="navigator.clipboard.writeText(document.getElementById('output').value)" style="padding:8px 20px;background:#4361ee;color:white;border:none;border-radius:8px;cursor:pointer;">复制 Markdown</button>
      </div>
    </div>
  </div>
  <script>
    function convert() {
      const input = document.getElementById('input').value.trim();
      if (!input) { document.getElementById('output').value = ''; return; }
      const delim = document.getElementById('delimiter').value === 'tab' ? '\t' : document.getElementById('delimiter').value;
      const align = document.getElementById('align').value;
      const alignChar = align === 'center' ? ':---:' : align === 'right' ? '---:' : '---';
      const rows = input.split('\n').map(line => line.split(delim).map(cell => cell.trim()));
      if (rows.length === 0) return;
      const cols = Math.max(...rows.map(r => r.length));
      let md = '';
      rows.forEach((row, i) => {
        const padded = row.concat(Array(cols - row.length).fill(''));
        md += '| ' + padded.join(' | ') + ' |\n';
        if (i === 0) {
          md += '| ' + Array(cols).fill(alignChar).join(' | ') + ' |\n';
        }
      });
      document.getElementById('output').value = md.trim();
    }
    convert();
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
