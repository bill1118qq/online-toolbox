<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年份计算器 - 两个年份之间多少年 - 在线工具箱</title>
  <meta name="description" content="免费在线年份计算器。计算两个年份之间的年数、月份、天数差。周年纪念日计算。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="年份计算器 - 年份差计算">
  <meta property="og:description" content="计算两个日期之间的年份差。">
  <meta property="og:url" content="https://eitools.cn/src/tools/year-calculator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/year-calculator.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"年份计算器","description":"计算两个日期之间的年数差","url":"https://eitools.cn/src/tools/year-calculator.html","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>年份计算器</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">计算两个日期之间的年数、月份、天数差。</p>
    <div style="max-width:700px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div>
          <label style="font-size:0.85rem;color:#888;">开始日期</label>
          <input type="date" id="start" onchange="calc()" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem;margin-top:4px;">
        </div>
        <div>
          <label style="font-size:0.85rem;color:#888;">结束日期</label>
          <input type="date" id="end" onchange="calc()" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem;margin-top:4px;">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;">
        <div style="padding:16px;background:#e8f4fd;border-radius:12px;text-align:center;">
          <div id="years" style="font-size:2rem;font-weight:700;color:#4361ee;">0</div>
          <div style="font-size:0.85rem;color:#888;">年</div>
        </div>
        <div style="padding:16px;background:#e8f5e9;border-radius:12px;text-align:center;">
          <div id="months" style="font-size:2rem;font-weight:700;color:#2f9e44;">0</div>
          <div style="font-size:0.85rem;color:#888;">月</div>
        </div>
        <div style="padding:16px;background:#fff3cd;border-radius:12px;text-align:center;">
          <div id="days" style="font-size:2rem;font-weight:700;color:#e67700;">0</div>
          <div style="font-size:0.85rem;color:#888;">天</div>
        </div>
        <div style="padding:16px;background:#f0f2f5;border-radius:12px;text-align:center;">
          <div id="totalDays" style="font-size:2rem;font-weight:700;">0</div>
          <div style="font-size:0.85rem;color:#888;">总天数</div>
        </div>
      </div>
      <div id="detail" style="padding:16px;background:#f8f9fa;border-radius:12px;font-size:0.9rem;"></div>
    </div>
  </div>
  <script>
    function calc() {
      const s = document.getElementById('start').value;
      const e = document.getElementById('end').value;
      if (!s || !e) return;
      const sd = new Date(s), ed = new Date(e);
      const totalDays = Math.round((ed - sd) / 86400000);
      let years = ed.getFullYear() - sd.getFullYear();
      let months = ed.getMonth() - sd.getMonth();
      let days = ed.getDate() - sd.getDate();
      if (days < 0) {
        months--;
        const prevMonth = new Date(ed.getFullYear(), ed.getMonth(), 0);
        days += prevMonth.getDate();
      }
      if (months < 0) { years--; months += 12; }
      document.getElementById('years').textContent = years;
      document.getElementById('months').textContent = months;
      document.getElementById('days').textContent = days;
      document.getElementById('totalDays').textContent = Math.abs(totalDays).toLocaleString();
      const absYears = Math.abs(years), absMonths = Math.abs(months);
      let detail = `相差 <strong>${absYears} 年 ${absMonths} 个月 ${Math.abs(days)} 天</strong>（共 ${Math.abs(totalDays).toLocaleString()} 天）`;
      if (absYears > 0) {
        const weeks = Math.abs(totalDays) / 7;
        const hours = Math.abs(totalDays) * 24;
        detail += `<br>≈ ${weeks.toFixed(0)} 周 · ${hours.toLocaleString()} 小时`;
      }
      document.getElementById('detail').innerHTML = detail;
    }
    document.getElementById('start').value = '2000-01-01';
    document.getElementById('end').value = new Date().toISOString().split('T')[0];
    calc();
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
