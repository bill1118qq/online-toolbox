<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP地址计算器 - 子网计算CIDR转换 - 在线工具箱</title>
  <meta name="description" content="在线IP地址计算器：输入IP和子网掩码，计算网络地址、广播地址、可用主机数、CIDR表示法、子网范围。支持CIDR斜杠表示法。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="IP地址/子网计算器">
  <meta property="og:description" content="IP地址子网计算，CIDR转换，网络范围查询。">
  <meta property="og:url" content="https://eitools.cn/src/tools/ip-calc.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/ip-calc.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"IP地址计算器","url":"https://eitools.cn/src/tools/ip-calc.html","description":"在线IP地址子网计算器，支持CIDR、子网掩码转换","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"CNY"}}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>IP地址/子网计算器</h1>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0;">
      <div>
        <label style="font-weight:bold;display:block;margin-bottom:6px;">IP 地址</label>
        <input type="text" id="ipInput" placeholder="192.168.1.1" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;box-sizing:border-box;">
      </div>
      <div>
        <label style="font-weight:bold;display:block;margin-bottom:6px;">子网掩码 / CIDR</label>
        <input type="text" id="maskInput" placeholder="24 或 255.255.255.0" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;box-sizing:border-box;">
      </div>
    </div>
    <button class="btn btn-primary" onclick="calculate()" style="margin-bottom:16px;">计算</button>
    <div id="result-box" style="display:none;padding:20px;border-radius:12px;border:2px solid #4ade80;background:#f0fff4;"></div>

    <h2>常用子网划分参考</h2>
    <table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:0.85rem;">
      <tr style="background:#f0f2f5;"><th style="padding:8px;">CIDR</th><th style="padding:8px;">子网掩码</th><th style="padding:8px;">可用主机数</th><th style="padding:8px;">适用场景</th></tr>
      <tr style="border-bottom:1px solid #eee;"><td style="padding:6px 8px;">/8</td><td style="padding:6px 8px;">255.0.0.0</td><td style="padding:6px 8px;">16,777,214</td><td style="padding:6px 8px;">A类网络</td></tr>
      <tr style="border-bottom:1px solid #eee;"><td style="padding:6px 8px;">/16</td><td style="padding:6px 8px;">255.255.0.0</td><td style="padding:6px 8px;">65,534</td><td style="padding:6px 8px;">B类网络</td></tr>
      <tr style="border-bottom:1px solid #eee;"><td style="padding:6px 8px;">/24</td><td style="padding:6px 8px;">255.255.255.0</td><td style="padding:6px 8px;">254</td><td style="padding:6px 8px;">局域网常用</td></tr>
      <tr style="border-bottom:1px solid #eee;"><td style="padding:6px 8px;">/25</td><td style="padding:6px 8px;">255.255.255.128</td><td style="padding:6px 8px;">126</td><td style="padding:6px 8px;">小型子网</td></tr>
      <tr style="border-bottom:1px solid #eee;"><td style="padding:6px 8px;">/28</td><td style="padding:6px 8px;">255.255.255.240</td><td style="padding:6px 8px;">14</td><td style="padding:6px 8px;">点对点链路</td></tr>
      <tr><td style="padding:6px 8px;">/30</td><td style="padding:6px 8px;">255.255.255.252</td><td style="padding:6px 8px;">2</td><td style="padding:6px 8px;">路由器互联</td></tr>
    </table>
  </div>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
  <script>
    function ipToNum(ip) {
      const parts = ip.split('.').map(Number);
      return ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
    }

    function numToIp(num) {
      return [(num >>> 24) & 255, (num >>> 16) & 255, (num >>> 8) & 255, num & 255].join('.');
    }

    function cidrToMask(cidr) {
      const n = parseInt(cidr);
      if (n < 0 || n > 32) return null;
      const mask = n === 0 ? 0 : (~0 << (32 - n)) >>> 0;
      return numToIp(mask);
    }

    function maskToCidr(mask) {
      const num = ipToNum(mask);
      let cidr = 0;
      for (let i = 31; i >= 0; i--) {
        if ((num >>> i) & 1) cidr++;
        else break;
      }
      return cidr;
    }

    function validateIp(ip) {
      const parts = ip.split('.');
      if (parts.length !== 4) return false;
      return parts.every(p => { const n = parseInt(p); return !isNaN(n) && n >= 0 && n <= 255 && p === String(n); });
    }

    function calculate() {
      const ipStr = document.getElementById('ipInput').value.trim();
      const maskStr = document.getElementById('maskInput').value.trim();
      const box = document.getElementById('result-box');

      if (!validateIp(ipStr)) {
        box.style.display = 'block';
        box.style.border = '2px solid #f44';
        box.style.background = '#fff5f5';
        box.innerHTML = '<p style="color:#f44;">请输入有效的IP地址</p>';
        return;
      }

      let cidr, subnetMask;
      if (/^\d+$/.test(maskStr)) {
        cidr = parseInt(maskStr);
        subnetMask = cidrToMask(cidr);
        if (!subnetMask) {
          box.style.display = 'block';
          box.style.border = '2px solid #f44';
          box.style.background = '#fff5f5';
          box.innerHTML = '<p style="color:#f44;">CIDR前缀长度须在0-32之间</p>';
          return;
        }
      } else if (validateIp(maskStr)) {
        subnetMask = maskStr;
        cidr = maskToCidr(maskStr);
      } else {
        box.style.display = 'block';
        box.style.border = '2px solid #f44';
        box.style.background = '#fff5f5';
        box.innerHTML = '<p style="color:#f44;">请输入有效的子网掩码或CIDR</p>';
        return;
      }

      const ipNum = ipToNum(ipStr);
      const maskNum = ipToNum(subnetMask);
      const networkNum = (ipNum & maskNum) >>> 0;
      const broadcastNum = (networkNum | (~maskNum >>> 0)) >>> 0;
      const firstHostNum = cidr < 31 ? (networkNum + 1) >>> 0 : networkNum;
      const lastHostNum = cidr < 31 ? (broadcastNum - 1) >>> 0 : broadcastNum;
      const hostCount = Math.pow(2, 32 - cidr) - (cidr <= 30 ? 2 : 0);

      const isPrivate = (ipNum >>> 24 === 10) ||
        ((ipNum >>> 20) === 0xac1) || // 172.16-31
        ((ipNum >>> 16) === 0xc0a8); // 192.168

      const classType = (ipNum >>> 24) < 128 ? 'A' :
                        (ipNum >>> 24) < 192 ? 'B' :
                        (ipNum >>> 24) < 224 ? 'C' :
                        (ipNum >>> 24) < 240 ? 'D (组播)' : 'E (保留)';

      box.style.display = 'block';
      box.style.border = '2px solid #4ade80';
      box.style.background = '#f0fff4';
      box.innerHTML = `
        <h3 style="margin-top:0;color:#4361ee;">计算结果</h3>
        <table style="width:100%;border-collapse:collapse;font-size:0.9rem;">
          <tr><td style="padding:6px 8px;color:#666;width:40%;">网络地址</td><td style="padding:6px 8px;font-family:monospace;">${numToIp(networkNum)}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">广播地址</td><td style="padding:6px 8px;font-family:monospace;">${numToIp(broadcastNum)}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">子网掩码</td><td style="padding:6px 8px;font-family:monospace;">${subnetMask}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">CIDR表示</td><td style="padding:6px 8px;font-family:monospace;">${numToIp(networkNum)}/${cidr}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">第一个可用IP</td><td style="padding:6px 8px;font-family:monospace;">${numToIp(firstHostNum)}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">最后一个可用IP</td><td style="padding:6px 8px;font-family:monospace;">${numToIp(lastHostNum)}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">可用主机数</td><td style="padding:6px 8px;font-weight:bold;">${hostCount.toLocaleString()}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">IP类别</td><td style="padding:6px 8px;">${classType}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">私有地址</td><td style="padding:6px 8px;">${isPrivate ? '<span style="color:#4ade80;">是</span>' : '<span style="color:#999;">否</span>'}</td></tr>
          <tr><td style="padding:6px 8px;color:#666;">IP范围</td><td style="padding:6px 8px;font-family:monospace;font-size:0.85rem;">${numToIp(firstHostNum)} - ${numToIp(lastHostNum)}</td></tr>
        </table>`;
    }
  </script>
</body>
</html>
