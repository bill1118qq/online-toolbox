<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON转CSV - 在线数据格式转换 - 在线工具箱</title>
  <meta name="description" content="免费在线JSON转CSV工具，将JSON数组数据快速转换为CSV表格格式。支持嵌套JSON扁平化、自定义分隔符、一键复制和下载。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="JSON转CSV - 在线数据格式转换">
  <meta property="og:description" content="JSON数组转CSV表格，支持嵌套扁平化。">
  <meta property="og:url" content="https://eitools.cn/src/tools/json-to-csv.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/json-to-csv.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"JSON转CSV","description":"在线JSON转CSV数据格式转换","url":"https://eitools.cn/src/tools/json-to-csv.html","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>JSON 转 CSV</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">将 JSON 数组数据转换为 CSV 表格格式。支持嵌套对象扁平化。</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px;">
      <div>
        <label style="font-size:0.85rem;color:#888;">JSON 输入</label>
        <textarea id="jsonInput" rows="16" placeholder='[&#10;  {"name":"张三","age":25,"city":"北京"},&#10;  {"name":"李四","age":30,"city":"上海"}&#10;]' style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.85rem;resize:vertical;margin-top:4px;">[
  {"name":"张三","age":25,"city":"北京","address":{"province":"北京","zip":"100000"}},
  {"name":"李四","age":30,"city":"上海","address":{"province":"上海","zip":"200000"}},
  {"name":"王五","age":28,"city":"广州","address":{"province":"广东","zip":"510000"}}
]</textarea>
      </div>
      <div>
        <label style="font-size:0.85rem;color:#888;">CSV 输出</label>
        <textarea id="csvOutput" rows="16" readonly style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.85rem;resize:vertical;margin-top:4px;"></textarea>
      </div>
    </div>
    <div style="max-width:900px;margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <label style="font-size:0.85rem;color:#888;">分隔符：</label>
      <select id="delimiter" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;">
        <option value=",">逗号 (,)</option><option value="	">Tab</option><option value=";">分号 (;)</option><option value="|">竖线 (|)</option>
      </select>
      <button class="btn btn-primary" onclick="convert()" style="padding:8px 20px;">转换</button>
      <button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('csvOutput').value)" style="padding:8px 16px;">复制CSV</button>
      <button class="btn" onclick="downloadCSV()" style="padding:8px 16px;">下载CSV</button>
      <span id="msg" style="font-size:0.85rem;color:#2f9e44;margin-left:8px;"></span>
    </div>
  </div>
  <script>
    function convert() {
      const msg = document.getElementById('msg');
      msg.textContent = '';
      try {
        const json = JSON.parse(document.getElementById('jsonInput').value);
        if (!Array.isArray(json) || json.length === 0) throw new Error('请输入JSON数组');
        const delimiter = document.getElementById('delimiter').value;
        // Flatten all keys
        const allKeys = new Set();
        function flatten(obj, prefix) {
          const result = {};
          for (const [k, v] of Object.entries(obj)) {
            const key = prefix ? `${prefix}.${k}` : k;
            if (v && typeof v === 'object' && !Array.isArray(v)) { Object.assign(result, flatten(v, key)); }
            else if (Array.isArray(v)) { result[key] = JSON.stringify(v); allKeys.add(key); }
            else { result[key] = v; allKeys.add(key); }
          }
          return result;
        }
        const rows = json.map(item => {
          const flat = flatten(item, '');
          Object.keys(flat).forEach(k => allKeys.add(k));
          return flat;
        });
        const keys = [...allKeys];
        const escape = v => { const s = String(v ?? ''); return s.includes(delimiter) || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s; };
        const header = keys.map(escape).join(delimiter);
        const body = rows.map(row => keys.map(k => escape(row[k] ?? '')).join(delimiter)).join('\n');
        document.getElementById('csvOutput').value = header + '\n' + body;
        msg.textContent = `转换成功：${rows.length} 行 × ${keys.length} 列`;
      } catch (e) { msg.style.color = '#c92a2a'; msg.textContent = '错误：' + e.message; setTimeout(() => msg.style.color = '#2f9e44', 2000); }
    }
    function downloadCSV() {
      const csv = document.getElementById('csvOutput').value;
      if (!csv) return;
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'data.csv'; a.click();
    }
    convert();
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
