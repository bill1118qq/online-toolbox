      /* ======== Custom holiday persistence ======== */
      function loadCustomHolidays() {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (e) {
          return [];
        }
      }

      function saveCustomHolidays() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(customHolidays));
        } catch (e) {
          // storage full or unavailable
        }
      }

      /* ======== Time calculations ======== */
      function getTimeDiff(targetDateStr) {
        var now = new Date();
        var target = new Date(targetDateStr + 'T00:00:00');
        var diff = target.getTime() - now.getTime();
        var isToday = false;

        if (diff < 0 && diff > -86400000) {
          isToday = true;
        }

        var absDiff = Math.abs(diff);
        var days = Math.floor(absDiff / 86400000);
        var hours = Math.floor((absDiff % 86400000) / 3600000);
        var minutes = Math.floor((absDiff % 3600000) / 60000);
        var seconds = Math.floor((absDiff % 60000) / 1000);

        return {
          isFuture: diff > 0,
          isToday: isToday,
          days: days,
          hours: hours,
          minutes: minutes,
          seconds: seconds,
          pastDays: diff < 0 ? Math.ceil(Math.abs(diff) / 86400000) : 0
        };
      }

      function formatDate(dateStr) {
        var d = new Date(dateStr + 'T00:00:00');
        var weekdays = ['日', '一', '二', '三', '四', '五', '六'];
        var m = d.getMonth() + 1;
        var day = d.getDate();
        var w = weekdays[d.getDay()];
        return d.getFullYear() + '年' + m + '月' + day + '日 周' + w;
      }

      /* ======== Sorting ======== */
      function sortHolidays(holidays) {
        return holidays.slice().sort(function(a, b) {
          var diffA = getTimeDiff(a.date);
          var diffB = getTimeDiff(b.date);
          // Future first (by proximity), then today, then past (most recent first)
          if (diffA.isFuture && diffB.isFuture) return a.date.localeCompare(b.date);
          if (diffA.isFuture && !diffB.isFuture) return -1;
          if (!diffA.isFuture && diffB.isFuture) return 1;
          if (diffA.isToday) return -1;
          if (diffB.isToday) return 1;
          return b.date.localeCompare(a.date);
        });
      }

      /* ======== Filtering ======== */
      function filterHolidays(holidays, filter) {
        if (filter === 'all') return holidays;
        if (filter === 'upcoming') return holidays.filter(function(h) { return getTimeDiff(h.date).isFuture; });
        if (filter === 'past') return holidays.filter(function(h) { return !getTimeDiff(h.date).isFuture && !getTimeDiff(h.date).isToday; });
        if (filter === 'chinese') return holidays.filter(function(h) { return h.category === 'chinese'; });
        if (filter === 'international') return holidays.filter(function(h) { return h.category === 'international'; });
        if (filter === 'custom') return holidays.filter(function(h) { return h.category === 'custom'; });
        return holidays;
      }

      /* ======== Rendering ======== */
      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function renderCard(holiday, idx) {
        var td = getTimeDiff(holiday.date);
        var isCustom = holiday.category === 'custom';
        var tagText = holiday.category === 'chinese' ? '传统' :
                      holiday.category === 'international' ? '国际' : '自定义';
        var tagBg = holiday.category === 'chinese' ? '#fff3e0' :
                    holiday.category === 'international' ? '#e3f2fd' : '#f3e5f5';
        var tagColor = holiday.category === 'chinese' ? '#e65100' :
                       holiday.category === 'international' ? '#1565c0' : '#7b1fa2';

        var html = '<div class="holiday-card" data-idx="' + idx + '">';
        html += '<div class="accent-bar" style="background:' + escapeHtml(holiday.color) + ';"></div>';

        if (isCustom) {
          html += '<button class="btn-remove" onclick="removeCustom(' + idx + ')" title="删除">\u00D7</button>';
        }

        html += '<div class="card-top">';
        html += '<div class="card-left">';
        html += '<span class="card-emoji">' + escapeHtml(holiday.emoji) + '</span>';
        html += '<div><div class="card-name">' + escapeHtml(holiday.name) + '</div>';
        html += '<div class="card-date">' + formatDate(holiday.date) + '</div></div>';
        html += '</div>';
        html += '<span class="card-tag" style="background:' + tagBg + ';color:' + tagColor + ';">' + tagText + '</span>';
        html += '</div>';

        if (td.isToday) {
          html += '<div class="today-info">\uD83C\uDF89 就是今天！</div>';
        } else if (td.isFuture) {
          html += '<div class="countdown-display">';
          html += renderUnit(td.days, '天', holiday.color);
          html += renderUnit(td.hours, '时', holiday.color);
          html += renderUnit(td.minutes, '分', holiday.color);
          html += renderUnit(td.seconds, '秒', holiday.color);
          html += '</div>';
        } else {
          html += '<div class="past-info">已过去 ' + td.pastDays + ' 天</div>';
        }

        html += '</div>';
        return html;
      }

      function renderUnit(value, label, color) {
        return '<div class="countdown-unit">' +
          '<div class="countdown-number" style="color:' + color + ';">' + pad(value) + '</div>' +
          '<div class="countdown-label">' + label + '</div>' +
          '</div>';
      }

      function pad(n) {
        return n < 10 ? '0' + n : '' + n;
      }

      function render() {
        var sorted = sortHolidays(allHolidays);
        var filtered = filterHolidays(sorted, currentFilter);
        var grid = document.getElementById('holidayGrid');
        var badge = document.getElementById('sectionBadge');

        var upcomingCount = allHolidays.filter(function(h) { return getTimeDiff(h.date).isFuture; }).length;
        badge.textContent = upcomingCount + ' 个即将到来';

        if (filtered.length === 0) {
          grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">' +
            '<div style="font-size:3rem;margin-bottom:12px;">\uD83D\uDCC5</div>' +
            '<p>没有符合条件的节日</p></div>';
          return;
        }

        var html = '';
        for (var i = 0; i < filtered.length; i++) {
          html += renderCard(filtered[i], allHolidays.indexOf(filtered[i]));
        }
        grid.innerHTML = html;
      }

      /* ======== Custom holiday actions ======== */
      window.addCustomHoliday = function() {
        var nameInput = document.getElementById('customName');
        var dateInput = document.getElementById('customDate');
        var name = nameInput.value.trim();
        var date = dateInput.value;

        if (!name) { showToast('请输入节日名称'); return; }
        if (!date) { showToast('请选择日期'); return; }

        // Check duplicate name
        for (var i = 0; i < customHolidays.length; i++) {
          if (customHolidays[i].name === name && customHolidays[i].date === date) {
            showToast('该节日已存在');
            return;
          }
        }

        var newHoliday = {
          name: name,
          date: date,
          emoji: selectedEmoji,
          color: selectedColor,
          category: 'custom'
        };

        var updated = customHolidays.concat([newHoliday]);
        customHolidays = updated;
        allHolidays = builtinHolidays.concat(customHolidays);
        saveCustomHolidays();
        nameInput.value = '';
        render();
        showToast('已添加「' + name + '」');
      };

      window.removeCustom = function(idx) {
        var holiday = allHolidays[idx];
        if (!holiday || holiday.category !== 'custom') return;

        var name = holiday.name;
        var updated = customHolidays.filter(function(h) {
          return !(h.name === name && h.date === holiday.date);
        });
        customHolidays = updated;
        allHolidays = builtinHolidays.concat(customHolidays);
        saveCustomHolidays();
        render();
        showToast('已删除「' + name + '」');
      };

      /* ======== Toast ======== */
      function showToast(msg) {
        var existing = document.querySelector('.toast');
        if (existing) existing.remove();

        var t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        requestAnimationFrame(function() { t.classList.add('show'); });
        setTimeout(function() {
          t.classList.remove('show');
          setTimeout(function() { t.remove(); }, 300);
        }, 2000);
      }

      /* ======== Init emoji picker ======== */
      function initEmojiPicker() {
        var picker = document.getElementById('emojiPicker');
        var html = '';
        for (var i = 0; i < EMOJI_OPTIONS.length; i++) {
          var sel = i === 0 ? ' selected' : '';
          html += '<button class="emoji-option' + sel + '" data-emoji="' + EMOJI_OPTIONS[i] + '" type="button">' +
            EMOJI_OPTIONS[i] + '</button>';
        }
        picker.innerHTML = html;

        picker.addEventListener('click', function(e) {
          var btn = e.target.closest('.emoji-option');
          if (!btn) return;
          picker.querySelectorAll('.emoji-option').forEach(function(b) { b.classList.remove('selected'); });
          btn.classList.add('selected');
          selectedEmoji = btn.getAttribute('data-emoji');
        });
      }

      /* ======== Init color picker ======== */
      function initColorPicker() {
        var container = document.querySelector('.color-picker');
        var options = container.querySelectorAll('.color-option');
        options.forEach(function(opt) {
          opt.addEventListener('click', function() {
            options.forEach(function(o) { o.classList.remove('selected'); });
            opt.classList.add('selected');
            selectedColor = opt.getAttribute('data-color');
          });
        });
      }

      /* ======== Init filter tabs ======== */
      function initFilterTabs() {
        var tabs = document.getElementById('filterTabs');
        tabs.addEventListener('click', function(e) {
          var tab = e.target.closest('.filter-tab');
          if (!tab) return;
          tabs.querySelectorAll('.filter-tab').forEach(function(t) { t.classList.remove('active'); });
          tab.classList.add('active');
          currentFilter = tab.getAttribute('data-filter');
          render();
        });
      }

      /* ======== Bootstrap ======== */
      initEmojiPicker();
      initColorPicker();
      initFilterTabs();
      render();

      // Update every second
      setInterval(render, 1000);
    })();
  </script>
</body>
</html>
