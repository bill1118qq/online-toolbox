<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>二维码生成 - 在线工具箱</title>
  <meta name="description" content="免费在线二维码生成器，输入文字或链接即可生成二维码，支持下载。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <meta property="og:title" content="二维码生成 - 在线工具箱">
  <meta property="og:description" content="免费在线二维码生成器，输入文字或链接即可生成二维码，支持下载。">
  <meta property="og:url" content="https://eitools.cn/src/tools/qrcode.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/qrcode.html">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {"@type": "Question", "name": "二维码最大能存多少内容？", "acceptedAnswer": {"@type": "Answer", "text": "普通二维码最多能存储约4296个字母数字字符或7089个数字。存储的数据越多，二维码越复杂，扫描难度也会增加。"}},
      {"@type": "Question", "name": "这个二维码生成工具安全吗？", "acceptedAnswer": {"@type": "Answer", "text": "完全安全。本工具在您的浏览器本地生成二维码，不会将内容发送到任何服务器。"}},
      {"@type": "Question", "name": "二维码有有效期吗？", "acceptedAnswer": {"@type": "Answer", "text": "二维码本身没有有效期。但如果二维码指向的网址发生变更或失效，扫描后可能无法访问正确内容。"}}
    ]
  }
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>二维码生成</h1>
    </div>

    <textarea id="qrInput" placeholder="输入文字或链接，例如：https://example.com" style="min-height: 80px;"></textarea>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="generateQR()">生成二维码</button>
      <button class="btn btn-secondary" onclick="downloadQR()">下载二维码</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>

    <div style="text-align: center; margin-top: 24px;">
      <canvas id="qrCanvas" style="display: none; border: 1px solid #e0e0e0; border-radius: 8px;"></canvas>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const qrInput = document.getElementById('qrInput');
    const qrCanvas = document.getElementById('qrCanvas');

    function generateQR() {
      const text = qrInput.value.trim();
      if (!text) {
        showToast('请输入内容');
        return;
      }

      try {
        const qr = qrcode(0, 'M');
        qr.addData(text);
        qr.make();

        const moduleCount = qr.getModuleCount();
        const cellSize = Math.max(4, Math.floor(300 / moduleCount));
        const size = moduleCount * cellSize;

        qrCanvas.width = size;
        qrCanvas.height = size;
        qrCanvas.style.display = 'inline-block';

        const ctx = qrCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = '#1a1a2e';
        for (let row = 0; row < moduleCount; row++) {
          for (let col = 0; col < moduleCount; col++) {
            if (qr.isDark(row, col)) {
              ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
            }
          }
        }

        showToast('二维码生成成功');
      } catch (e) {
        showToast('生成失败: ' + e.message);
      }
    }

    function downloadQR() {
      if (qrCanvas.style.display === 'none') {
        showToast('请先生成二维码');
        return;
      }
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = qrCanvas.toDataURL('image/png');
      link.click();
      showToast('下载成功');
    }

    function clearAll() {
      qrInput.value = '';
      qrCanvas.style.display = 'none';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
<div style="margin-top:32px;padding:20px;background:#f0f2f5;border-radius:12px;">
  <h3 style="font-size:0.95rem;margin:0 0 12px;color:#333;">相关工具推荐</h3>
  <div style="display:flex;flex-wrap:wrap;gap:8px;">
    <a href="qr-decoder.html" style="padding:6px 14px;background:white;border:1px solid #ddd;border-radius:16px;color:#4361ee;text-decoration:none;font-size:0.85rem;">二维码识别</a>
    <a href="barcode-generator.html" style="padding:6px 14px;background:white;border:1px solid #ddd;border-radius:16px;color:#4361ee;text-decoration:none;font-size:0.85rem;">条形码生成</a>
  </div>
</div>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
