        <option value="zh-CN">中文</option>

        <option value="ru">Русский</option>

        <option value="it">Italiano</option>
        <option value="th">ไทย</option>

      </select>
      <button onclick="swapLang()" style="background:none;border:1px solid #ddd;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.1rem;">⇄</button>
      <select id="toLang" style="padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;">
        <option value="en" selected>English</option>
        <option value="zh-CN">中文</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="ru">Русский</option>
        <option value="pt">Português</option>
        <option value="ar">العربية</option>
        <option value="it">Italiano</option>
        <option value="th">ไทย</option>
        <option value="vi">Tiếng Việt</option>
      </select>

    <div class="split-view">
      <div>
        <textarea id="inputText" rows="10" placeholder="输入需要翻译的文本..." style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;resize:vertical;font-family:inherit;"></textarea>
        <div style="display:flex;justify-content:space-between;margin-top:8px;">
          <span id="charCount" style="font-size:0.8rem;color:#999;">0 字</span>

      <div>
        <div id="outputText" style="width:100%;min-height:240px;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fafafa;font-family:inherit;line-height:1.8;">翻译结果将显示在这里</div>
        <div style="display:flex;justify-content:flex-end;margin-top:8px;">
          <button onclick="copyResult()" style="background:none;border:none;color:#4361ee;cursor:pointer;font-size:0.85rem;">复制结果</button>
        </div>
      </div>
    </div>

    <div class="btn-group" style="margin-top:16px;">
      <button class="btn btn-primary" onclick="translate()" style="min-width:120px;">翻译</button>

    <p style="color:#999;font-size:0.8rem;margin-top:16px;text-align:center;">使用 MyMemory 免费翻译API（每日5000字免费额度），文本会发送到第三方服务进行翻译。请勿翻译敏感信息。</p>

    <a href="cjk-separator.html" style="padding:6px 14px;background:white;border:1px solid #ddd;border-radius:16px;color:#4361ee;text-decoration:none;font-size:0.85rem;">中日韩分隔</a>

<div id="share-bar"></div>
  <script src="../../js/share.js"></script>
  <script>
    const LANG_MAP = {
      'zh-CN': 'zh', 'en': 'en', 'ja': 'ja', 'ko': 'ko', 'fr': 'fr',
      'de': 'de', 'es': 'es', 'ru': 'ru', 'pt': 'pt', 'ar': 'ar',
      'it': 'it', 'th': 'th', 'vi': 'vi'
    };

    // Simple dictionary-based translation for common phrases as fallback
    const DICT = {
      '你好': { 'en': 'Hello', 'ja': 'こんにちは', 'ko': '안녕하세요', 'fr': 'Bonjour', 'de': 'Hallo', 'es': 'Hola', 'ru': 'Привет', 'pt': 'Olá', 'ar': 'مرحبا', 'it': 'Ciao', 'th': 'สวัสดี', 'vi': 'Xin chào' },
      '谢谢': { 'en': 'Thank you', 'ja': 'ありがとう', 'ko': '감사합니다', 'fr': 'Merci', 'de': 'Danke', 'es': 'Gracias', 'ru': 'Спасибо', 'pt': 'Obrigado', 'ar': 'شكرا', 'it': 'Grazie', 'th': 'ขอบคุณ', 'vi': 'Cảm ơn' },
      '再见': { 'en': 'Goodbye', 'ja': 'さようなら', 'ko': '안녕히 가세요', 'fr': 'Au revoir', 'de': 'Auf Wiedersehen', 'es': 'Adiós', 'ru': 'До свидания', 'pt': 'Tchau', 'ar': 'مع السلامة', 'it': 'Arrivederci', 'th': 'ลาก่อน', 'vi': 'Tạm biệt' },
      '我爱你': { 'en': 'I love you', 'ja': '愛してる', 'ko': '사랑해요', 'fr': 'Je t\'aime', 'de': 'Ich liebe dich', 'es': 'Te quiero', 'ru': 'Я люблю тебя', 'pt': 'Eu te amo', 'ar': 'أحبك', 'it': 'Ti amo', 'th': 'ฉันรักคุณ', 'vi': 'Tôi yêu bạn' },
      '欢迎': { 'en': 'Welcome', 'ja': 'ようこそ', 'ko': '환영합니다', 'fr': 'Bienvenue', 'de': 'Willkommen', 'es': 'Bienvenido', 'ru': 'Добро пожаловать', 'pt': 'Bem-vindo', 'ar': 'أهلا وسهلا', 'it': 'Benvenuto', 'th': 'ยินดีต้อนรับ', 'vi': 'Chào mừng' }
    };

    document.getElementById('inputText').addEventListener('input', e => {
      document.getElementById('charCount').textContent = e.target.value.length + ' 字';
    });

    async function translate() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) { showToast('请输入需要翻译的文本'); return; }

      const from = LANG_MAP[document.getElementById('fromLang').value];
      const to = LANG_MAP[document.getElementById('toLang').value];

      document.getElementById('outputText').textContent = '翻译中...';
      document.getElementById('outputText').style.borderColor = '#4361ee';

      try {
        // 使用 MyMemory 免费翻译 API（每日 5000 字免费额度）
        // 请勿翻译敏感信息，文本会发送到第三方服务
        const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.substring(0, 500))}&langpair=${from}|${to}`;
        const resp = await fetch(url);
        const data = await resp.json();

        if (data.responseData && data.responseData.translatedText) {
          let translated = data.responseData.translatedText;
          // 检测 API 返回的限流提示
          if (translated.toUpperCase().includes('MYMEMORY WARNING') || translated.includes('QUOTA EXCEEDED') || translated.includes('PLEASE PROVIDE VALID API KEY')) {
            throw new Error('今日翻译额度已用完，请明天再试');
          }
          document.getElementById('outputText').textContent = translated;
          document.getElementById('outputText').style.borderColor = '#4caf50';
        } else {
          throw new Error('翻译失败');
        }
      } catch (e) {
        // Fallback: check dictionary
        const dictEntry = DICT[text];
        if (dictEntry && dictEntry[to]) {
          document.getElementById('outputText').textContent = dictEntry[to];
          document.getElementById('outputText').style.borderColor = '#4caf50';
        } else {
          document.getElementById('outputText').textContent = '翻译服务暂时不可用，请稍后重试。\n\n提示：可以尝试使用 Google Translate（translate.google.com）进行翻译。';
          document.getElementById('outputText').style.borderColor = '#f44336';
        }
      }
    }

    function swapLang() {
      const from = document.getElementById('fromLang');
      const to = document.getElementById('toLang');
      [from.value, to.value] = [to.value, from.value];
      const input = document.getElementById('inputText').value;
      document.getElementById('inputText').value = document.getElementById('outputText').textContent === '翻译结果将显示在这里' ? '' : document.getElementById('outputText').textContent;
      document.getElementById('charCount').textContent = document.getElementById('inputText').value.length + ' 字';
    }

    function clearText() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputText').textContent = '翻译结果将显示在这里';
      document.getElementById('outputText').style.borderColor = '#ddd';
      document.getElementById('charCount').textContent = '0 字';
    }

    function copyResult() {
      const text = document.getElementById('outputText').textContent;
      if (text === '翻译结果将显示在这里') { showToast('没有可复制的内容'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
  </script>
</body>
