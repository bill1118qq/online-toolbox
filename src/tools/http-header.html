<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP状态码大全 - 状态码查询 - 在线工具箱</title>
  <meta name="description" content="HTTP状态码完整参考：1xx信息、2xx成功、3xx重定向、4xx客户端错误、5xx服务器错误。每个状态码附说明和使用场景。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="HTTP状态码大全">
  <meta property="og:description" content="HTTP状态码完整参考，附说明和使用场景。">
  <meta property="og:url" content="https://eitools.cn/src/tools/http-header.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/http-header.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"HTTP状态码大全","url":"https://eitools.cn/src/tools/http-header.html","description":"HTTP状态码完整参考手册，支持搜索和分类筛选","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"CNY"}}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>HTTP状态码大全</h1>
    </div>
    <div style="margin:16px 0;">
      <input type="text" id="search" placeholder="搜索状态码或描述（如：404、未找到）" oninput="filter()" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;box-sizing:border-box;">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="filterCat('all')">全部</button>
      <button class="btn btn-secondary" onclick="filterCat('1xx')" style="color:#4361ee;">1xx 信息</button>
      <button class="btn btn-secondary" onclick="filterCat('2xx')" style="color:#4ade80;">2xx 成功</button>
      <button class="btn btn-secondary" onclick="filterCat('3xx')" style="color:#f59e0b;">3xx 重定向</button>
      <button class="btn btn-secondary" onclick="filterCat('4xx')" style="color:#f44;">4xx 客户端</button>
      <button class="btn btn-secondary" onclick="filterCat('5xx')" style="color:#a855f7;">5xx 服务端</button>
    </div>
    <div id="list"></div>
  </div>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
  <script>
    const codes = [
      {code:'100',name:'Continue',desc:'客户端应继续请求',cat:'1xx'},
      {code:'101',name:'Switching Protocols',desc:'切换协议',cat:'1xx'},
      {code:'200',name:'OK',desc:'请求成功',cat:'2xx'},
      {code:'201',name:'Created',desc:'已创建新资源',cat:'2xx'},
      {code:'204',name:'No Content',desc:'成功但无返回内容',cat:'2xx'},
      {code:'206',name:'Partial Content',desc:'范围请求成功',cat:'2xx'},
      {code:'301',name:'Moved Permanently',desc:'永久重定向',cat:'3xx'},
      {code:'302',name:'Found',desc:'临时重定向',cat:'3xx'},
      {code:'304',name:'Not Modified',desc:'未修改（缓存有效）',cat:'3xx'},
      {code:'307',name:'Temporary Redirect',desc:'临时重定向（保持方法）',cat:'3xx'},
      {code:'308',name:'Permanent Redirect',desc:'永久重定向（保持方法）',cat:'3xx'},
      {code:'400',name:'Bad Request',desc:'请求语法错误',cat:'4xx'},
      {code:'401',name:'Unauthorized',desc:'未认证',cat:'4xx'},
      {code:'403',name:'Forbidden',desc:'无权限访问',cat:'4xx'},
      {code:'404',name:'Not Found',desc:'资源未找到',cat:'4xx'},
      {code:'405',name:'Method Not Allowed',desc:'请求方法不允许',cat:'4xx'},
      {code:'408',name:'Request Timeout',desc:'请求超时',cat:'4xx'},
      {code:'409',name:'Conflict',desc:'请求冲突',cat:'4xx'},
      {code:'410',name:'Gone',desc:'资源已永久删除',cat:'4xx'},
      {code:'413',name:'Payload Too Large',desc:'请求体过大',cat:'4xx'},
      {code:'414',name:'URI Too Long',desc:'URL过长',cat:'4xx'},
      {code:'415',name:'Unsupported Media Type',desc:'不支持的媒体类型',cat:'4xx'},
      {code:'422',name:'Unprocessable Entity',desc:'语义错误无法处理',cat:'4xx'},
      {code:'429',name:'Too Many Requests',desc:'请求过于频繁（限流）',cat:'4xx'},
      {code:'431',name:'Request Header Fields Too Large',desc:'请求头字段过大',cat:'4xx'},
      {code:'451',name:'Unavailable For Legal Reasons',desc:'因法律原因不可用',cat:'4xx'},
      {code:'500',name:'Internal Server Error',desc:'服务器内部错误',cat:'5xx'},
      {code:'502',name:'Bad Gateway',desc:'网关/代理错误',cat:'5xx'},
      {code:'503',name:'Service Unavailable',desc:'服务不可用',cat:'5xx'},
      {code:'504',name:'Gateway Timeout',desc:'网关超时',cat:'5xx'},
      {code:'505',name:'HTTP Version Not Supported',desc:'HTTP版本不支持',cat:'5xx'},
    ];
    const catColors = {'1xx':'#4361ee','2xx':'#4ade80','3xx':'#f59e0b','4xx':'#f44','5xx':'#a855f7'};
    const catNames = {'1xx':'信息响应','2xx':'成功','3xx':'重定向','4xx':'客户端错误','5xx':'服务器错误'};

    function render(data) {
      document.getElementById('list').innerHTML = data.map(c => `
        <div style="background:white;border:1px solid #eee;border-radius:10px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <span style="background:${catColors[c.cat]};color:white;padding:6px 12px;border-radius:8px;font-weight:bold;font-size:1rem;min-width:60px;text-align:center;">${c.code}</span>
          <div>
            <div style="font-weight:bold;">${c.name}</div>
            <div style="font-size:0.85rem;color:#666;">${c.desc}</div>
          </div>
          <span style="margin-left:auto;background:#f0f2f5;padding:2px 8px;border-radius:10px;font-size:0.75rem;color:${catColors[c.cat]};">${c.cat} ${catNames[c.cat]}</span>
        </div>
      `).join('');
    }

    function filter() {
      const q = document.getElementById('search').value.toLowerCase();
      render(codes.filter(c => c.code.includes(q) || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q)));
    }

    function filterCat(cat) {
      document.getElementById('search').value = '';
      render(cat === 'all' ? codes : codes.filter(c => c.cat === cat));
    }

    render(codes);
  </script>
</body>
</html>
