<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cron表达式生成器 - 在线Cron定时任务 - 在线工具箱</title>
  <meta name="description" content="在线Cron表达式生成器和解析器，通过可视化界面生成Cron表达式，支持解析Cron表达式为中文说明。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Cron表达式生成器 - 可视化Cron编辑">
  <meta property="og:description" content="可视化生成Cron表达式，支持解析和常用模板。">
  <meta property="og:url" content="https://eitools.cn/src/tools/cron-generator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/cron-generator.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"Cron表达式生成器","description":"在线可视化Cron表达式生成和解析","url":"https://eitools.cn/src/tools/cron-generator.html","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>Cron 表达式生成器</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">可视化生成和解析 Cron 表达式，支持 5 字段格式（分 时 日 月 周）。</p>
    <div style="max-width:600px;">
      <h3 style="margin-bottom:12px;">可视化生成</h3>
      <div style="display:grid;gap:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="width:60px;font-weight:600;font-size:0.9rem;">分钟</label>
          <select id="c-min" onchange="genCron()" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;">
            <option value="*">每分钟</option><option value="0">第0分钟</option><option value="*/5">每5分钟</option><option value="*/10">每10分钟</option><option value="*/15">每15分钟</option><option value="*/30">每30分钟</option><option value="custom">自定义</option>
          </select>
          <input type="text" id="c-min-v" placeholder="如: 0,15,30" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;display:none;">
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="width:60px;font-weight:600;font-size:0.9rem;">小时</label>
          <select id="c-hour" onchange="genCron()" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;">
            <option value="*">每小时</option><option value="0">0点</option><option value="6">6点</option><option value="8">8点</option><option value="9">9点</option><option value="12">12点</option><option value="18">18点</option><option value="*/2">每2小时</option><option value="*/6">每6小时</option><option value="custom">自定义</option>
          </select>
          <input type="text" id="c-hour-v" placeholder="如: 9-17" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;display:none;">
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="width:60px;font-weight:600;font-size:0.9rem;">日期</label>
          <select id="c-day" onchange="genCron()" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;">
            <option value="*">每天</option><option value="1">每月1号</option><option value="15">每月15号</option><option value="*/7">每7天</option><option value="custom">自定义</option>
          </select>
          <input type="text" id="c-day-v" placeholder="如: 1,15" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;display:none;">
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="width:60px;font-weight:600;font-size:0.9rem;">月份</label>
          <select id="c-month" onchange="genCron()" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;">
            <option value="*">每月</option><option value="1">一月</option><option value="*/3">每3个月</option><option value="*/6">每6个月</option><option value="custom">自定义</option>
          </select>
          <input type="text" id="c-month-v" placeholder="如: 1,6,12" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;display:none;">
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <label style="width:60px;font-weight:600;font-size:0.9rem;">星期</label>
          <select id="c-week" onchange="genCron()" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;">
            <option value="*">每天</option><option value="1">周一</option><option value="1-5">工作日</option><option value="0,6">周末</option><option value="custom">自定义</option>
          </select>
          <input type="text" id="c-week-v" placeholder="0=周日 1=周一" style="flex:1;padding:8px;border:1px solid #ddd;border-radius:6px;display:none;">
        </div>
      </div>
      <div style="margin-top:16px;padding:16px;background:#eef1ff;border-radius:10px;text-align:center;">
        <div style="font-size:0.85rem;color:#888;">Cron 表达式</div>
        <code id="cron-expr" style="font-size:1.4rem;font-weight:800;color:#4361ee;display:block;margin-top:4px;">* * * * *</code>
        <div id="cron-desc" style="color:#555;margin-top:8px;font-size:0.9rem;">每分钟执行一次</div>
      </div>

      <h3 style="margin:32px 0 12px;">解析 Cron 表达式</h3>
      <div style="display:flex;gap:8px;">
        <input type="text" id="parse-input" placeholder="输入 Cron 表达式，如: */5 9-17 * * 1-5" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-family:monospace;">
        <button class="btn btn-primary" onclick="parseCron()" style="padding:10px 20px;">解析</button>
      </div>
      <div id="parse-result" style="margin-top:12px;"></div>

      <h3 style="margin:32px 0 12px;">常用模板</h3>
      <div style="display:grid;gap:8px;">
        <div class="cron-tpl" onclick="applyCron('*/5 * * * *')" style="padding:10px;background:white;border:1px solid #eee;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;"><span>每5分钟</span><code style="color:#4361ee">*/5 * * * *</code></div>
        <div class="cron-tpl" onclick="applyCron('0 * * * *')" style="padding:10px;background:white;border:1px solid #eee;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;"><span>每小时整点</span><code style="color:#4361ee">0 * * * *</code></div>
        <div class="cron-tpl" onclick="applyCron('0 0 * * *')" style="padding:10px;background:white;border:1px solid #eee;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;"><span>每天午夜</span><code style="color:#4361ee">0 0 * * *</code></div>
        <div class="cron-tpl" onclick="applyCron('0 9 * * 1-5')" style="padding:10px;background:white;border:1px solid #eee;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;"><span>工作日早9点</span><code style="color:#4361ee">0 9 * * 1-5</code></div>
        <div class="cron-tpl" onclick="applyCron('0 */6 * * *')" style="padding:10px;background:white;border:1px solid #eee;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;"><span>每6小时</span><code style="color:#4361ee">0 */6 * * *</code></div>
        <div class="cron-tpl" onclick="applyCron('0 0 1 * *')" style="padding:10px;background:white;border:1px solid #eee;border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;"><span>每月1号午夜</span><code style="color:#4361ee">0 0 1 * *</code></div>
      </div>
    </div>
  </div>
  <script>
    const selIds = ['c-min','c-hour','c-day','c-month','c-week'];
    const inputIds = ['c-min-v','c-hour-v','c-day-v','c-month-v','c-week-v'];
    selIds.forEach((id, i) => {
      document.getElementById(id).addEventListener('change', function() {
        document.getElementById(inputIds[i]).style.display = this.value === 'custom' ? 'block' : 'none';
        genCron();
      });
      document.getElementById(inputIds[i]).addEventListener('input', genCron);
    });
    function getVal(i) {
      const sel = document.getElementById(selIds[i]);
      if (sel.value === 'custom') return document.getElementById(inputIds[i]).value || '*';
      return sel.value;
    }
    function genCron() {
      const expr = [0,1,2,3,4].map(i => getVal(i)).join(' ');
      document.getElementById('cron-expr').textContent = expr;
      document.getElementById('cron-desc').textContent = describeCron(expr);
    }
    function describeCron(expr) {
      const parts = expr.split(/\s+/);
      if (parts.length !== 5) return '无效的 Cron 表达式';
      const [min, hour, day, month, week] = parts;
      const desc = [];
      const weekNames = ['周日','周一','周二','周三','周四','周五','周六'];
      desc.push(min === '*' ? '每分钟' : `第 ${min} 分钟`);
      desc.push(hour === '*' ? '每小时' : `${hour} 点`);
      desc.push(day === '*' ? '每天' : `每月 ${day} 号`);
      desc.push(month === '*' ? '' : `${month} 月`);
      if (week !== '*') {
        if (week === '1-5') desc.push('工作日');
        else if (week === '0,6') desc.push('周末');
        else desc.push(week.split(',').map(w => weekNames[parseInt(w)] || w).join('、'));
      }
      return desc.filter(Boolean).join('，') + '执行';
    }
    function parseCron() {
      const expr = document.getElementById('parse-input').value.trim();
      document.getElementById('parse-result').innerHTML = `<div style="padding:16px;background:#eef1ff;border-radius:10px;"><div style="font-size:0.85rem;color:#888;">解析结果</div><div style="font-size:1.1rem;font-weight:600;color:#4361ee;margin-top:4px;">${describeCron(expr)}</div></div>`;
    }
    function applyCron(expr) {
      document.getElementById('parse-input').value = expr;
      parseCron();
    }
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
