<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汇率换算 - 人民币美元欧元在线换算 - 在线工具箱</title>
  <meta name="description" content="在线汇率换算工具，支持人民币、美元、欧元、日元、英镑、港币等主流货币互转。参考汇率（手动更新），仅供估算参考。免费使用。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../../manifest.json">
  <meta property="og:title" content="汇率换算工具">
  <meta property="og:description" content="人民币、美元、欧元、日元等主流货币在线换算。">
  <meta property="og:url" content="https://eitools.cn/src/tools/exchange-rate.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/exchange-rate.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "汇率换算工具",
    "url": "https://eitools.cn/src/tools/exchange-rate.html",
    "description": "人民币、美元、欧元、日元等主流货币在线换算。",
    "applicationCategory": "FinanceApplication",
    "operatingSystem": "Any",
    "offers": {"@type": "Offer", "price": "0"}
  }
  </script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHMQZC85HG"></script>
  <script src="../../js/analytics.js"></script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>汇率换算</h1>
    </div>

    <p style="color:#e67700;font-size:0.85rem;margin-bottom:16px;background:#fff3cd;padding:10px 16px;border-radius:8px;">* 汇率为手动更新的参考值（2026年3月），仅供估算参考，不构成投资建议。实际交易请以银行或外汇平台实时报价为准。</p>

    <div style="background:white;border-radius:12px;padding:24px;margin-bottom:20px;border:1px solid #eee;">
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:end;">
        <div>
          <label style="display:block;font-size:0.9rem;color:#666;margin-bottom:6px;">从</label>
          <select id="fromCurrency" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px;"></select>
          <input type="number" id="fromAmount" value="100" step="0.01" min="0" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:16px;font-weight:bold;">
        </div>
        <button class="btn btn-primary" onclick="swapCurrencies()" style="padding:12px 20px;border-radius:50%;min-width:auto;" title="互换货币">⇄</button>
        <div>
          <label style="display:block;font-size:0.9rem;color:#666;margin-bottom:6px;">到</label>
          <select id="toCurrency" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:8px;"></select>
          <input type="text" id="toAmount" readonly style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:16px;font-weight:bold;background:#fafafa;color:#4361ee;">
        </div>
      </div>
    </div>

    <div id="rateInfo" style="background:white;border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid #eee;font-size:0.9rem;color:#666;text-align:center;"></div>

    <div style="background:white;border-radius:12px;padding:24px;margin-bottom:20px;border:1px solid #eee;">
      <h3 style="margin-bottom:16px;">常用汇率速查</h3>
      <div id="quickRates" style="overflow-x:auto;"></div>
    </div>

    <div style="background:white;border-radius:12px;padding:24px;margin-bottom:20px;border:1px solid #eee;">
      <h3 style="margin-bottom:16px;">自定义换算表</h3>
      <p style="font-size:0.85rem;color:#999;margin-bottom:12px;">输入金额，一次查看多种货币换算结果</p>
      <input type="number" id="customAmount" value="1000" step="0.01" min="0" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;">
      <select id="customCurrency" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;"></select>
      <button class="btn btn-primary" onclick="calcTable()" style="width:100%;">生成换算表</button>
      <div id="convertTable" style="margin-top:12px;"></div>
    </div>

    <div id="toast" class="toast"></div>
  </div>
  <div style="margin-top:32px;padding:20px;background:#f0f2f5;border-radius:12px;">
  <h3 style="font-size:0.95rem;margin:0 0 12px;color:#333;">相关工具推荐</h3>
  <div style="display:flex;flex-wrap:wrap;gap:8px;">
    <a href="profit-calculator.html" style="padding:6px 14px;background:white;border:1px solid #ddd;border-radius:16px;color:#4361ee;text-decoration:none;font-size:0.85rem;">利润计算</a>
    <a href="stock-return.html" style="padding:6px 14px;background:white;border:1px solid #ddd;border-radius:16px;color:#4361ee;text-decoration:none;font-size:0.85rem;">股票收益率</a>
  </div>
</div>
<div id="share-bar"></div>
  <script src="../../js/share.js"></script>
  <script>
    // 基准货币：1 单位外币 = ? 人民币（参考汇率，手动更新于 2026年3月）
    // 数据来源：公开汇率参考，仅供估算，不构成投资建议
    const RATES = {
      'CNY': { name: '人民币', symbol: '¥', rate: 1 },
      'USD': { name: '美元', symbol: '$', rate: 7.25 },
      'EUR': { name: '欧元', symbol: '€', rate: 7.88 },
      'GBP': { name: '英镑', symbol: '£', rate: 9.18 },
      'JPY': { name: '日元', symbol: '¥', rate: 0.048 },
      'KRW': { name: '韩元', symbol: '₩', rate: 0.0053 },
      'HKD': { name: '港币', symbol: 'HK$', rate: 0.93 },
      'TWD': { name: '新台币', symbol: 'NT$', rate: 0.22 },
      'SGD': { name: '新加坡元', symbol: 'S$', rate: 5.38 },
      'AUD': { name: '澳元', symbol: 'A$', rate: 4.68 },
      'CAD': { name: '加元', symbol: 'C$', rate: 5.28 },
      'CHF': { name: '瑞士法郎', symbol: 'Fr', rate: 8.12 },
      'THB': { name: '泰铢', symbol: '฿', rate: 0.21 },
      'MYR': { name: '马来西亚令吉', symbol: 'RM', rate: 1.63 },
      'RUB': { name: '俄罗斯卢布', symbol: '₽', rate: 0.082 },
      'INR': { name: '印度卢比', symbol: '₹', rate: 0.087 }
    };

    function populateSelects() {
      const fromSel = document.getElementById('fromCurrency');
      const toSel = document.getElementById('toCurrency');
      const customSel = document.getElementById('customCurrency');
      Object.entries(RATES).forEach(([code, info]) => {
        const opt1 = new Option(`${code} - ${info.name}`, code);
        const opt2 = new Option(`${code} - ${info.name}`, code);
        const opt3 = new Option(`${code} - ${info.name}`, code);
        fromSel.add(opt1);
        toSel.add(opt2);
        customSel.add(opt3);
      });
      fromSel.value = 'CNY';
      toSel.value = 'USD';
    }

    function convert() {
      const from = document.getElementById('fromCurrency').value;
      const to = document.getElementById('toCurrency').value;
      const amount = parseFloat(document.getElementById('fromAmount').value);

      if (isNaN(amount) || amount < 0) { showToast('请输入有效金额'); return; }

      // 先转人民币，再转目标货币
      const cny = amount * RATES[from].rate;
      const result = cny / RATES[to].rate;

      document.getElementById('toAmount').value = result.toFixed(4);

      const directRate = RATES[from].rate / RATES[to].rate;
      document.getElementById('rateInfo').innerHTML =
        `1 ${from} (${RATES[from].name}) = <b>${directRate.toFixed(6)}</b> ${to} (${RATES[to].name})<br>` +
        `1 ${to} (${RATES[to].name}) = <b>${(1/directRate).toFixed(6)}</b> ${from} (${RATES[from].name})`;
    }

    function swapCurrencies() {
      const from = document.getElementById('fromCurrency');
      const to = document.getElementById('toCurrency');
      [from.value, to.value] = [to.value, from.value];
      convert();
    }

    function renderQuickRates() {
      const popular = ['USD', 'EUR', 'GBP', 'JPY', 'HKD', 'KRW', 'TWD', 'AUD', 'THB', 'SGD'];
      let html = '<table style="width:100%;border-collapse:collapse;font-size:0.9rem;">';
      html += '<tr style="background:#f0f2f5;"><th style="padding:10px;text-align:left;">货币</th><th style="padding:10px;text-align:right;">兑人民币</th><th style="padding:10px;text-align:right;">人民币兑</th></tr>';
      popular.forEach(code => {
        const r = RATES[code];
        html += `<tr style="border-bottom:1px solid #eee;">
          <td style="padding:8px 10px;">${r.symbol} ${code} - ${r.name}</td>
          <td style="padding:8px 10px;text-align:right;">${r.rate.toFixed(4)}</td>
          <td style="padding:8px 10px;text-align:right;">${(1/r.rate).toFixed(4)}</td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('quickRates').innerHTML = html;
    }

    function calcTable() {
      const amount = parseFloat(document.getElementById('customAmount').value);
      const from = document.getElementById('customCurrency').value;
      if (isNaN(amount) || amount < 0) { showToast('请输入有效金额'); return; }

      const cny = amount * RATES[from].rate;
      let html = '<table style="width:100%;border-collapse:collapse;font-size:0.9rem;">';
      html += '<tr style="background:#f0f2f5;"><th style="padding:10px;text-align:left;">货币</th><th style="padding:10px;text-align:right;">换算金额</th></tr>';
      Object.entries(RATES).forEach(([code, info]) => {
        if (code === from) return;
        const result = cny / info.rate;
        html += `<tr style="border-bottom:1px solid #eee;">
          <td style="padding:8px 10px;">${info.symbol} ${code} - ${info.name}</td>
          <td style="padding:8px 10px;text-align:right;font-weight:bold;">${result.toFixed(2)}</td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('convertTable').innerHTML = html;
    }

    // 事件监听
    document.getElementById('fromAmount').addEventListener('input', convert);
    document.getElementById('fromCurrency').addEventListener('change', convert);
    document.getElementById('toCurrency').addEventListener('change', convert);

    // 初始化
    populateSelects();
    renderQuickRates();
    convert();

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
