<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文本去重 - 在线工具箱</title>
  <meta name="description" content="免费在线文本去重工具，快速删除重复行，支持按行去重、排序去重。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>文本去重</h1>
    </div>

    <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 16px;">
      <label><input type="checkbox" id="ignoreCase"> 忽略大小写</label>
      <label><input type="checkbox" id="trimSpaces" checked> 去除首尾空格</label>
      <label><input type="checkbox" id="removeEmpty" checked> 去除空行</label>
      <label><input type="checkbox" id="sortResult"> 结果排序</label>
    </div>

    <textarea id="input" placeholder="每行一条，粘贴需要去重的文本..." style="min-height: 150px;">apple
banana
Apple
orange
banana
grape
ORANGE</textarea>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="deduplicate()">去重</button>
      <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>

    <div style="margin: 12px 0; color: #666; font-size: 0.9rem;" id="stats"></div>

    <div id="result" class="result-box" style="min-height: 100px;"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function deduplicate() {
      const text = document.getElementById('input').value;
      if (!text.trim()) { showToast('请输入文本'); return; }

      const ignoreCase = document.getElementById('ignoreCase').checked;
      const trimSpaces = document.getElementById('trimSpaces').checked;
      const removeEmpty = document.getElementById('removeEmpty').checked;
      const sortResult = document.getElementById('sortResult').checked;

      let lines = text.split('\n');

      if (trimSpaces) lines = lines.map(l => l.trim());
      if (removeEmpty) lines = lines.filter(l => l.length > 0);

      const seen = new Set();
      const unique = [];
      for (const line of lines) {
        const key = ignoreCase ? line.toLowerCase() : line;
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(line);
        }
      }

      if (sortResult) unique.sort((a, b) => a.localeCompare(b, 'zh-CN'));

      document.getElementById('result').textContent = unique.join('\n');
      document.getElementById('stats').textContent =
        `原始 ${lines.length} 行 → 去重后 ${unique.length} 行（移除 ${lines.length - unique.length} 行重复）`;
    }

    function copyResult() {
      const text = document.getElementById('result').textContent;
      if (!text) { showToast('请先去重'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('已复制'));
    }

    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('result').textContent = '';
      document.getElementById('stats').textContent = '';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
