<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPA计算器 - 绩点计算 - 在线工具箱</title>
  <meta name="description" content="免费在线GPA计算器。支持4.0/5.0/百分制，添加课程成绩自动计算GPA、学分绩点和加权平均分。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="GPA计算器 - 绩点计算">
  <meta property="og:description" content="在线GPA计算，支持多种评分标准。">
  <meta property="og:url" content="https://eitools.cn/src/tools/gpa-calculator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/gpa-calculator.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"GPA计算器","description":"在线GPA和学分绩点计算","url":"https://eitools.cn/src/tools/gpa-calculator.html","applicationCategory":"EducationalApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>GPA 计算器</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">输入课程名称、学分、成绩，自动计算 GPA 和加权平均分。</p>
    <div style="max-width:800px;">
      <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <label style="font-size:0.85rem;">评分标准：</label>
        <select id="scale" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;">
          <option value="4">4.0 制</option>
          <option value="5">5.0 制</option>
          <option value="100">百分制</option>
        </select>
      </div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:12px;">
        <thead>
          <tr style="background:#4361ee;color:white;">
            <th style="padding:8px;border:1px solid #ddd;width:30%;">课程名称</th>
            <th style="padding:8px;border:1px solid #ddd;width:15%;">学分</th>
            <th style="padding:8px;border:1px solid #ddd;width:20%;">成绩</th>
            <th style="padding:8px;border:1px solid #ddd;width:15%;">绩点</th>
            <th style="padding:8px;border:1px solid #ddd;width:10%;"></th>
          </tr>
        </thead>
        <tbody id="courseTable"></tbody>
      </table>
      <button onclick="addCourse()" style="padding:8px 20px;background:#2f9e44;color:white;border:none;border-radius:8px;cursor:pointer;margin-bottom:16px;">+ 添加课程</button>
      <div id="result" style="padding:20px;background:#f8f9fa;border-radius:12px;"></div>
    </div>
  </div>
  <script>
    const GRADE_MAP_4 = {'A+':4,'A':4,'A-':3.7,'B+':3.3,'B':3,'B-':2.7,'C+':2.3,'C':2,'C-':1.7,'D+':1.3,'D':1,'F':0};
    const GRADE_MAP_5 = {'A+':5,'A':5,'A-':4.5,'B+':4,'B':3.5,'B-':3,'C+':2.5,'C':2,'C-':1.5,'D+':1,'D':0.5,'F':0};
    let courseCount = 0;
    function addCourse(name='', credit='', grade='') {
      courseCount++;
      const id = courseCount;
      const row = document.createElement('tr');
      row.id = 'row-' + id;
      row.innerHTML = `<td style="padding:4px;border:1px solid #eee;"><input type="text" value="${escapeHtml(name)}" class="cname" placeholder="课程名" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;" oninput="calc()"></td>
        <td style="padding:4px;border:1px solid #eee;"><input type="number" value="${credit}" class="ccredit" min="0.5" step="0.5" placeholder="学分" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;" oninput="calc()"></td>
        <td style="padding:4px;border:1px solid #eee;"><input type="text" value="${grade}" class="cgrade" placeholder="成绩" style="width:100%;padding:6px;border:1px solid #ddd;border-radius:4px;" oninput="calc()"></td>
        <td style="padding:4px;border:1px solid #eee;text-align:center;" class="cpoint">-</td>
        <td style="padding:4px;border:1px solid #eee;text-align:center;"><button onclick="removeCourse(${id})" style="background:none;border:none;color:#c92a2a;cursor:pointer;font-size:1.2rem;">&times;</button></td>`;
      document.getElementById('courseTable').appendChild(row);
      calc();
    }
    function removeCourse(id) {
      const row = document.getElementById('row-' + id);
      if (row) row.remove();
      calc();
    }
    function getPoint(grade) {
      const scale = document.getElementById('scale').value;
      grade = grade.trim().toUpperCase();
      if (scale === '100') {
        const num = parseFloat(grade);
        if (isNaN(num)) return null;
        if (num >= 90) return 4;
        if (num >= 85) return 3.7;
        if (num >= 82) return 3.3;
        if (num >= 78) return 3;
        if (num >= 75) return 2.7;
        if (num >= 72) return 2.3;
        if (num >= 68) return 2;
        if (num >= 64) return 1.5;
        if (num >= 60) return 1;
        return 0;
      }
      const map = scale === '5' ? GRADE_MAP_5 : GRADE_MAP_4;
      return map[grade] !== undefined ? map[grade] : null;
    }
    function calc() {
      const rows = document.querySelectorAll('#courseTable tr');
      let totalCredit = 0, totalPoint = 0;
      rows.forEach(row => {
        const credit = parseFloat(row.querySelector('.ccredit').value) || 0;
        const grade = row.querySelector('.cgrade').value.trim();
        const point = getPoint(grade);
        row.querySelector('.cpoint').textContent = point !== null ? point.toFixed(1) : '-';
        if (point !== null && credit > 0) {
          totalCredit += credit;
          totalPoint += credit * point;
        }
      });
      const gpa = totalCredit > 0 ? (totalPoint / totalCredit) : 0;
      const maxGpa = document.getElementById('scale').value === '5' ? 5 : 4;
      document.getElementById('result').innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center;">
          <div>
            <div style="font-size:2rem;font-weight:700;color:#4361ee;">${gpa.toFixed(2)}</div>
            <div style="font-size:0.85rem;color:#888;">GPA（满分 ${maxGpa}）</div>
          </div>
          <div>
            <div style="font-size:2rem;font-weight:700;">${totalCredit.toFixed(1)}</div>
            <div style="font-size:0.85rem;color:#888;">总学分</div>
          </div>
          <div>
            <div style="font-size:2rem;font-weight:700;color:${gpa/maxGpa>=0.8?'#2f9e44':gpa/maxGpa>=0.6?'#e67700':'#c92a2a'};">${(gpa/maxGpa*100).toFixed(1)}%</div>
            <div style="font-size:0.85rem;color:#888;">GPA 占比</div>
          </div>
        </div>`;
    }
    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    addCourse('高等数学','4','A');
    addCourse('大学英语','3','B+');
    addCourse('程序设计','3','A-');
    addCourse('线性代数','3','B');
    document.getElementById('scale').addEventListener('change', calc);
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
