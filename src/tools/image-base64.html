<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图片转Base64 - Base64转图片 - 在线工具箱</title>
  <meta name="description" content="免费在线图片转Base64工具，将图片文件转换为Base64编码字符串，或将Base64字符串还原为图片。支持JPG/PNG/GIF/WebP格式。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="图片转Base64 - Base64转图片">
  <meta property="og:description" content="图片与Base64编码互转，CSS/HTML内联图片。">
  <meta property="og:url" content="https://eitools.cn/src/tools/image-base64.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/image-base64.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"图片转Base64","description":"图片与Base64编码互转","url":"https://eitools.cn/src/tools/image-base64.html","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>图片转 Base64</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">将图片转换为 Base64 编码，或将 Base64 字符串还原为图片。</p>
    <div style="max-width:700px;">
      <div style="display:flex;gap:8px;margin-bottom:20px;">
        <button onclick="switchMode('encode')" id="mode-encode" class="tab-btn active">图片 → Base64</button>
        <button onclick="switchMode('decode')" id="mode-decode" class="tab-btn">Base64 → 图片</button>
      </div>

      <div id="encode-area">
        <input type="file" id="fileInput" accept="image/*" onchange="encodeImage(this.files[0])" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px;">
        <div id="preview" style="display:none;margin-bottom:16px;">
          <img id="preview-img" style="max-width:200px;border-radius:8px;border:1px solid #eee;">
          <p id="file-info" style="font-size:0.85rem;color:#888;margin-top:4px;"></p>
        </div>
        <div id="encode-result" style="display:none;">
          <div style="display:flex;gap:8px;margin-bottom:8px;">
            <button class="btn btn-primary" onclick="navigator.clipboard.writeText(document.getElementById('base64-output').value)" style="padding:6px 16px;font-size:0.85rem;">复制 Base64</button>
            <button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('css-output').value)" style="padding:6px 16px;font-size:0.85rem;">复制 CSS</button>
            <button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('html-output').value)" style="padding:6px 16px;font-size:0.85rem;">复制 HTML</button>
          </div>
          <p style="font-size:0.85rem;color:#888;margin-bottom:4px;">Base64 编码</p>
          <textarea id="base64-output" rows="4" readonly style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-family:monospace;font-size:0.8rem;"></textarea>
          <p style="font-size:0.85rem;color:#888;margin-top:12px;margin-bottom:4px;">CSS 用法</p>
          <code id="css-output" style="display:block;padding:8px;background:#1a1a2e;color:#a8dadc;border-radius:6px;font-size:0.8rem;word-break:break-all;"></code>
          <p style="font-size:0.85rem;color:#888;margin-top:12px;margin-bottom:4px;">HTML 用法</p>
          <code id="html-output" style="display:block;padding:8px;background:#1a1a2e;color:#a8dadc;border-radius:6px;font-size:0.8rem;word-break:break-all;"></code>
        </div>
      </div>

      <div id="decode-area" style="display:none;">
        <textarea id="base64-input" rows="6" placeholder="粘贴 Base64 字符串（带或不带 data:image/xxx;base64, 前缀）" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.85rem;resize:vertical;margin-bottom:12px;"></textarea>
        <button class="btn btn-primary" onclick="decodeImage()" style="margin-bottom:16px;">解码为图片</button>
        <div id="decode-preview"></div>
      </div>
    </div>
  </div>
  <style>.tab-btn{padding:8px 20px;border:1px solid #ddd;border-radius:8px;cursor:pointer;background:white;font-size:0.9rem;}.tab-btn.active{background:#4361ee;color:white;border-color:#4361ee;}</style>
  <script>
    function switchMode(mode) {
      document.getElementById('encode-area').style.display = mode === 'encode' ? 'block' : 'none';
      document.getElementById('decode-area').style.display = mode === 'decode' ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('mode-' + mode).classList.add('active');
    }
    function encodeImage(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        const base64 = e.target.result;
        document.getElementById('base64-output').value = base64;
        document.getElementById('preview-img').src = base64;
        document.getElementById('preview').style.display = 'block';
        document.getElementById('file-info').textContent = `${file.name} (${(file.size/1024).toFixed(1)} KB) → Base64 (${(base64.length/1024).toFixed(1)} KB)`;
        document.getElementById('css-output').textContent = `background-image: url(${base64});`;
        document.getElementById('html-output').innerHTML = `&lt;img src="${base64}" alt="image"&gt;`;
        document.getElementById('encode-result').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
    function decodeImage() {
      let base64 = document.getElementById('base64-input').value.trim();
      if (!base64) return;
      if (!base64.startsWith('data:')) base64 = 'data:image/png;base64,' + base64;
      document.getElementById('decode-preview').innerHTML = `<img src="${base64}" style="max-width:300px;border-radius:8px;border:1px solid #eee;">
        <br><a href="${base64}" download="decoded-image.png" class="btn" style="display:inline-block;margin-top:8px;padding:8px 16px;font-size:0.85rem;text-decoration:none;">下载图片</a>`;
    }
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
