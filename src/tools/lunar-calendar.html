<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万年历 - 农历查询、节假日黄历 - 在线工具箱</title>

  <meta property="og:title" content="万年历 - 农历查询与黄历对照">
  <meta property="og:description" content="公历农历对照、节假日、黄历宜忌查询。">

  {"@context":"https://schema.org","@type":"WebApplication","name":"万年历","description":"公历农历对照与节假日查询","url":"https://eitools.cn/src/tools/lunar-calendar.html","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>

<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>万年历</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">公历农历对照、节假日、生肖查询。</p>
    <div style="max-width:600px;">
      <div style="display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;">
        <button class="btn btn-secondary" onclick="changeMonth(-1)" style="padding:10px 16px;">&larr;</button>
        <input type="month" id="ym" style="flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem;" onchange="render()">
        <button class="btn btn-secondary" onclick="changeMonth(1)" style="padding:10px 16px;">&rarr;</button>
        <button class="btn btn-secondary" onclick="goToday()" style="padding:10px 16px;">今天</button>
      </div>
      <div id="calendar" style="background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,0.1);overflow:hidden;"></div>
      <div id="detail" style="margin-top:16px;padding:16px;background:#f0f2f5;border-radius:12px;"></div>
    </div>
  </div>
  <script>
    const now = new Date();
    document.getElementById('ym').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

    const tianGan = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const diZhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const animals = ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'];
    const lunarMonths = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
    const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
    const solarTerms = ['小寒','大寒','立春','雨水','惊蛰','春分','清明','谷雨','立夏','小满','芒种','夏至','小暑','大暑','立秋','处暑','白露','秋分','寒露','霜降','立冬','小雪','大雪','冬至'];
    const holidays = {
      '1-1':'元旦','2-14':'情人节','3-8':'妇女节','3-12':'植树节','4-1':'愚人节','5-1':'劳动节','5-4':'青年节',
      '6-1':'儿童节','7-1':'建党节','8-1':'建军节','9-10':'教师节','10-1':'国庆节','10-2':'国庆节','10-3':'国庆节',
      '12-24':'平安夜','12-25':'圣诞节'
    };
    const weekNames = ['日','一','二','三','四','五','六'];

    function getAnimal(year) { return animals[(year - 4) % 12]; }
    function getGanZhi(year) { return tianGan[(year - 4) % 10] + diZhi[(year - 4) % 12]; }

    function simpleLunarDate(year, month, day) {
      // Simplified lunar calendar approximation using known offsets
      // This is a basic approximation - not fully accurate for all dates
      const lunarInfo = [
        0x04bd8,0x04ae0,0x0a570,0x054d5,0x0d260,0x0d950,0x16554,0x056a0,0x09ad0,0x055d2,
        0x04ae0,0x0a5b6,0x0a4d0,0x0d250,0x1d255,0x0b540,0x0d6a0,0x0ada2,0x095b0,0x14977,
        0x04970,0x0a4b0,0x0b4b5,0x06a50,0x06d40,0x1ab54,0x02b60,0x09570,0x052f2,0x04970,
        0x06566,0x0d4a0,0x0ea50,0x06e95,0x05ad0,0x02b60,0x186e3,0x092e0,0x1c8d7,0x0c950,
        0x0d4a0,0x1d8a6,0x0b550,0x056a0,0x1a5b4,0x025d0,0x092d0,0x0d2b2,0x0a950,0x0b557,
        0x06ca0,0x0b550,0x15355,0x04da0,0x0a5b0,0x14573,0x052b0,0x0a9a8,0x0e950,0x06aa0,
        0x0aea6,0x0ab50,0x04b60,0x0aae4,0x0a570,0x05260,0x0f263,0x0d950,0x05b57,0x056a0,
        0x096d0,0x04dd5,0x04ad0,0x0a4d0,0x0d4d4,0x0d250,0x0d558,0x0b540,0x0b6a0,0x195a6,
        0x095b0,0x049b0,0x0a974,0x0a4b0,0x0b27a,0x06a50,0x06d40,0x0af46,0x0ab60,0x09570,
        0x04af5,0x04970,0x064b0,0x074a3,0x0ea50,0x06b58,0x05ac0,0x0ab60,0x096d5,0x092e0,
        0x0c960,0x0d954,0x0d4a0,0x0da50,0x07552,0x056a0,0x0abb7,0x025d0,0x092d0,0x0cab5,
        0x0a950,0x0b4a0,0x0baa4,0x0ad50,0x055d9,0x04ba0,0x0a5b0,0x15176,0x052b0,0x0a930,
        0x07954,0x06aa0,0x0ad50,0x05b52,0x04b60,0x0a6e6,0x0a4e0,0x0d260,0x0ea65,0x0d530,
        0x05aa0,0x076a3,0x096d0,0x04afb,0x04ad0,0x0a4d0,0x1d0b6,0x0d250,0x0d520,0x0dd45,
        0x0b5a0,0x056d0,0x055b2,0x049b0,0x0a577,0x0a4b0,0x0aa50,0x1b255,0x06d20,0x0ada0,
        0x14b63
      ];

      function lYearDays(y) {
        let s = 348;
        for (let i = 0x8000; i > 0x8; i >>= 1) s += (lunarInfo[y - 1900] & i) ? 1 : 0;
        return s + leapDays(y);
      }
      function leapMonth(y) { return lunarInfo[y - 1900] & 0xf; }
      function leapDays(y) { if (leapMonth(y)) return (lunarInfo[y - 1900] & 0x10000) ? 30 : 29; return 0; }
      function monthDays(y, m) { return (lunarInfo[y - 1900] & (0x10000 >> m)) ? 30 : 29; }

      let offset = Math.floor((new Date(1900, 0, 31).getTime()) / 86400000);
      let target = Math.floor((new Date(year, month - 1, day).getTime()) / 86400000);
      let diff = target - offset;
      if (diff < 0) return { month: 11, day: 29, year: year - 1, isLeap: false };

      let ly = 1900;
      let temp;
      for (ly = 1900; ly < 2101 && diff > 0; ly++) {
        temp = lYearDays(ly);
        diff -= temp;
      }
      if (diff < 0) { diff += temp; ly--; }
      let lm = 1, leap = leapMonth(ly), isLeap = false;
      for (lm = 1; lm < 13 && diff > 0; lm++) {
        if (leap > 0 && lm === (leap + 1) && !isLeap) {
          --lm; isLeap = true; temp = leapDays(ly);
        } else { temp = monthDays(ly, lm); }
        if (isLeap && lm === (leap + 1)) isLeap = false;
        diff -= temp;
      }
      if (diff === 0 && leap > 0 && lm === leap + 1) { if (isLeap) isLeap = false; else { isLeap = true; --lm; } }
      if (diff < 0) { diff += temp; --lm; }
      return { year: ly, month: lm - 1, day: diff, isLeap };
    }

    function render() {
      const [y, m] = document.getElementById('ym').value.split('-').map(Number);
      const firstDay = new Date(y, m - 1, 1).getDay();
      const daysInMonth = new Date(y, m, 0).getDate();
      const today = new Date();
      const animal = getAnimal(y);
      const ganZhi = getGanZhi(y);

      let html = `<div style="padding:16px;background:#4361ee;color:white;display:flex;justify-content:space-between;align-items:center;">
        <div><div style="font-size:1.2rem;font-weight:700;">${y}年${m}月</div><div style="font-size:0.85rem;opacity:0.8;">${ganZhi}年（${animal}年）</div></div>
        <div style="text-align:right;"><div style="font-size:0.85rem;opacity:0.8;">农历 ${lunarMonths[simpleLunarDate(y,m,1).month]}</div></div></div>`;
      html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center;">';
      html += weekNames.map(w => `<div style="padding:8px;font-size:0.8rem;color:#888;font-weight:600;${w==='日'?'color:#e03131':''}">${w}</div>`).join('');

      for (let i = 0; i < firstDay; i++) html += '<div></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const isToday = today.getFullYear() === y && today.getMonth() === m - 1 && today.getDate() === d;
        const dow = new Date(y, m - 1, d).getDay();
        const lunar = simpleLunarDate(y, m, d);
        const lunarStr = lunarDays[lunar.day - 1] || '';
        const holiday = holidays[`${m}-${d}`] || '';
        const label = holiday || (lunar.day === 1 ? lunarMonths[lunar.month] : lunarStr);
        const isWeekend = dow === 0 || dow === 6;
        html += `<div onclick="showDetail(${y},${m},${d})" style="padding:6px 4px;cursor:pointer;border-radius:8px;${isToday ? 'background:#4361ee;color:white;' : ''}transition:background 0.15s;" onmouseover="this.style.background=this.style.background||'#f0f2f5'" onmouseout="this.style.background='${isToday?'#4361ee':''}'">
          <div style="font-size:0.95rem;font-weight:${isToday?'700':'400'};color:${!isToday && isWeekend ? '#e03131' : ''}">${d}</div>
          <div style="font-size:0.65rem;color:${isToday?'rgba(255,255,255,0.8)': holiday ? '#e03131' : '#999'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${label}</div></div>`;
      }
      html += '</div>';
      document.getElementById('calendar').innerHTML = html;
      showDetail(y, m, today.getDate());
    }

    function showDetail(y, m, d) {
      const lunar = simpleLunarDate(y, m, d);
      const animal = getAnimal(lunar.year);
      const ganZhi = getGanZhi(lunar.year);
      const holiday = holidays[`${m}-${d}`] || '';
      const dow = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'][new Date(y, m-1, d).getDay()];
      document.getElementById('detail').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:0.9rem;">
          <div><span style="color:#888;">公历：</span><strong>${y}年${m}月${d}日</strong></div>
          <div><span style="color:#888;">${dow}</span>${holiday ? `<span style="color:#e03131;margin-left:8px;font-weight:600;">${holiday}</span>` : ''}</div>
          <div><span style="color:#888;">农历：</span><strong>${lunarMonths[lunar.month]}${lunarDays[lunar.day-1]}</strong></div>
          <div><span style="color:#888;">生肖：</span><strong>${animal}</strong></div>
          <div><span style="color:#888;">干支：</span><strong>${ganZhi}年</strong></div>
          <div><span style="color:#888;">农历年：</span><strong>${lunar.year}年</strong></div>
        </div>`;
    }

    function changeMonth(delta) {
      const [y, m] = document.getElementById('ym').value.split('-').map(Number);
      const d = new Date(y, m - 1 + delta, 1);
      document.getElementById('ym').value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      render();
    }
    function goToday() {
      const t = new Date();
      document.getElementById('ym').value = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`;
      render();
    }
    render();
  </script>
