<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本周星期几 - 今天是星期几 - 在线工具箱</title>
  <meta name="description" content="今天是星期几？在线查询任意日期是星期几，支持查询过去和未来的日期对应的星期。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="今天是星期几 - 任意日期星期查询">
  <meta property="og:description" content="在线查询任意日期对应的星期几。">
  <meta property="og:url" content="https://eitools.cn/src/tools/day-of-week.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/day-of-week.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"星期几查询","description":"查询任意日期是星期几","url":"https://eitools.cn/src/tools/day-of-week.html","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>今天是星期几？</h1>
    </div>
    <div style="max-width:500px;">
      <div id="today" style="padding:24px;background:#4361ee;color:white;border-radius:12px;text-align:center;margin-bottom:24px;">
        <div style="font-size:1rem;opacity:0.8;" id="today-date"></div>
        <div id="today-week" style="font-size:2.5rem;font-weight:900;margin:8px 0;"></div>
        <div id="today-info" style="font-size:0.9rem;opacity:0.8;"></div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:600;">查询任意日期</label>
        <input type="date" id="date-input" onchange="queryDate()" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:1rem;">
      </div>
      <div id="result" style="margin-top:16px;"></div>
      <div style="margin-top:24px;padding:20px;background:#f0f2f5;border-radius:12px;">
        <h2 style="font-size:1rem;margin-bottom:12px;">蔡勒公式（Zeller's Formula）</h2>
        <p style="font-size:0.9rem;color:#555;line-height:1.8;">
          计算星期的经典公式：W = (Y + ⌊Y/4⌋ + ⌊C/4⌋ - 2C + ⌊13(M+1)/5⌋ + D) mod 7<br>
          其中 Y=年份后两位, C=世纪, M=月(3=3月,14=2月...), D=日<br>
          结果 W: 0=周六, 1=周日, 2=周一, 3=周二, 4=周三, 5=周四, 6=周五
        </p>
      </div>
    </div>
  </div>
  <script>
    const weekNames = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    const shortNames = ['周日','周一','周二','周三','周四','周五','周六'];

    function init() {
      const now = new Date();
      const day = now.getDay();
      document.getElementById('today-date').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
      document.getElementById('today-week').textContent = weekNames[day];
      const dayOfYear = Math.ceil((now - new Date(now.getFullYear(),0,1)) / 86400000);
      const weekNum = Math.ceil(dayOfYear / 7);
      document.getElementById('today-info').textContent = `今年第 ${weekNum} 周，第 ${dayOfYear} 天`;
      document.getElementById('date-input').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    }

    function queryDate() {
      const d = document.getElementById('date-input').value;
      if (!d) return;
      const date = new Date(d);
      const day = date.getDay();
      const now = new Date();
      const diffMs = date - now;
      const diffDays = Math.round(diffMs / 86400000);
      let relative = '';
      if (diffDays === 0) relative = '（今天）';
      else if (diffDays === 1) relative = '（明天）';
      else if (diffDays === -1) relative = '（昨天）';
      else if (diffDays > 0) relative = `（${diffDays}天后）`;
      else relative = `（${Math.abs(diffDays)}天前）`;

      // Holiday check
      const holidays = {'1-1':'元旦','2-14':'情人节','3-8':'妇女节','4-1':'愚人节','5-1':'劳动节','5-4':'青年节','6-1':'儿童节','10-1':'国庆节','12-25':'圣诞节'};
      const m = date.getMonth() + 1, dd = date.getDate();
      const holiday = holidays[`${m}-${dd}`] || '';

      document.getElementById('result').innerHTML = `
        <div style="padding:20px;background:#f0f2f5;border-radius:12px;text-align:center;">
          <div style="font-size:1rem;color:#888;">${date.getFullYear()}年${m}月${dd}日</div>
          <div style="font-size:2rem;font-weight:800;color:#4361ee;margin:8px 0;">${weekNames[day]} ${relative}</div>
          ${holiday ? `<div style="color:#e03131;font-weight:600;font-size:1.1rem;">${holiday}</div>` : ''}
        </div>`;
    }
    init();
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
