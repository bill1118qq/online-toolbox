<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>倒计时 - 在线倒计时器/秒表 - 在线工具箱</title>
  <meta name="description" content="在线倒计时器，支持设置任意时间倒计时、秒表计时、定时提醒。可自定义标题，全屏显示。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="在线倒计时器 - 免费秒表与定时器">
  <meta property="og:description" content="在线倒计时，自定义时间，全屏大字显示。">
  <meta property="og:url" content="https://eitools.cn/src/tools/countdown.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/countdown.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"倒计时器","description":"在线倒计时和秒表","url":"https://eitools.cn/src/tools/countdown.html","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
  <style>
    .timer-display { font-size: 4rem; font-weight: 900; font-variant-numeric: tabular-nums; text-align: center; padding: 40px 0; color: #1a1a2e; }
    @media (max-width: 480px) { .timer-display { font-size: 2.5rem; padding: 24px 0; } }
    .timer-label { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>倒计时器</h1>
    </div>
    <div style="max-width:500px;margin:0 auto;">
      <div id="mode-tabs" style="display:flex;gap:0;margin-bottom:24px;border:2px solid #4361ee;border-radius:10px;overflow:hidden;">
        <button onclick="switchMode('countdown')" id="tab-cd" style="flex:1;padding:12px;border:none;background:#4361ee;color:white;font-size:1rem;cursor:pointer;font-weight:600;">倒计时</button>
        <button onclick="switchMode('stopwatch')" id="tab-sw" style="flex:1;padding:12px;border:none;background:white;color:#4361ee;font-size:1rem;cursor:pointer;font-weight:600;">秒表</button>
      </div>
      <div class="timer-label" id="timer-label">倒计时</div>
      <div class="timer-display" id="display">00:00:00</div>
      <div id="countdown-setup" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;">
        <div><label style="font-size:0.8rem;color:#888;">时</label><input type="number" id="cd-h" value="0" min="0" max="99" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:1.2rem;"></div>
        <div><label style="font-size:0.8rem;color:#888;">分</label><input type="number" id="cd-m" value="5" min="0" max="59" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:1.2rem;"></div>
        <div><label style="font-size:0.8rem;color:#888;">秒</label><input type="number" id="cd-s" value="0" min="0" max="59" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:1.2rem;"></div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;">
        <button class="btn btn-primary" id="btn-start" onclick="toggleTimer()" style="padding:14px 40px;font-size:1.1rem;">开始</button>
        <button class="btn btn-secondary" onclick="resetTimer()" style="padding:14px 30px;font-size:1.1rem;">重置</button>
      </div>
      <div id="sw-laps" style="margin-top:20px;"></div>
      <div style="margin-top:24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;">
        <button class="btn btn-secondary" onclick="quickSet(1)" style="font-size:0.85rem;padding:6px 14px;">1分钟</button>
        <button class="btn btn-secondary" onclick="quickSet(3)" style="font-size:0.85rem;padding:6px 14px;">3分钟</button>
        <button class="btn btn-secondary" onclick="quickSet(5)" style="font-size:0.85rem;padding:6px 14px;">5分钟</button>
        <button class="btn btn-secondary" onclick="quickSet(10)" style="font-size:0.85rem;padding:6px 14px;">10分钟</button>
        <button class="btn btn-secondary" onclick="quickSet(15)" style="font-size:0.85rem;padding:6px 14px;">15分钟</button>
        <button class="btn btn-secondary" onclick="quickSet(25)" style="font-size:0.85rem;padding:6px 14px;">25分钟</button>
        <button class="btn btn-secondary" onclick="quickSet(30)" style="font-size:0.85rem;padding:6px 14px;">30分钟</button>
        <button class="btn btn-secondary" onclick="quickSet(60)" style="font-size:0.85rem;padding:6px 14px;">60分钟</button>
      </div>
    </div>
  </div>
  <script>
    let mode = 'countdown', running = false, interval = null;
    let cdRemaining = 0, swElapsed = 0, swStart = 0, laps = [];
    function switchMode(m) {
      resetTimer(); mode = m;
      document.getElementById('tab-cd').style.background = m === 'countdown' ? '#4361ee' : 'white';
      document.getElementById('tab-cd').style.color = m === 'countdown' ? 'white' : '#4361ee';
      document.getElementById('tab-sw').style.background = m === 'stopwatch' ? '#4361ee' : 'white';
      document.getElementById('tab-sw').style.color = m === 'stopwatch' ? 'white' : '#4361ee';
      document.getElementById('countdown-setup').style.display = m === 'countdown' ? 'grid' : 'none';
      document.getElementById('timer-label').textContent = m === 'countdown' ? '倒计时' : '秒表';
    }
    function formatTime(ms) {
      const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
      return `${String(h).padStart(2,'0')}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }
    function toggleTimer() {
      if (running) { pauseTimer(); return; }
      if (mode === 'countdown') {
        if (cdRemaining <= 0) {
          const h = parseInt(document.getElementById('cd-h').value) || 0;
          const m = parseInt(document.getElementById('cd-m').value) || 0;
          const s = parseInt(document.getElementById('cd-s').value) || 0;
          cdRemaining = (h * 3600 + m * 60 + s) * 1000;
          if (cdRemaining <= 0) return;
        }
        running = true;
        document.getElementById('btn-start').textContent = '暂停';
        interval = setInterval(() => {
          cdRemaining -= 100;
          document.getElementById('display').textContent = formatTime(Math.max(0, cdRemaining));
          if (cdRemaining <= 0) {
            clearInterval(interval); running = false;
            document.getElementById('btn-start').textContent = '开始';
            document.getElementById('display').style.color = '#e03131';
            document.getElementById('display').textContent = '00:00:00';
            if ('Notification' in window && Notification.permission === 'granted') new Notification('倒计时结束！');
            setTimeout(() => document.getElementById('display').style.color = '#1a1a2e', 3000);
          }
        }, 100);
      } else {
        swStart = Date.now() - swElapsed;
        running = true;
        document.getElementById('btn-start').textContent = '计次';
        interval = setInterval(() => {
          swElapsed = Date.now() - swStart;
          document.getElementById('display').textContent = formatTime(swElapsed);
        }, 10);
      }
    }
    function pauseTimer() {
      clearInterval(interval); running = false;
      if (mode === 'countdown') { document.getElementById('btn-start').textContent = '继续'; }
      else { document.getElementById('btn-start').textContent = '继续'; laps.push(swElapsed); showLaps(); }
    }
    function resetTimer() {
      clearInterval(interval); running = false;
      cdRemaining = 0; swElapsed = 0; laps = [];
      document.getElementById('display').textContent = '00:00:00';
      document.getElementById('display').style.color = '#1a1a2e';
      document.getElementById('btn-start').textContent = mode === 'countdown' ? '开始' : '开始';
      document.getElementById('sw-laps').innerHTML = '';
    }
    function quickSet(min) {
      document.getElementById('cd-h').value = Math.floor(min / 60);
      document.getElementById('cd-m').value = min % 60;
      document.getElementById('cd-s').value = 0;
      resetTimer();
      document.getElementById('display').textContent = formatTime(min * 60 * 1000);
    }
    function showLaps() {
      let html = '<div style="max-height:200px;overflow-y:auto;">';
      laps.forEach((t, i) => { html += `<div style="display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid #eee;font-size:0.9rem;"><span>计次 ${i+1}</span><span style="font-family:monospace;">${formatTime(t)}</span></div>`; });
      html += '</div>';
      document.getElementById('sw-laps').innerHTML = html;
    }
    if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
