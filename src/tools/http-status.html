<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP状态码查询 - 状态码大全 - 在线工具箱</title>
  <meta name="description" content="HTTP状态码完整列表和含义。包含1xx-5xx所有常见状态码：200、301、302、403、404、500、502、503等，附带说明和使用场景。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="HTTP状态码大全 - 含义查询">
  <meta property="og:description" content="HTTP状态码完整列表、含义和使用场景说明。">
  <meta property="og:url" content="https://eitools.cn/src/tools/http-status.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/http-status.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"HTTP状态码查询","description":"HTTP状态码完整列表和含义查询","url":"https://eitools.cn/src/tools/http-status.html","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>HTTP 状态码大全</h1>
    </div>
    <p style="color:#666;margin-bottom:12px;">快速查询 HTTP 状态码含义，支持数字搜索。</p>
    <input type="text" id="search" oninput="filter()" placeholder="搜索状态码或描述..." style="width:100%;max-width:400px;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:1rem;margin-bottom:20px;">
    <div id="codes"></div>
  </div>
  <script>
    const STATUS = [
      {code:100,cat:'1xx',desc:'Continue',zh:'继续',detail:'客户端应继续发送请求'},
      {code:101,cat:'1xx',desc:'Switching Protocols',zh:'切换协议',detail:'服务器根据客户端请求切换协议'},
      {code:200,cat:'2xx',desc:'OK',zh:'成功',detail:'请求成功，服务器返回请求的数据'},
      {code:201,cat:'2xx',desc:'Created',zh:'已创建',detail:'请求成功并创建了新资源'},
      {code:204,cat:'2xx',desc:'No Content',zh:'无内容',detail:'请求成功但无返回内容'},
      {code:206,cat:'2xx',desc:'Partial Content',zh:'部分内容',detail:'返回部分请求的内容（范围请求）'},
      {code:301,cat:'3xx',desc:'Moved Permanently',zh:'永久重定向',detail:'资源已永久移动到新URL'},
      {code:302,cat:'3xx',desc:'Found',zh:'临时重定向',detail:'资源临时移动到新URL'},
      {code:304,cat:'3xx',desc:'Not Modified',zh:'未修改',detail:'资源未修改，可使用缓存'},
      {code:307,cat:'3xx',desc:'Temporary Redirect',zh:'临时重定向',detail:'保持请求方法不变的重定向'},
      {code:308,cat:'3xx',desc:'Permanent Redirect',zh:'永久重定向',detail:'保持请求方法不变的永久重定向'},
      {code:400,cat:'4xx',desc:'Bad Request',zh:'错误请求',detail:'服务器无法理解请求的语法'},
      {code:401,cat:'4xx',desc:'Unauthorized',zh:'未授权',detail:'请求需要用户身份验证'},
      {code:403,cat:'4xx',desc:'Forbidden',zh:'禁止访问',detail:'服务器拒绝执行请求'},
      {code:404,cat:'4xx',desc:'Not Found',zh:'未找到',detail:'请求的资源不存在'},
      {code:405,cat:'4xx',desc:'Method Not Allowed',zh:'方法不允许',detail:'请求方法不被允许'},
      {code:408,cat:'4xx',desc:'Request Timeout',zh:'请求超时',detail:'服务器等待请求超时'},
      {code:409,cat:'4xx',desc:'Conflict',zh:'冲突',detail:'请求与服务器当前状态冲突'},
      {code:410,cat:'4xx',desc:'Gone',zh:'已删除',detail:'资源已被永久删除'},
      {code:413,cat:'4xx',desc:'Payload Too Large',zh:'请求体过大',detail:'请求体超过服务器限制'},
      {code:414,cat:'4xx',desc:'URI Too Long',zh:'URI过长',detail:'请求的URI过长'},
      {code:415,cat:'4xx',desc:'Unsupported Media Type',zh:'不支持的媒体类型',detail:'请求的Content-Type不被支持'},
      {code:422,cat:'4xx',desc:'Unprocessable Entity',zh:'无法处理的实体',detail:'请求格式正确但语义错误'},
      {code:429,cat:'4xx',desc:'Too Many Requests',zh:'请求过多',detail:'超过频率限制，需降低请求速率'},
      {code:431,cat:'4xx',desc:'Request Header Fields Too Large',zh:'请求头过大',detail:'HTTP请求头字段过大'},
      {code:451,cat:'4xx',desc:'Unavailable For Legal Reasons',zh:'因法律原因不可用',detail:'因法律要求不可访问'},
      {code:500,cat:'5xx',desc:'Internal Server Error',zh:'服务器内部错误',detail:'服务器遇到未知错误'},
      {code:502,cat:'5xx',desc:'Bad Gateway',zh:'网关错误',detail:'网关/代理收到上游服务器的无效响应'},
      {code:503,cat:'5xx',desc:'Service Unavailable',zh:'服务不可用',detail:'服务器暂时无法处理请求（维护/过载）'},
      {code:504,cat:'5xx',desc:'Gateway Timeout',zh:'网关超时',detail:'网关/代理未及时收到上游服务器响应'},
      {code:505,cat:'5xx',desc:'HTTP Version Not Supported',zh:'HTTP版本不支持',detail:'服务器不支持请求的HTTP版本'},
    ];
    const catColors = {'1xx':'#6c757d','2xx':'#2f9e44','3xx':'#4361ee','4xx':'#e67700','5xx':'#c92a2a'};
    const catNames = {'1xx':'信息响应','2xx':'成功','3xx':'重定向','4xx':'客户端错误','5xx':'服务器错误'};
    function render(list) {
      let html = '', currentCat = '';
      list.forEach(s => {
        if (s.cat !== currentCat) {
          currentCat = s.cat;
          html += `<h2 style="margin-top:24px;color:${catColors[s.cat]};border-bottom:2px solid ${catColors[s.cat]};padding-bottom:8px;">${s.cat} ${catNames[s.cat]}</h2>`;
        }
        html += `<div style="display:flex;gap:12px;padding:10px;border-bottom:1px solid #f0f0f0;align-items:center;">
          <div style="width:60px;font-family:monospace;font-size:1.2rem;font-weight:700;color:${catColors[s.cat]};text-align:center;">${s.code}</div>
          <div style="flex:1;">
            <div style="font-weight:600;">${s.zh} <span style="color:#888;font-weight:400;">${s.desc}</span></div>
            <div style="font-size:0.8rem;color:#888;margin-top:2px;">${s.detail}</div>
          </div>
        </div>`;
      });
      document.getElementById('codes').innerHTML = html;
    }
    function filter() {
      const q = document.getElementById('search').value.toLowerCase();
      if (!q) { render(STATUS); return; }
      render(STATUS.filter(s => String(s.code).includes(q) || s.desc.toLowerCase().includes(q) || s.zh.includes(q) || s.detail.includes(q)));
    }
    render(STATUS);
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
