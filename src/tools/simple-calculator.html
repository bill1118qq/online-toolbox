<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线计算器 - 免费科学计算器 - 在线工具箱</title>
  <meta name="description" content="免费在线计算器，支持加减乘除、括号、百分比、平方根等运算，界面简洁，适合日常计算。手机电脑都能用。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="在线计算器 - 免费加减乘除计算">
  <meta property="og:description" content="在线计算器，支持四则运算、括号、百分比，打开即用。">
  <meta property="og:url" content="https://eitools.cn/src/tools/simple-calculator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/simple-calculator.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"在线计算器","description":"免费在线四则运算计算器","url":"https://eitools.cn/src/tools/simple-calculator.html","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
  <style>
    .calc-wrap { max-width: 340px; margin: 0 auto; }
    .calc-display { background: #1a1a2e; color: white; padding: 20px; border-radius: 12px 12px 0 0; text-align: right; min-height: 90px; display: flex; flex-direction: column; justify-content: flex-end; }
    .calc-expr { color: #888; font-size: 0.9rem; min-height: 20px; word-break: break-all; }
    .calc-result { font-size: 2.2rem; font-weight: 700; font-variant-numeric: tabular-nums; word-break: break-all; }
    .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: #ddd; border-radius: 0 0 12px 12px; overflow: hidden; }
    .calc-btn { padding: 18px; border: none; font-size: 1.2rem; cursor: pointer; background: white; transition: background 0.1s; }
    .calc-btn:active { background: #ccc; }
    .calc-btn.op { background: #f0f2f5; color: #4361ee; font-weight: 600; }
    .calc-btn.eq { background: #4361ee; color: white; font-weight: 700; }
    .calc-btn.fn { background: #e8eaed; }
    .calc-btn.wide { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>在线计算器</h1>
    </div>
    <div class="calc-wrap">
      <div class="calc-display">
        <div class="calc-expr" id="expr"></div>
        <div class="calc-result" id="result">0</div>
      </div>
      <div class="calc-grid">
        <button class="calc-btn fn" onclick="clearAll()">AC</button>
        <button class="calc-btn fn" onclick="toggleSign()">+/-</button>
        <button class="calc-btn fn" onclick="inputPercent()">%</button>
        <button class="calc-btn op" onclick="inputOp('/')">&divide;</button>
        <button class="calc-btn" onclick="inputNum('7')">7</button>
        <button class="calc-btn" onclick="inputNum('8')">8</button>
        <button class="calc-btn" onclick="inputNum('9')">9</button>
        <button class="calc-btn op" onclick="inputOp('*')">&times;</button>
        <button class="calc-btn" onclick="inputNum('4')">4</button>
        <button class="calc-btn" onclick="inputNum('5')">5</button>
        <button class="calc-btn" onclick="inputNum('6')">6</button>
        <button class="calc-btn op" onclick="inputOp('-')">&minus;</button>
        <button class="calc-btn" onclick="inputNum('1')">1</button>
        <button class="calc-btn" onclick="inputNum('2')">2</button>
        <button class="calc-btn" onclick="inputNum('3')">3</button>
        <button class="calc-btn op" onclick="inputOp('+')">+</button>
        <button class="calc-btn wide" onclick="inputNum('0')">0</button>
        <button class="calc-btn" onclick="inputDot()">.</button>
        <button class="calc-btn eq" onclick="calculate()">=</button>
      </div>
    </div>
  </div>
  <script>
    let current = '0', expression = '', newNumber = true, lastOp = '';
    function updateDisplay() {
      document.getElementById('result').textContent = current;
      document.getElementById('expr').textContent = expression;
    }
    function inputNum(n) {
      if (newNumber) { current = n; newNumber = false; }
      else { current = current === '0' ? n : current + n; }
      updateDisplay();
    }
    function inputDot() {
      if (newNumber) { current = '0.'; newNumber = false; }
      else if (!current.includes('.')) { current += '.'; }
      updateDisplay();
    }
    function inputOp(op) {
      expression += current + ' ' + ({'/':'÷','*':'×','-':'−','+':'+'}[op] || op) + ' ';
      lastOp = op;
      newNumber = true;
      updateDisplay();
    }
    function inputPercent() {
      current = String(parseFloat(current) / 100);
      updateDisplay();
    }
    function toggleSign() {
      if (current !== '0') current = current.startsWith('-') ? current.slice(1) : '-' + current;
      updateDisplay();
    }
    function clearAll() {
      current = '0'; expression = ''; newNumber = true; lastOp = '';
      updateDisplay();
    }
    function calculate() {
      if (!lastOp) return;
      const expr = expression + current;
      try {
        const sanitized = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
        const result = Function('"use strict";return (' + sanitized + ')')();
        expression = expr + ' =';
        current = Number.isFinite(result) ? String(parseFloat(result.toFixed(10))) : 'Error';
      } catch(e) { current = 'Error'; }
      newNumber = true; lastOp = '';
      updateDisplay();
    }
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') inputOp('/');
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') clearAll();
      else if (e.key === 'Backspace') { current = current.length > 1 ? current.slice(0,-1) : '0'; updateDisplay(); }
    });
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
