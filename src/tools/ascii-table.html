<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII 码表 - 在线工具箱</title>
  <meta name="description" content="免费在线 ASCII 码表查询，包含完整 ASCII 字符对照表，支持十进制、十六进制、二进制转换。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>ASCII 码表</h1>
    </div>

    <div style="margin-bottom: 16px;">
      <input type="text" id="search" placeholder="搜索字符或数值..." oninput="filterTable()" style="width: 100%;">
    </div>

    <div style="overflow-x: auto;">
      <table id="asciiTable" style="width: 100%; border-collapse: collapse; font-size: 0.85rem; background: white; border-radius: 12px; overflow: hidden;">
        <thead>
          <tr style="background: #4361ee; color: white; position: sticky; top: 0;">
            <th style="padding: 10px;">十进制</th>
            <th style="padding: 10px;">十六进制</th>
            <th style="padding: 10px;">二进制</th>
            <th style="padding: 10px;">字符</th>
            <th style="padding: 10px;">说明</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const asciiData = [
      [0,'NUL','空字符'],[1,'SOH','标题开始'],[2,'STX','正文开始'],[3,'ETX','正文结束'],
      [4,'EOT','传输结束'],[5,'ENQ','请求'],[6,'ACK','确认'],[7,'BEL','响铃'],
      [8,'BS','退格'],[9,'HT','水平制表符'],[10,'LF','换行'],[11,'VT','垂直制表符'],
      [12,'FF','换页'],[13,'CR','回车'],[14,'SO','移出'],[15,'SI','移入'],
      [16,'DLE','数据链路转义'],[17,'DC1','设备控制1'],[18,'DC2','设备控制2'],[19,'DC3','设备控制3'],
      [20,'DC4','设备控制4'],[21,'NAK','否定确认'],[22,'SYN','同步空闲'],[23,'ETB','传输块结束'],
      [24,'CAN','取消'],[25,'EM','媒介结束'],[26,'SUB','替换'],[27,'ESC','转义'],
      [28,'FS','文件分隔符'],[29,'GS','组分隔符'],[30,'RS','记录分隔符'],[31,'US','单元分隔符'],
      [32,' ','空格'],[33,'!','感叹号'],[34,'"','双引号'],[35,'#','井号'],
      [36,'$','美元符'],[37,'%','百分号'],[38,'&','和号'],[39,"'",'单引号'],
      [40,'(','左括号'],[41,')','右括号'],[42,'*','星号'],[43,'+','加号'],
      [44,',','逗号'],[45,'-','减号'],[46,'.','句号'],[47,'/','斜杠'],
      [48,'0','数字0'],[49,'1','数字1'],[50,'2','数字2'],[51,'3','数字3'],
      [52,'4','数字4'],[53,'5','数字5'],[54,'6','数字6'],[55,'7','数字7'],
      [56,'8','数字8'],[57,'9','数字9'],[58,':','冒号'],[59,';','分号'],
      [60,'<','小于号'],[61,'=','等号'],[62,'>','大于号'],[63,'?','问号'],
      [64,'@','@符号'],[65,'A','大写A'],[66,'B','大写B'],[67,'C','大写C'],
      [68,'D','大写D'],[69,'E','大写E'],[70,'F','大写F'],[71,'G','大写G'],
      [72,'H','大写H'],[73,'I','大写I'],[74,'J','大写J'],[75,'K','大写K'],
      [76,'L','大写L'],[77,'M','大写M'],[78,'N','大写N'],[79,'O','大写O'],
      [80,'P','大写P'],[81,'Q','大写Q'],[82,'R','大写R'],[83,'S','大写S'],
      [84,'T','大写T'],[85,'U','大写U'],[86,'V','大写V'],[87,'W','大写W'],
      [88,'X','大写X'],[89,'Y','大写Y'],[90,'Z','大写Z'],[91,'[','左方括号'],
      [92,'\\','反斜杠'],[93,']','右方括号'],[94,'^','脱字符'],[95,'_','下划线'],
      [96,'`','反引号'],[97,'a','小写a'],[98,'b','小写b'],[99,'c','小写c'],
      [100,'d','小写d'],[101,'e','小写e'],[102,'f','小写f'],[103,'g','小写g'],
      [104,'h','小写h'],[105,'i','小写i'],[106,'j','小写j'],[107,'k','小写k'],
      [108,'l','小写l'],[109,'m','小写m'],[110,'n','小写n'],[111,'o','小写o'],
      [112,'p','小写p'],[113,'q','小写q'],[114,'r','小写r'],[115,'s','小写s'],
      [116,'t','小写t'],[117,'u','小写u'],[118,'v','小写v'],[119,'w','小写w'],
      [120,'x','小写x'],[121,'y','小写y'],[122,'z','小写z'],[123,'{','左花括号'],
      [124,'|','竖线'],[125,'}','右花括号'],[126,'~','波浪号'],[127,'DEL','删除']
    ];

    function renderTable(data) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = data.map((item, i) => {
        const [dec, char, desc] = item;
        const hex = dec.toString(16).toUpperCase().padStart(2, '0');
        const bin = dec.toString(2).padStart(8, '0');
        const displayChar = dec < 33 ? (char === ' ' ? '␣' : char) : char;
        const bg = i % 2 === 0 ? '#fff' : '#f8f9fa';
        return `<tr style="background:${bg};"><td style="padding:8px 10px;font-family:monospace;">${dec}</td><td style="padding:8px 10px;font-family:monospace;">0x${hex}</td><td style="padding:8px 10px;font-family:monospace;">${bin}</td><td style="padding:8px 10px;font-size:1.1rem;font-family:monospace;">${escapeHtml(displayChar)}</td><td style="padding:8px 10px;color:#666;">${desc}</td></tr>`;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function filterTable() {
      const query = document.getElementById('search').value.toLowerCase();
      if (!query) { renderTable(asciiData); return; }
      const filtered = asciiData.filter(item => {
        const [dec, char, desc] = item;
        return dec.toString().includes(query) ||
          dec.toString(16).toLowerCase().includes(query) ||
          char.toLowerCase().includes(query) ||
          desc.includes(query);
      });
      renderTable(filtered);
    }

    renderTable(asciiData);
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
