  <script>
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function mdToHtml(text) {
      var html = escapeHtml(text);
      // Code blocks
      html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
        return '<pre><code>' + code.trim() + '</code></pre>';
      });
      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Headers
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // Bold & Italic
      html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      // Images
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
      // Blockquote
      html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
      // Horizontal rule
      html = html.replace(/^---$/gm, '<hr>');
      // Unordered list
      html = html.replace(/^[*-] (.+)$/gm, '<li>$1</li>');
      html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
      // Ordered list
      html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
      // Strikethrough
      html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');
      // Tables
      var isFirstTableRow = true;
      html = html.replace(/^\|(.+)\|$/gm, function(m, row) {
        if (/^\|[\s-:|]+\|$/.test(m)) return '';
        var cells = row.split('|').filter(function(c) { return c.trim(); });
        var tag = isFirstTableRow ? 'th' : 'td';
        isFirstTableRow = false;
        return '<tr>' + cells.map(function(c) { return '<' + tag + '>' + c.trim() + '</' + tag + '>'; }).join('') + '</tr>';
      });
      // Paragraphs
      html = html.replace(/\n\n(?!<)/g, '</p><p>');
      html = '<p>' + html + '</p>';
      html = html.replace(/<p>\s*<(h[1-6]|pre|ul|ol|blockquote|hr|table)/g, '<$1');
      html = html.replace(/<\/(h[1-6]|pre|ul|ol|blockquote|hr|table)>\s*<\/p>/g, '</$1>');
      html = html.replace(/<p>\s*<\/p>/g, '');
      return html;
    }

    function render() {
      var md = document.getElementById('editor').value;
      document.getElementById('preview').innerHTML = mdToHtml(md);
    }

    function copyHTML() {
      var btn = document.querySelector('.copy-html-btn');
      navigator.clipboard.writeText(document.getElementById('preview').innerHTML).then(function() {
        btn.textContent = '已复制';
        setTimeout(function() { btn.textContent = '复制HTML'; }, 1500);
      });
    }

    function loadExample() {
      document.getElementById('editor').value = '# 欢迎使用Markdown编辑器\n\n这是一段**示例文本**，展示Markdown的基本语法。\n\n## 功能特点\n\n- 实时预览\n- 支持代码块\n- 表格渲染\n- HTML导出\n\n### 代码示例\n\n```javascript\nconsole.log("Hello World");\n```\n\n> 这是一段引用文字\n\n| 功能 | 状态 |\n|------|------|\n| 标题 | ✓ |\n| 列表 | ✓ |\n| 代码 | ✓ |\n\n更多语法请参考 [Markdown指南](https://eitools.cn)。';
      render();
    }

    function clearAll() {
      document.getElementById('editor').value = '';
      document.getElementById('preview').innerHTML = '';
    }

    loadExample();
  </script>
