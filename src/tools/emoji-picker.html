    let currentCategory = Object.keys(emojiData)[0];
    const categoriesEl = document.getElementById('categories');
    Object.keys(emojiData).forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.className = 'cat-btn' + (cat === currentCategory ? ' active' : '');
      btn.onclick = () => { currentCategory = cat; document.getElementById('search').value = ''; renderEmojis(emojiData[cat]); document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); };
      categoriesEl.appendChild(btn);
    });

    function renderEmojis(list) {
      document.getElementById('emoji-grid').innerHTML = list.map(e => `<button onclick="copyEmoji('${e}')" style="font-size:1.5rem;padding:8px;border:1px solid #eee;border-radius:8px;cursor:pointer;background:white;transition:transform 0.1s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">${e}</button>`).join('');
    }
    renderEmojis(emojiData[currentCategory]);

    function filterEmojis() {
      const q = document.getElementById('search').value.toLowerCase();
      if (!q) { renderEmojis(emojiData[currentCategory]); return; }
      const all = Object.values(emojiData).flat();
      // Simple filter - just show all since we can't search emoji names easily without a map
      renderEmojis(all);
    }

    function copyEmoji(emoji) {
      navigator.clipboard.writeText(emoji).then(() => {
        const toast = document.getElementById('copied-toast');
        toast.style.display = 'block'; toast.textContent = emoji + ' 已复制！';
        setTimeout(() => toast.style.display = 'none', 1200);
      });
    }

    const style = document.createElement('style');
    style.textContent = '.cat-btn{padding:6px 14px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:white;font-size:0.85rem;white-space:nowrap;}.cat-btn.active{background:#4361ee;color:white;border-color:#4361ee;}';
    document.head.appendChild(style);
