<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码生成器 - 在线工具箱</title>
  <meta name="description" content="免费在线随机密码生成器，自定义长度和字符类型，生成安全强密码。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <meta property="og:description" content="免费在线随机密码生成器，自定义长度和字符类型，生成安全强密码。">
  <meta property="og:url" content="https://eitools.cn/src/tools/password-generator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/password-generator.html">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {"@type": "Question", "name": "密码多长才安全？", "acceptedAnswer": {"@type": "Answer", "text": "建议至少12位，推荐16位以上。密码越长越安全。一个16位包含大小写字母、数字和特殊字符的密码，暴力破解需要数千年。"}},
      {"@type": "Question", "name": "生成的密码安全吗？", "acceptedAnswer": {"@type": "Answer", "text": "安全。本工具使用浏览器内置的crypto.getRandomValues()加密API生成真正的随机密码，不是伪随机数，密码不可预测。"}},
      {"@type": "Question", "name": "密码会在服务器上存储吗？", "acceptedAnswer": {"@type": "Answer", "text": "不会。密码完全在您的浏览器本地生成，不会上传或存储到任何服务器。"}}
    ]
  }
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>密码生成器</h1>
    </div>

    <div style="background: white; padding: 24px; border-radius: 12px; margin-bottom: 24px; text-align: center;">
      <div id="passwordDisplay" style="font-size: 1.6rem; font-family: monospace; word-break: break-all; padding: 16px; background: #f0f2f5; border-radius: 8px; min-height: 60px; display: flex; align-items: center; justify-content: center;"></div>
      <div style="margin-top: 16px; display: flex; gap: 10px; justify-content: center;">
        <button class="btn btn-primary" onclick="generatePassword()">生成密码</button>
        <button class="btn btn-secondary" onclick="copyPassword()">复制</button>
      </div>
      <div id="strengthBar" style="margin-top: 16px; height: 8px; border-radius: 4px; background: #e0e0e0; overflow: hidden;">
        <div id="strengthFill" style="height: 100%; width: 0; transition: all 0.3s;"></div>
      </div>
      <p id="strengthText" style="margin-top: 8px; font-size: 0.9rem; color: #666;"></p>
    </div>

    <div style="background: white; padding: 24px; border-radius: 12px;">
      <div style="margin-bottom: 16px;">
        <label style="display: flex; justify-content: space-between; align-items: center;">
          <span>密码长度: <strong id="lengthValue">16</strong></span>
          <input type="range" id="length" min="4" max="64" value="16" style="width: 200px;" oninput="document.getElementById('lengthValue').textContent = this.value">
        </label>
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <label><input type="checkbox" id="lowercase" checked> 小写字母 (a-z)</label>
        <label><input type="checkbox" id="uppercase" checked> 大写字母 (A-Z)</label>
        <label><input type="checkbox" id="numbers" checked> 数字 (0-9)</label>
        <label><input type="checkbox" id="symbols" checked> 特殊符号 (!@#$...)</label>
      </div>
      <div style="margin-top: 12px;">
        <label><input type="checkbox" id="noAmbiguous"> 去除容易混淆的字符 (0OoIl1)</label>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function generatePassword() {
      let chars = '';
      if (document.getElementById('lowercase').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (document.getElementById('uppercase').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (document.getElementById('numbers').checked) chars += '0123456789';
      if (document.getElementById('symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

      if (document.getElementById('noAmbiguous').checked) {
        chars = chars.replace(/[0OoIl1]/g, '');
      }

      if (!chars) { showToast('请至少选择一种字符类型'); return; }

      const length = parseInt(document.getElementById('length').value);
      const array = new Uint32Array(length);
      crypto.getRandomValues(array);
      const password = Array.from(array, n => chars[n % chars.length]).join('');

      document.getElementById('passwordDisplay').textContent = password;
      updateStrength(password);
    }

    function updateStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (password.length >= 20) score++;
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[^a-zA-Z0-9]/.test(password)) score++;

      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');
      const labels = ['极弱', '弱', '一般', '较强', '强', '极强'];
      const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#27ae60', '#1a8f4e'];

      const level = Math.min(score, labels.length - 1);
      fill.style.width = ((level + 1) / labels.length * 100) + '%';
      fill.style.background = colors[level];
      text.textContent = '密码强度: ' + labels[level];
      text.style.color = colors[level];
    }

    function copyPassword() {
      const pw = document.getElementById('passwordDisplay').textContent;
      if (!pw) { showToast('请先生成密码'); return; }
      navigator.clipboard.writeText(pw).then(() => showToast('密码已复制到剪贴板'));
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    generatePassword();
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
