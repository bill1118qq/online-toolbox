<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>在线计算器 - 支持括号运算和函数 - 在线工具箱</title>
  <meta name="description" content="在线科学计算器：支持基础四则运算、括号嵌套、百分比计算、历史记录。界面简洁，完全免费，无需下载。">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="在线科学计算器">
  <meta property="og:description" content="支持四则运算、括号、百分比的在线计算器。">
  <meta property="og:url" content="https://eitools.cn/src/tools/line-counter.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/line-counter.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"在线科学计算器","description":"支持四则运算括号百分比的在线计算器","url":"https://eitools.cn/src/tools/line-counter.html","applicationCategory":"UtilityApplication","operatingSystem":"Any"}
  </script>
  <style>
    .calc-display { background:#1a1a2e;color:#4ade80;font-family:monospace;padding:20px;border-radius:12px 12px 0 0;text-align:right;font-size:2rem;min-height:80px;display:flex;flex-direction:column;justify-content:center;overflow:hidden; }
    .calc-expr { color:#888;font-size:0.9rem;margin-bottom:4px;min-height:20px; }
    .calc-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:#ddd;border-radius:0 0 12px 12px;overflow:hidden; }
    .calc-btn { padding:18px;font-size:1.2rem;border:none;cursor:pointer;background:white;transition:background .15s; }
    .calc-btn:hover { background:#e8e8e8; }
    .calc-btn:active { background:#d0d0d0; }
    .calc-btn.op { background:#e3f2fd;color:#1565c0; }
    .calc-btn.op:hover { background:#bbdefb; }
    .calc-btn.eq { background:#4361ee;color:white; }
    .calc-btn.eq:hover { background:#3451d1; }
    .calc-btn.fn { background:#f5f5f5;color:#666; }
    .calc-btn.fn:hover { background:#eee; }
    .calc-history { margin-top:16px;max-height:300px;overflow-y:auto; }
    .calc-history div { padding:8px 12px;border-bottom:1px solid #f0f0f0;font-size:0.9rem;cursor:pointer; }
    .calc-history div:hover { background:#f5f5f5; }
  </style>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>在线科学计算器</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">支持四则运算、括号、百分比计算，带历史记录。</p>
    <div style="max-width:400px;margin:0 auto;">
      <div class="calc-display">
        <div class="calc-expr" id="expr"></div>
        <div id="display">0</div>
      </div>
      <div class="calc-grid">
        <button class="calc-btn fn" onclick="clearAll()">AC</button>
        <button class="calc-btn fn" onclick="backspace()">&larr;</button>
        <button class="calc-btn fn" onclick="inputPercent()">%</button>
        <button class="calc-btn op" onclick="inputOp('/')">÷</button>
        <button class="calc-btn" onclick="inputNum('7')">7</button>
        <button class="calc-btn" onclick="inputNum('8')">8</button>
        <button class="calc-btn" onclick="inputNum('9')">9</button>
        <button class="calc-btn op" onclick="inputOp('*')">×</button>
        <button class="calc-btn" onclick="inputNum('4')">4</button>
        <button class="calc-btn" onclick="inputNum('5')">5</button>
        <button class="calc-btn" onclick="inputNum('6')">6</button>
        <button class="calc-btn op" onclick="inputOp('-')">−</button>
        <button class="calc-btn" onclick="inputNum('1')">1</button>
        <button class="calc-btn" onclick="inputNum('2')">2</button>
        <button class="calc-btn" onclick="inputNum('3')">3</button>
        <button class="calc-btn op" onclick="inputOp('+')">+</button>
        <button class="calc-btn fn" onclick="toggleSign()">±</button>
        <button class="calc-btn" onclick="inputNum('0')">0</button>
        <button class="calc-btn" onclick="inputDot()">.</button>
        <button class="calc-btn eq" onclick="calculate()">=</button>
        <button class="calc-btn fn" onclick="inputParen('(')">(</button>
        <button class="calc-btn fn" onclick="inputParen(')')">)</button>
        <button class="calc-btn fn" onclick="sqrt()">√</button>
        <button class="calc-btn fn" onclick="squared()">x²</button>
      </div>
      <div class="calc-history" id="history"></div>
    </div>
  </div>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
  <script>
    var expression = '';
    var display = '0';
    var lastResult = null;
    var history = [];

    function updateDisplay() {
      document.getElementById('display').textContent = display;
      document.getElementById('expr').textContent = expression;
    }

    function inputNum(n) {
      if (display === '0' && n !== '0') display = n;
      else if (display === '0' && n === '0') return;
      else display += n;
      updateDisplay();
    }

    function inputDot() {
      if (display.indexOf('.') === -1) display += '.';
      updateDisplay();
    }

    function inputOp(op) {
      var opSymbol = { '/': ' ÷ ', '*': ' × ', '-': ' − ', '+': ' + ' }[op] || op;
      expression += display + opSymbol;
      display = '0';
      updateDisplay();
    }

    function inputParen(p) {
      expression += p;
      updateDisplay();
    }

    function inputPercent() {
      display = String(parseFloat(display) / 100);
      updateDisplay();
    }

    function toggleSign() {
      if (display !== '0') {
        display = display.startsWith('-') ? display.slice(1) : '-' + display;
        updateDisplay();
      }
    }

    function sqrt() {
      var val = parseFloat(display);
      if (val < 0) { display = '错误'; updateDisplay(); return; }
      display = String(Math.sqrt(val));
      updateDisplay();
    }

    function squared() {
      display = String(Math.pow(parseFloat(display), 2));
      updateDisplay();
    }

    function backspace() {
      if (display.length > 1) display = display.slice(0, -1);
      else display = '0';
      updateDisplay();
    }

    function clearAll() {
      expression = '';
      display = '0';
      updateDisplay();
    }

    function calculate() {
      var fullExpr = expression + display;
      try {
        var sanitized = fullExpr.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-');
        var result = Function('"use strict"; return (' + sanitized + ')')();

        if (isNaN(result) || !isFinite(result)) {
          display = '错误';
        } else {
          var rounded = parseFloat(result.toPrecision(12));
          display = String(rounded);
          history.unshift({ expr: fullExpr + ' =', result: display });
          if (history.length > 20) history.pop();
          renderHistory();
          expression = '';
        }
      } catch (e) {
        display = '错误';
      }
      updateDisplay();
    }

    function renderHistory() {
      var html = '';
      for (var i = 0; i < history.length; i++) {
        html += '<div onclick="loadHistory(' + i + ')">' + escapeHtml(history[i].expr) + ' <b>' + escapeHtml(history[i].result) + '</b></div>';
      }
      document.getElementById('history').innerHTML = html;
    }

    function loadHistory(index) {
      display = history[index].result;
      expression = '';
      updateDisplay();
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.addEventListener('keydown', function(e) {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Backspace') backspace();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === '(') inputParen('(');
      else if (e.key === ')') inputParen(')');
    });

    updateDisplay();
  </script>
</body>
</html>
