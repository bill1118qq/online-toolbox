<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随机数生成器 - 在线工具箱</title>
  <meta name="description" content="免费在线随机数生成器，支持自定义范围、生成个数，可生成随机整数和浮点数。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <meta property="og:title" content="随机数生成器 - 在线工具箱">
  <meta property="og:description" content="免费在线随机数生成器，支持自定义范围、生成个数，可生成随机整数和浮点数。">
  <meta property="og:url" content="https://eitools.cn/src/tools/random-number.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/random-number.html">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "随机数生成器",
    "url": "https://eitools.cn/src/tools/random-number.html",
    "description": "免费在线随机数生成器，支持自定义范围、生成个数，可生成随机整数和浮点数。",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All"
  }
  </script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHMQZC85HG"></script>
  <script src="../../js/analytics.js"></script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>随机数生成器</h1>
    </div>

    <div style="background: white; padding: 24px; border-radius: 12px;">
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px;">
        <label>最小值: <input type="number" id="min" value="1" style="width: 100%; margin-top: 4px;"></label>
        <label>最大值: <input type="number" id="max" value="100" style="width: 100%; margin-top: 4px;"></label>
        <label>生成个数: <input type="number" id="count" value="10" min="1" max="1000" style="width: 100%; margin-top: 4px;"></label>
      </div>
      <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin-bottom: 16px;">
        <label><input type="radio" name="type" value="int" checked> 整数</label>
        <label><input type="radio" name="type" value="float"> 浮点数</label>
        <label><input type="checkbox" id="unique"> 不重复</label>
        <label><input type="checkbox" id="sorted"> 排序</label>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generate()">生成</button>
        <button class="btn btn-secondary" onclick="copyResult()">复制</button>
      </div>
    </div>

    <div id="result" class="result-box" style="min-height: 100px; margin-top: 16px;"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function generate() {
      const min = parseInt(document.getElementById('min').value);
      const max = parseInt(document.getElementById('max').value);
      const count = Math.min(1000, Math.max(1, parseInt(document.getElementById('count').value)));
      const type = document.querySelector('input[name="type"]:checked').value;
      const unique = document.getElementById('unique').checked;
      const sorted = document.getElementById('sorted').checked;

      if (min > max) { showToast('最小值不能大于最大值'); return; }
      if (unique && type === 'int' && (max - min + 1) < count) { showToast('范围不足以生成不重复的数'); return; }

      const arr = new Uint32Array(count);
      crypto.getRandomValues(arr);

      const results = [];
      const seen = new Set();
      for (let i = 0; i < count; i++) {
        let num;
        if (type === 'int') {
          num = min + (arr[i] % (max - min + 1));
          if (unique && seen.has(num)) continue;
          seen.add(num);
        } else {
          num = min + (arr[i] / 4294967296) * (max - min);
          num = parseFloat(num.toFixed(2));
        }
        results.push(num);
      }

      if (sorted) results.sort((a, b) => a - b);
      document.getElementById('result').textContent = results.join(', ');
    }

    function copyResult() {
      const text = document.getElementById('result').textContent;
      if (!text) { showToast('请先生成'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('已复制'));
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    generate();
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
