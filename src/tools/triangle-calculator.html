<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三角形计算器 - 面积/周长/角度 - 在线工具箱</title>
  <meta name="description" content="免费在线三角形计算器。输入三边、两边一角或一边两角，计算面积、周长、角度、外接圆半径等。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="三角形计算器 - 面积/周长/角度">
  <meta property="og:description" content="三角形面积、周长、角度在线计算。">
  <meta property="og:url" content="https://eitools.cn/src/tools/triangle-calculator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/triangle-calculator.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"三角形计算器","description":"三角形面积、周长、角度计算","url":"https://eitools.cn/src/tools/triangle-calculator.html","applicationCategory":"EducationalApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>三角形计算器</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">输入已知条件，自动计算三角形的各项参数。</p>
    <div style="max-width:800px;">
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button onclick="setMode('sss')" id="btn-sss" class="mode-btn" style="padding:8px 16px;background:#4361ee;color:white;border:none;border-radius:8px;cursor:pointer;">三边 (SSS)</button>
        <button onclick="setMode('sas')" id="btn-sas" class="mode-btn" style="padding:8px 16px;background:#6c757d;color:white;border:none;border-radius:8px;cursor:pointer;">两边夹角 (SAS)</button>
        <button onclick="setMode('asa')" id="btn-asa" class="mode-btn" style="padding:8px 16px;background:#6c757d;color:white;border:none;border-radius:8px;cursor:pointer;">两角夹边 (ASA)</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
        <div>
          <div id="inputArea">
            <div style="margin-bottom:12px;">
              <label style="font-size:0.85rem;color:#888;">边 a</label>
              <input type="number" id="sideA" step="any" oninput="calc()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:4px;" placeholder="输入边长">
            </div>
            <div style="margin-bottom:12px;">
              <label style="font-size:0.85rem;color:#888;">边 b</label>
              <input type="number" id="sideB" step="any" oninput="calc()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:4px;" placeholder="输入边长">
            </div>
            <div style="margin-bottom:12px;">
              <label style="font-size:0.85rem;color:#888;">边 c</label>
              <input type="number" id="sideC" step="any" oninput="calc()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:4px;" placeholder="输入边长">
            </div>
            <div style="margin-bottom:12px;">
              <label style="font-size:0.85rem;color:#888;">角 A (度)</label>
              <input type="number" id="angleA" step="any" oninput="calc()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:4px;" placeholder="角度">
            </div>
            <div style="margin-bottom:12px;">
              <label style="font-size:0.85rem;color:#888;">角 B (度)</label>
              <input type="number" id="angleB" step="any" oninput="calc()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:4px;" placeholder="角度">
            </div>
            <div style="margin-bottom:12px;">
              <label style="font-size:0.85rem;color:#888;">角 C (度)</label>
              <input type="number" id="angleC" step="any" oninput="calc()" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px;margin-top:4px;" placeholder="角度">
            </div>
          </div>
        </div>
        <div>
          <div style="padding:20px;background:#f8f9fa;border-radius:12px;">
            <h3 style="margin-bottom:12px;">计算结果</h3>
            <div id="result" style="font-size:0.9rem;color:#666;">输入已知条件开始计算</div>
          </div>
          <div style="margin-top:16px;">
            <h3 style="margin-bottom:8px;">三角形图形</h3>
            <canvas id="canvas" width="350" height="280" style="border:1px solid #ddd;border-radius:8px;background:white;"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let mode = 'sss';
    function setMode(m) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach(b => b.style.background = '#6c757d');
      document.getElementById('btn-'+m).style.background = '#4361ee';
      ['sideA','sideB','sideC','angleA','angleB','angleC'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('result').innerHTML = '输入已知条件开始计算';
      const canvas = document.getElementById('canvas');
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    }
    function calc() {
      const v = id => parseFloat(document.getElementById(id).value) || 0;
      let a, b, c, A, B, C;
      try {
        if (mode === 'sss') {
          a = v('sideA'); b = v('sideB'); c = v('sideC');
          if (a <= 0 || b <= 0 || c <= 0) return;
          if (a + b <= c || a + c <= b || b + c <= a) { showResult({error:'不满足三角形不等式'}); return; }
          A = Math.acos((b*b + c*c - a*a) / (2*b*c)) * 180 / Math.PI;
          B = Math.acos((a*a + c*c - b*b) / (2*a*c)) * 180 / Math.PI;
          C = 180 - A - B;
        } else if (mode === 'sas') {
          b = v('sideA'); a = v('sideB'); C = v('angleC');
          if (b <= 0 || a <= 0 || C <= 0 || C >= 180) return;
          c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(C*Math.PI/180));
          A = Math.acos((b*b + c*c - a*a) / (2*b*c)) * 180 / Math.PI;
          B = 180 - A - C;
        } else {
          a = v('sideA'); C = v('angleA'); B = v('angleB');
          if (a <= 0 || C <= 0 || B <= 0) return;
          A = 180 - C - B;
          if (A <= 0) { showResult({error:'角度之和不能超过180度'}); return; }
          b = a * Math.sin(B*Math.PI/180) / Math.sin(A*Math.PI/180);
          c = a * Math.sin(C*Math.PI/180) / Math.sin(A*Math.PI/180);
        }
        const s = (a + b + c) / 2;
        const area = Math.sqrt(Math.max(0, s*(s-a)*(s-b)*(s-c)));
        const perimeter = a + b + c;
        const R = (a*b*c) / (4*area);
        const r = area / s;
        showResult({a,b,c,A,B,C,area,perimeter,R,r,type:getType(A,B,C)});
        drawTriangle(a,b,c,A,B,C);
      } catch(e) {
        showResult({error:'计算错误：' + e.message});
      }
    }
    function getType(A,B,C) {
      const sides = [A,B,C].sort((x,y)=>x-y);
      if (Math.abs(sides[2]-90) < 0.1) return sides[0] < 90 ? '直角三角形' : '直角三角形';
      if (sides[2] > 90) return '钝角三角形';
      if (A === B && B === C) return '等边三角形';
      if (A === B || B === C || A === C) return '等腰三角形';
      return '锐角三角形';
    }
    function showResult(r) {
      if (r.error) { document.getElementById('result').innerHTML = `<span style="color:#c92a2a;">${r.error}</span>`; return; }
      const f = (n) => n.toFixed(2);
      document.getElementById('result').innerHTML = `
        <div style="margin-bottom:12px;padding:8px;background:#e8f4fd;border-radius:8px;font-weight:600;">${r.type}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div>边 a = <strong>${f(r.a)}</strong></div>
          <div>边 b = <strong>${f(r.b)}</strong></div>
          <div>边 c = <strong>${f(r.c)}</strong></div>
          <div style="color:#888;">周长 = <strong>${f(r.perimeter)}</strong></div>
          <div>角 A = <strong>${f(r.A)}°</strong></div>
          <div>角 B = <strong>${f(r.B)}°</strong></div>
          <div>角 C = <strong>${f(r.C)}°</strong></div>
          <div>面积 = <strong>${f(r.area)}</strong></div>
          <div style="color:#888;">外接圆 R = ${f(r.R)}</div>
          <div style="color:#888;">内切圆 r = ${f(r.r)}</div>
          <div></div>
        </div>`;
    }
    function drawTriangle(a,b,c,A,B,C) {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const scale = Math.min(280/a, 240/b, 240/c, 80);
      const Ax = 0, Ay = 0;
      const Bx = c * scale, By = 0;
      const Cx = b * Math.cos(A*Math.PI/180) * scale;
      const Cy = -b * Math.sin(A*Math.PI/180) * scale;
      const ox = 30 - Math.min(Ax,Bx,Cx);
      const oy = canvas.height - 20 + Math.min(Ay,By,Cy);
      ctx.beginPath();
      ctx.moveTo(Ax+ox, Ay+oy);
      ctx.lineTo(Bx+ox, By+oy);
      ctx.lineTo(Cx+ox, Cy+oy);
      ctx.closePath();
      ctx.fillStyle = '#e8f4fd';
      ctx.fill();
      ctx.strokeStyle = '#4361ee';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = '#4361ee';
      ctx.font = '12px monospace';
      ctx.fillText(`a=${a.toFixed(1)}`, (Ax+Bx)/2+ox+4, (Ay+By)/2+oy+16);
      ctx.fillText(`b=${b.toFixed(1)}`, (Ax+Cx)/2+ox-40, (Ay+Cy)/2+oy);
      ctx.fillText(`c=${c.toFixed(1)}`, (Bx+Cx)/2+ox+4, (By+Cy)/2+oy);
    }
    setMode('sss');
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
