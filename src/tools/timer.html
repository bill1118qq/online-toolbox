<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟 - Pomodoro定时器 - 在线工具箱</title>
  <meta name="description" content="免费在线番茄钟/Pomodoro定时器。自定义工作时间、休息时间，支持提示音提醒。提高工作效率的专注计时器。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="番茄钟 - Pomodoro定时器">
  <meta property="og:description" content="在线番茄钟计时器，自定义工作和休息时间。">
  <meta property="og:url" content="https://eitools.cn/src/tools/timer.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/timer.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"番茄钟","description":"在线Pomodoro番茄钟计时器","url":"https://eitools.cn/src/tools/timer.html","applicationCategory":"ProductivityApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>番茄钟</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">Pomodoro 番茄工作法计时器，专注工作，定时休息。</p>
    <div style="max-width:500px;text-align:center;">
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:24px;">
        <button onclick="setMode('work')" id="btn-work" style="padding:8px 20px;background:#4361ee;color:white;border:none;border-radius:20px;cursor:pointer;">工作</button>
        <button onclick="setMode('short')" id="btn-short" style="padding:8px 20px;background:#6c757d;color:white;border:none;border-radius:20px;cursor:pointer;">短休息</button>
        <button onclick="setMode('long')" id="btn-long" style="padding:8px 20px;background:#6c757d;color:white;border:none;border-radius:20px;cursor:pointer;">长休息</button>
      </div>
      <div style="position:relative;width:280px;height:280px;margin:0 auto 24px;">
        <svg width="280" height="280" style="transform:rotate(-90deg);">
          <circle cx="140" cy="140" r="130" fill="none" stroke="#e9ecef" stroke-width="8"/>
          <circle id="progress" cx="140" cy="140" r="130" fill="none" stroke="#4361ee" stroke-width="8" stroke-linecap="round" stroke-dasharray="816.8" stroke-dashoffset="0"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
          <div id="timeDisplay" style="font-size:3rem;font-weight:700;font-family:monospace;">25:00</div>
          <div id="modeLabel" style="color:#888;font-size:0.9rem;">工作时间</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px;">
        <button onclick="toggleTimer()" id="toggleBtn" style="padding:12px 40px;background:#4361ee;color:white;border:none;border-radius:12px;cursor:pointer;font-size:1.1rem;">开始</button>
        <button onclick="resetTimer()" style="padding:12px 24px;background:#dee2e6;color:#333;border:none;border-radius:12px;cursor:pointer;">重置</button>
      </div>
      <div id="stats" style="display:flex;gap:16px;justify-content:center;">
        <div style="text-align:center;">
          <div id="pomodoroCount" style="font-size:2rem;font-weight:700;color:#c92a2a;">0</div>
          <div style="font-size:0.85rem;color:#888;">已完成番茄</div>
        </div>
        <div style="text-align:center;">
          <div id="totalMinutes" style="font-size:2rem;font-weight:700;color:#4361ee;">0</div>
          <div style="font-size:0.85rem;color:#888;">专注分钟</div>
        </div>
      </div>
      <div style="margin-top:24px;display:flex;gap:8px;justify-content:center;align-items:center;">
        <label style="font-size:0.85rem;">工作时间：</label>
        <input type="number" id="workMin" value="25" min="1" max="120" style="width:60px;padding:4px;border:1px solid #ddd;border-radius:4px;" onchange="updateSettings()">
        <label style="font-size:0.85rem;margin-left:8px;">短休息：</label>
        <input type="number" id="shortMin" value="5" min="1" max="30" style="width:60px;padding:4px;border:1px solid #ddd;border-radius:4px;" onchange="updateSettings()">
        <label style="font-size:0.85rem;margin-left:8px;">长休息：</label>
        <input type="number" id="longMin" value="15" min="1" max="60" style="width:60px;padding:4px;border:1px solid #ddd;border-radius:4px;" onchange="updateSettings()">
      </div>
    </div>
  </div>
  <script>
    let mode = 'work', running = false, remaining = 25*60, total = 25*60;
    let pomodoroCount = 0, totalWorkMin = 0, timer = null;
    const circumference = 2 * Math.PI * 130;
    function setMode(m) {
      mode = m;
      ['work','short','long'].forEach(id => document.getElementById('btn-'+id).style.background = id === m ? '#4361ee' : '#6c757d');
      const labels = {work:'工作时间',short:'短休息',long:'长休息'};
      const colors = {work:'#4361ee',short:'#2f9e44',long:'#e67700'};
      document.getElementById('modeLabel').textContent = labels[m];
      document.getElementById('progress').style.stroke = colors[m];
      if (!running) resetTimer();
    }
    function toggleTimer() {
      if (running) { pause(); } else { start(); }
    }
    function start() {
      running = true;
      document.getElementById('toggleBtn').textContent = '暂停';
      timer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(timer);
          running = false;
          document.getElementById('toggleBtn').textContent = '开始';
          playBeep();
          if (mode === 'work') {
            pomodoroCount++;
            totalWorkMin += parseInt(document.getElementById('workMin').value);
            document.getElementById('pomodoroCount').textContent = pomodoroCount;
            document.getElementById('totalMinutes').textContent = totalWorkMin;
            if (pomodoroCount % 4 === 0) setMode('long');
            else setMode('short');
          } else {
            setMode('work');
          }
          return;
        }
        updateDisplay();
      }, 1000);
    }
    function pause() {
      running = false;
      clearInterval(timer);
      document.getElementById('toggleBtn').textContent = '继续';
    }
    function resetTimer() {
      pause();
      const mins = mode === 'work' ? parseInt(document.getElementById('workMin').value) : mode === 'short' ? parseInt(document.getElementById('shortMin').value) : parseInt(document.getElementById('longMin').value);
      total = mins * 60;
      remaining = total;
      document.getElementById('toggleBtn').textContent = '开始';
      updateDisplay();
    }
    function updateDisplay() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      document.getElementById('timeDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      const offset = circumference * (1 - remaining / total);
      document.getElementById('progress').style.strokeDashoffset = offset;
      document.title = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} - 番茄钟`;
    }
    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
        setTimeout(() => { osc.frequency.value = 1000; osc.start(); osc.stop(ctx.currentTime + 0.5); }, 400);
      } catch(e) {}
    }
    function updateSettings() { if (!running) resetTimer(); }
    updateDisplay();
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
