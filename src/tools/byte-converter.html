<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>字节单位转换 - KB MB GB TB PB 在线转换 - 在线工具箱</title>
  <meta name="description" content="免费在线字节单位转换工具，KB、MB、GB、TB、PB 互相转换，支持二进制(1024)和十进制(1000)两种标准。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <meta property="og:description" content="免费在线字节单位转换工具，KB、MB、GB、TB、PB 互相转换，支持二进制(1024)和十进制(1000)两种标准。">
  <meta property="og:url" content="https://eitools.cn/src/tools/byte-converter.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/byte-converter.html">
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>字节单位转换</h1>
    </div>

    <div style="background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 12px;">
        <strong>转换标准：</strong>
        <select id="standard" style="padding: 6px 10px; border-radius: 6px; border: 2px solid #e0e0e0;">
          <option value="1024">二进制（1KB=1024B）</option>
          <option value="1000">十进制（1KB=1000B，SI标准）</option>
        </select>
      </label>

      <label style="display: block; margin-bottom: 12px;">
        <strong>输入数值：</strong>
        <input type="number" id="inputValue" value="1" min="0" step="any" style="width: 200px; margin-left: 8px;">
        <select id="inputUnit" style="padding: 6px 10px; border-radius: 6px; border: 2px solid #e0e0e0;">
          <option value="0">B (字节)</option>
          <option value="1">KB (千字节)</option>
          <option value="2" selected>MB (兆字节)</option>
          <option value="3">GB (吉字节)</option>
          <option value="4">TB (太字节)</option>
          <option value="5">PB (拍字节)</option>
        </select>
      </label>
    </div>

    <div id="results" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px;"></div>
  </div>

  <script>
    const units = ['B (字节)', 'KB (千字节)', 'MB (兆字节)', 'GB (吉字节)', 'TB (太字节)', 'PB (拍字节)'];
    const inputEls = [document.getElementById('inputValue'), document.getElementById('inputUnit'), document.getElementById('standard')];
    inputEls.forEach(el => el.addEventListener('input', convert));

    function convert() {
      const value = parseFloat(document.getElementById('inputValue').value) || 0;
      const fromUnit = parseInt(document.getElementById('inputUnit').value);
      const base = parseInt(document.getElementById('standard').value);
      const bytes = value * Math.pow(base, fromUnit);

      const results = units.map((name, i) => {
        const converted = bytes / Math.pow(base, i);
        let display;
        if (converted === 0) display = '0';
        else if (Math.abs(converted) >= 1000) display = converted.toLocaleString('zh-CN', { maximumFractionDigits: 2 });
        else if (Math.abs(converted) < 0.001) display = converted.toExponential(4);
        else display = converted.toPrecision(6);
        const isSource = i === fromUnit;
        return `<div style="background:${isSource ? '#eef1ff' : 'white'};padding:16px;border-radius:12px;border:2px solid ${isSource ? '#4361ee' : '#e0e0e0'};">
          <div style="font-size:0.8rem;color:#999;">${name}</div>
          <div style="font-size:1.2rem;font-weight:700;font-family:monospace;margin-top:4px;">${display}</div>
        </div>`;
      });

      document.getElementById('results').innerHTML = results.join('');
    }

    convert();
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
