<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64编码解码 - 图片Base64转换 - 在线工具箱</title>
  <meta name="description" content="在线Base64编解码工具：文本Base64编码解码、图片转Base64、Base64转图片。支持文件拖拽上传。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Base64编码解码工具">
  <meta property="og:description" content="文本/图片Base64编码解码，支持文件上传。">
  <meta property="og:url" content="https://eitools.cn/src/tools/base64-img.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/base64-img.html">
  <link rel="stylesheet" href="../../css/style.css">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"Base64编码解码工具","url":"https://eitools.cn/src/tools/base64-img.html","description":"文本Base64编解码、图片转Base64、Base64转图片","applicationCategory":"DeveloperApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0","priceCurrency":"CNY"}}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>Base64编解码工具</h1>
    </div>
    <div style="display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="encode()">文本 → Base64</button>
      <button class="btn btn-primary" onclick="decode()">Base64 → 文本</button>
      <button class="btn btn-secondary" onclick="copyOutput()">复制结果</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>
    <div class="split-view">
      <div class="split-panel">
        <h3>输入</h3>
        <textarea id="input" rows="10" placeholder="输入文本或Base64编码的字符串"></textarea>
        <div style="margin-top:8px;font-size:0.85rem;color:#666;">大小: <span id="inputSize">0</span></div>
      </div>
      <div class="split-panel">
        <h3>输出</h3>
        <textarea id="output" rows="10" readonly></textarea>
        <div style="margin-top:8px;font-size:0.85rem;color:#666;">大小: <span id="outputSize">0</span></div>
      </div>
    </div>

    <h2>图片 Base64 转换</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0;">
      <div>
        <div id="dropZone" style="border:2px dashed #ddd;border-radius:12px;padding:40px;text-align:center;cursor:pointer;background:#fafafa;" onclick="document.getElementById('fileInput').click()" ondragover="event.preventDefault();this.style.borderColor='#4361ee'" ondragleave="this.style.borderColor='#ddd'" ondrop="handleDrop(event)">
          <div style="font-size:2rem;">📁</div>
          <p>点击或拖拽图片到此处</p>
          <p style="font-size:0.8rem;color:#999;">支持 PNG, JPG, GIF, SVG, WebP</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleFile(event)">
      </div>
      <div>
        <h3>预览</h3>
        <div id="preview" style="border:1px solid #eee;border-radius:8px;min-height:200px;display:flex;align-items:center;justify-content:center;background:#fafafa;"></div>
      </div>
    </div>
    <textarea id="base64Output" rows="4" readonly placeholder="图片的Base64编码将显示在这里" style="width:100%;padding:10px;border:2px solid #ddd;border-radius:8px;font-family:monospace;font-size:0.8rem;box-sizing:border-box;"></textarea>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="copyBase64()">复制Base64</button>
    <button class="btn btn-secondary" style="margin-top:8px;" onclick="copyDataUrl()">复制完整Data URL</button>
  </div>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
  <script>
    const inputEl = document.getElementById('input');
    const outputEl = document.getElementById('output');
    inputEl.addEventListener('input', () => {
      document.getElementById('inputSize').textContent = new Blob([inputEl.value]).size + ' 字节';
    });

    function encode() {
      try {
        const encoded = btoa(unescape(encodeURIComponent(inputEl.value)));
        outputEl.value = encoded;
        document.getElementById('outputSize').textContent = new Blob([encoded]).size + ' 字节';
        showToast('编码成功');
      } catch (e) { showToast('编码失败: ' + e.message); }
    }

    function decode() {
      try {
        const decoded = decodeURIComponent(escape(atob(inputEl.value.trim())));
        outputEl.value = decoded;
        document.getElementById('outputSize').textContent = new Blob([decoded]).size + ' 字节';
        showToast('解码成功');
      } catch (e) { showToast('解码失败，请确认是有效的Base64字符串'); }
    }

    function copyOutput() {
      if (!outputEl.value) { showToast('没有结果'); return; }
      navigator.clipboard.writeText(outputEl.value).then(() => showToast('已复制'));
    }

    let currentDataUrl = '';
    function handleFile(e) {
      const file = e.target.files[0];
      if (file) processImage(file);
    }

    function handleDrop(e) {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) processImage(file);
      document.getElementById('dropZone').style.borderColor = '#ddd';
    }

    function processImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        currentDataUrl = e.target.result;
        const base64 = currentDataUrl.split(',')[1];
        document.getElementById('preview').innerHTML = `<img src="${currentDataUrl}" style="max-width:100%;max-height:200px;border-radius:8px;">`;
        document.getElementById('base64Output').value = base64;
        showToast('图片转换成功！文件大小: ' + (file.size / 1024).toFixed(1) + ' KB');
      };
      reader.readAsDataURL(file);
    }

    function copyBase64() {
      const val = document.getElementById('base64Output').value;
      if (!val) { showToast('没有Base64数据'); return; }
      navigator.clipboard.writeText(val).then(() => showToast('已复制Base64'));
    }

    function copyDataUrl() {
      if (!currentDataUrl) { showToast('没有Data URL'); return; }
      navigator.clipboard.writeText(currentDataUrl).then(() => showToast('已复制完整Data URL'));
    }

    function clearAll() {
      inputEl.value = ''; outputEl.value = '';
      document.getElementById('inputSize').textContent = '0';
      document.getElementById('outputSize').textContent = '0';
      document.getElementById('base64Output').value = '';
      document.getElementById('preview').innerHTML = '';
      currentDataUrl = '';
    }
  </script>
</body>
</html>
