          <div style="padding:8px 16px;background:#f0f2f5;font-size:0.85rem;border-bottom:1px solid #ddd;font-weight:600;">预览</div>
          <iframe id="preview" style="flex:1;border:none;background:white;" sandbox="allow-scripts allow-same-origin"></iframe>

      <div style="display:flex;gap:8px;padding:8px 16px;background:#f0f2f5;border-top:1px solid #ddd;">
        <button class="btn btn-primary" onclick="runPreview()" style="padding:6px 20px;font-size:0.85rem;">运行</button>
        <button class="btn btn-secondary" onclick="clearEditor()" style="padding:6px 20px;font-size:0.85rem;">清空</button>
        <button class="btn btn-secondary" onclick="copyCode()" style="padding:6px 20px;font-size:0.85rem;">复制代码</button>
        <button class="btn btn-secondary" onclick="downloadCode()" style="padding:6px 20px;font-size:0.85rem;">下载HTML</button>
        <label style="display:flex;align-items:center;gap:4px;font-size:0.85rem;margin-left:auto;">
          <input type="checkbox" id="autoRun" checked> 自动刷新
        </label>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    let debounceTimer = null;

    function runPreview() {
      const code = editor.value;
      const doc = preview.contentDocument || preview.contentWindow.document;
      doc.open();
      doc.write(code);
      doc.close();
    }

    function clearEditor() {
      editor.value = '';
      runPreview();
    }

    function copyCode() {
      navigator.clipboard.writeText(editor.value).then(() => showToast('已复制到剪贴板'));
    }

    function downloadCode() {
      const blob = new Blob([editor.value], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'page.html';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    editor.addEventListener('input', () => {
      if (document.getElementById('autoRun').checked) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(runPreview, 500);
      }
    });

    // Tab key support
    editor.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
      }
    });

    // Initial run
    runPreview();

    function showToast(msg) {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:8px 20px;border-radius:20px;font-size:14px;z-index:9999;animation:fadeInOut 2s forwards;';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }
  </script>
