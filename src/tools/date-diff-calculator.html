  <script>
    function showToast(msg) {
      var existing = document.querySelector('.toast');
      if (existing) existing.remove();
      var t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function () { t.remove(); }, 2000);
    }

    function switchTab(name) {
      var tabs = document.querySelectorAll('.dd-tab');
      var panels = document.querySelectorAll('.dd-panel');
      var names = ['diff', 'add', 'countdown'];
      tabs.forEach(function (tab, i) {
        tab.classList.toggle('active', names[i] === name);
      });
      panels.forEach(function (p) {
        p.classList.toggle('active', p.id === 'panel-' + name);
      });
    }

    function formatDate(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + day;
    }

    function formatDateCN(d) {
      return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
    }

    function getWeekdayCN(d) {
      return ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][d.getDay()];
    }

    function isLeapYear(y) {
      return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0);
    }

    function countWorkdays(start, end) {
      var count = 0;
      var d = new Date(start);
      d.setHours(0, 0, 0, 0);
      var endD = new Date(end);
      endD.setHours(0, 0, 0, 0);
      while (d < endD) {
        var dow = d.getDay();
        if (dow !== 0 && dow !== 6) count++;
        d.setDate(d.getDate() + 1);
      }
      return count;
    }

    function countWeekendDays(start, end) {
      var count = 0;
      var d = new Date(start);
      d.setHours(0, 0, 0, 0);
      var endD = new Date(end);
      endD.setHours(0, 0, 0, 0);
      while (d < endD) {
        var dow = d.getDay();
        if (dow === 0 || dow === 6) count++;
        d.setDate(d.getDate() + 1);
      }
      return count;
    }

    function daysInMonth(y, m) {
      return new Date(y, m + 1, 0).getDate();
    }

    function diffMonths(start, end) {
      var months = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
      if (end.getDate() < start.getDate()) months--;
      return Math.max(0, months);
    }

    function copyResult(text) {
      navigator.clipboard.writeText(text).then(function () {
        showToast('已复制到剪贴板');
      });
    }

    // Date diff
    function setTodayDiff() {
      document.getElementById('diff-start').value = formatDate(new Date());
    }

    function calcDiff() {
      var startStr = document.getElementById('diff-start').value;
      var endStr = document.getElementById('diff-end').value;
      var resultEl = document.getElementById('diff-result');

      if (!startStr || !endStr) {
        resultEl.innerHTML = '<div class="dd-result-card error"><p style="color:#e03131;">请选择开始和结束日期</p></div>';
        return;
      }

      var start = new Date(startStr);
      var end = new Date(endStr);
      start.setHours(0, 0, 0, 0);
      end.setHours(0, 0, 0, 0);

      if (end < start) {
        var temp = start;
        start = end;
        end = temp;
      }

      var diffMs = end - start;
      var totalDays = Math.round(diffMs / 86400000);
      var weeks = Math.floor(totalDays / 7);
      var remainDays = totalDays % 7;
      var months = diffMonths(start, end);
      var workdays = countWorkdays(start, end);
      var weekendDays = countWeekendDays(start, end);
      var hours = totalDays * 24;
      var minutes = hours * 60;

      var copyText = formatDateCN(start) + ' 至 ' + formatDateCN(end) + ' | 相差 ' + totalDays + ' 天（' + weeks + ' 周 ' + remainDays + ' 天）| 工作日 ' + workdays + ' 天';

      var html = '<div class="dd-result-card">' +
        '<div class="dd-stats-grid">' +
          '<div class="dd-stat-item"><div class="label">总天数</div><div class="value highlight">' + totalDays + ' 天</div></div>' +
          '<div class="dd-stat-item"><div class="label">工作日</div><div class="value warn">' + workdays + ' 天</div></div>' +
          '<div class="dd-stat-item"><div class="label">周末天数</div><div class="value" style="color:#888;">' + weekendDays + ' 天</div></div>' +
          '<div class="dd-stat-item"><div class="label">周数</div><div class="value">' + weeks + ' 周 ' + remainDays + ' 天</div></div>' +
        '</div>';

      html += '<div class="dd-detail-list">' +
        '<div class="dd-detail-item"><span class="dl">开始日期</span><span class="dv">' + formatDateCN(start) + ' ' + getWeekdayCN(start) + '</span></div>' +
        '<div class="dd-detail-item"><span class="dl">结束日期</span><span class="dv">' + formatDateCN(end) + ' ' + getWeekdayCN(end) + '</span></div>' +
        '<div class="dd-detail-item"><span class="dl">月数差</span><span class="dv">约 ' + months + ' 个月</span></div>' +
        '<div class="dd-detail-item"><span class="dl">小时数</span><span class="dv">' + hours.toLocaleString() + ' 小时</span></div>' +
        '<div class="dd-detail-item"><span class="dl">分钟数</span><span class="dv">' + minutes.toLocaleString() + ' 分钟</span></div>' +
        '</div>';

      html += '<div style="margin-top:12px;text-align:right;"><button class="dd-btn dd-btn-secondary" onclick="copyResult(\'' + copyText.replace(/'/g, "\\'") + '\')">复制结果</button></div>';
      html += '</div>';

      resultEl.innerHTML = html;
    }

    // Date add/sub
    function setTodayAdd() {
      document.getElementById('add-base').value = formatDate(new Date());
    }

    function calcAdd() {
      var baseStr = document.getElementById('add-base').value;
      var val = parseInt(document.getElementById('add-val').value);
      var op = document.getElementById('add-op').value;
      var unit = document.getElementById('add-unit').value;
      var resultEl = document.getElementById('add-result');

      if (!baseStr) {
        resultEl.innerHTML = '<div class="dd-result-card error"><p style="color:#e03131;">请选择起始日期</p></div>';
        return;
      }
      if (isNaN(val) || val < 0) {
        resultEl.innerHTML = '<div class="dd-result-card error"><p style="color:#e03131;">请输入有效的数值</p></div>';
        return;
      }

      var base = new Date(baseStr);
      base.setHours(0, 0, 0, 0);

      var num = op === 'sub' ? -val : val;
      var result = new Date(base);

      switch (unit) {
        case 'day':
          result.setDate(result.getDate() + num);
          break;
        case 'week':
          result.setDate(result.getDate() + num * 7);
          break;
        case 'month':
          result.setMonth(result.getMonth() + num);
          break;
        case 'year':
          result.setFullYear(result.getFullYear() + num);
          break;
      }

      var diffDays = Math.round((result - base) / 86400000);
      var label = (op === 'add' ? '加' : '减') + val + ' ' + { day: '天', week: '周', month: '个月', year: '年' }[unit];

      var copyText = formatDateCN(base) + ' ' + label + ' = ' + formatDateCN(result) + ' ' + getWeekdayCN(result);

      resultEl.innerHTML =
        '<div class="dd-result-card">' +
          '<div style="text-align:center;padding:16px;">' +
            '<div style="font-size:0.9rem;color:#666;margin-bottom:8px;">' + formatDateCN(base) + '</div>' +
            '<div style="font-size:1rem;color:#4361ee;font-weight:600;margin-bottom:8px;">' + label + '</div>' +
            '<div style="font-size:1.6rem;font-weight:800;color:#333;">' + formatDateCN(result) + '</div>' +
            '<div style="font-size:1rem;color:#888;margin-top:4px;">' + getWeekdayCN(result) + '</div>' +
            (isLeapYear(result.getFullYear()) ? '<div style="margin-top:8px;font-size:0.85rem;color:#e67700;">' + result.getFullYear() + '年是闰年（366天）</div>' : '') +
          '</div>' +
          '<div style="margin-top:12px;text-align:right;"><button class="dd-btn dd-btn-secondary" onclick="copyResult(\'' + copyText.replace(/'/g, "\\'") + '\')">复制结果</button></div>' +
        '</div>';
    }

    // Countdown
    var countdownTimer = null;

    function stopCountdown() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
    }

    function calcCountdown() {
      var targetStr = document.getElementById('cd-target').value;
      var name = document.getElementById('cd-name').value.trim() || '目标日期';
      var resultEl = document.getElementById('cd-result');

      if (!targetStr) {
        resultEl.innerHTML = '<div class="dd-result-card error"><p style="color:#e03131;">请选择目标日期</p></div>';
        return;
      }

      stopCountdown();

      var target = new Date(targetStr);
      target.setHours(0, 0, 0, 0);

      function update() {
        var now = new Date();
        var diffMs = target - now;
        var resultEl2 = document.getElementById('cd-result');
        if (!resultEl2) { stopCountdown(); return; }

        if (diffMs <= 0) {
          var pastDays = Math.abs(Math.round(diffMs / 86400000));
          resultEl2.innerHTML =
            '<div class="dd-result-card">' +
              '<div class="dd-countdown-box">' +
                '<div class="cd-label">' + name + '</div>' +
                '<div class="cd-value" style="color:#e67700;">已过去</div>' +
                '<div class="cd-sub">距离 ' + formatDateCN(target) + ' 已过去 ' + pastDays + ' 天</div>' +
              '</div></div>';
          stopCountdown();
          return;
        }

        var totalDays = Math.ceil(diffMs / 86400000);
        var days = Math.floor(diffMs / 86400000);
        var hours = Math.floor((diffMs % 86400000) / 3600000);
        var mins = Math.floor((diffMs % 3600000) / 60000);
        var secs = Math.floor((diffMs % 60000) / 1000);
        var weeks = Math.floor(totalDays / 7);

        resultEl2.innerHTML =
          '<div class="dd-result-card">' +
            '<div class="dd-countdown-box">' +
              '<div class="cd-label">' + name + '</div>' +
              '<div class="cd-value">' + totalDays + ' 天</div>' +
              '<div class="cd-sub">距离 ' + formatDateCN(target) + ' ' + getWeekdayCN(target) + '（约 ' + weeks + ' 周）</div>' +
              '<div class="dd-countdown-grid">' +
                '<div class="dd-countdown-unit"><span class="num">' + days + '</span><span class="txt">天</span></div>' +
                '<div class="dd-countdown-unit"><span class="num">' + String(hours).padStart(2, '0') + '</span><span class="txt">时</span></div>' +
                '<div class="dd-countdown-unit"><span class="num">' + String(mins).padStart(2, '0') + '</span><span class="txt">分</span></div>' +
                '<div class="dd-countdown-unit"><span class="num">' + String(secs).padStart(2, '0') + '</span><span class="txt">秒</span></div>' +
              '</div>' +
            '</div>' +
            '<div class="dd-holiday-info">提示：工作日计算已排除周末，实际可用工作日约 ' + countWorkdays(now, target) + ' 天（不含法定节假日）</div>' +
          '</div>';
      }

      update();
      countdownTimer = setInterval(update, 1000);
    }

    // Set default dates
    document.getElementById('diff-start').value = formatDate(new Date());
    var futureDate = new Date();
    futureDate.setMonth(futureDate.getMonth() + 1);
    document.getElementById('diff-end').value = formatDate(futureDate);
    document.getElementById('add-base').value = formatDate(new Date());

    // Enter key support
    ['diff-start', 'diff-end'].forEach(function (id) {
      document.getElementById(id).addEventListener('change', function () { calcDiff(); });
    });
    ['add-base', 'add-val'].forEach(function (id) {
      document.getElementById(id).addEventListener('keydown', function (e) { if (e.key === 'Enter') calcAdd(); });
    });
    ['cd-target'].forEach(function (id) {
      document.getElementById(id).addEventListener('change', function () { calcCountdown(); });
    });
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
