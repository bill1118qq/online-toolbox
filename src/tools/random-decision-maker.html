      content: '';

      top: -50%;
      left: -50%;

      background: conic-gradient(
        transparent 0deg,
        rgba(255,255,255,0.15) 60deg,

    @keyframes slot-scroll {

    .history-item {

    .history-item .num {
      flex-shrink: 0;

    .history-item:nth-child(5n+1) .num { background: var(--fun-purple); }
    .history-item:nth-child(5n+2) .num { background: var(--fun-pink); }

    .history-item:nth-child(5n+4) .num { background: var(--fun-teal); }
    .history-item:nth-child(5n) .num { background: var(--fun-blue); }

    .history-item .text {
      flex: 1;

    .history-item .time {

    .empty-history {

    /* ========== Toast override for colorful theme ========== */

      }

      .result-card .value {

      }
    }
  </style>

  <script>
    /* ========== State ========== */
    var history = [];
    var isSpinning = false;

    /* ========== Presets ========== */
    var presets = {
      food: ['火锅', '烤肉', '日料', '披萨', '汉堡', '麻辣烫', '炸鸡', '螺蛳粉', '饺子', '拉面', '沙拉', '煲仔饭'],
      place: ['看电影', '逛商场', '公园散步', '博物馆', '咖啡馆', '书店', '游乐园', '爬山', '海边', '密室逃脱'],
      activity: ['看书', '运动健身', '学做饭', '画画', '写代码', '看电影', '打游戏', '听音乐', '散步', '整理房间'],
      yesno: ['是', '否']
    };

    function loadPreset(key) {
      var textarea = document.getElementById('options-input');
      textarea.value = presets[key].join('\n');

      // Toggle active state
      var btns = document.querySelectorAll('.preset-btn');
      btns.forEach(function(btn) { btn.classList.remove('active'); });
      event.target.classList.add('active');
    }

    /* ========== Parse options ========== */
    function parseOptions() {
      var text = document.getElementById('options-input').value.trim();
      if (!text) return [];
      return text.split('\n').map(function(line) { return line.trim(); }).filter(function(line) { return line.length > 0; });
    }

    /* ========== Secure random index ========== */
    function secureRandomIndex(length) {
      var arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return arr[0] % length;
    }

    /* ========== Slot machine animation ========== */
    function spin() {
      if (isSpinning) return;

      var options = parseOptions();
      if (options.length < 2) {
        showToast('请至少输入 2 个选项');
        return;
      }

      isSpinning = true;
      var spinBtn = document.getElementById('spin-btn');
      spinBtn.disabled = true;

      var slotText = document.getElementById('slot-text');
      var slotDisplay = document.getElementById('slot-display');
      var resultCard = document.getElementById('result-card');
      resultCard.classList.remove('show');

      // Start spinning animation
      slotText.classList.add('spinning');
      slotText.classList.remove('slot-result');
      slotText.style.color = '#1a1a2e';

      var spinCount = 0;
      var totalSpins = 20 + secureRandomIndex(10);
      var delay = 50;

      function animateSpin() {
        var randomOption = options[secureRandomIndex(options.length)];
        slotText.textContent = randomOption;
        spinCount++;

        if (spinCount < totalSpins) {
          delay += spinCount * 2;
          setTimeout(animateSpin, delay);
        } else {
          // Final result
          finishSpin(options, slotText, resultCard);
        }
      }

      setTimeout(animateSpin, delay);
    }

    function finishSpin(options, slotText, resultCard) {
      var finalIndex = secureRandomIndex(options.length);
      var result = options[finalIndex];

      slotText.classList.remove('spinning');
      slotText.textContent = result;
      slotText.classList.add('slot-result');

      // Show result card
      document.getElementById('result-value').textContent = result;
      resultCard.classList.add('show');

      // Fire confetti
      launchConfetti();

      // Add to history
      addToHistory(result);

      // Re-enable spin button
      var spinBtn = document.getElementById('spin-btn');
      spinBtn.disabled = false;
      isSpinning = false;
    }

    /* ========== Confetti animation ========== */
    function launchConfetti() {
      var canvas = document.getElementById('confetti-canvas');
      var ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      var colors = ['#7c3aed', '#ec4899', '#f97316', '#14b8a6', '#eab308', '#3b82f6', '#ef4444', '#22c55e'];
      var particles = [];

      for (var i = 0; i < 120; i++) {
        particles.push({
          x: canvas.width * 0.5 + (Math.random() - 0.5) * 200,
          y: canvas.height * 0.4,
          vx: (Math.random() - 0.5) * 16,
          vy: Math.random() * -18 - 4,
          w: Math.random() * 10 + 4,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotationSpeed: (Math.random() - 0.5) * 12,
          gravity: 0.35 + Math.random() * 0.15,
          opacity: 1,
          decay: 0.005 + Math.random() * 0.008
        });
      }

      var frameCount = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        var alive = false;

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.vy += p.gravity;
          p.x += p.vx;
          p.y += p.vy;
          p.rotation += p.rotationSpeed;
          p.opacity -= p.decay;

          if (p.opacity <= 0) continue;
          alive = true;

          ctx.save();
          ctx.globalAlpha = Math.max(0, p.opacity);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        }

        frameCount++;
        if (alive && frameCount < 300) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }

      requestAnimationFrame(draw);
    }

    /* ========== History ========== */
    function addToHistory(result) {
      var now = new Date();
      var timeStr = now.getHours().toString().padStart(2, '0') + ':' +
                    now.getMinutes().toString().padStart(2, '0') + ':' +
                    now.getSeconds().toString().padStart(2, '0');

      var entry = { result: result, time: timeStr, num: history.length + 1 };
      history.unshift(entry);

      if (history.length > 20) history.pop();
      renderHistory();
    }

    function renderHistory() {
      var list = document.getElementById('history-list');
      var clearBtn = document.getElementById('clear-history-btn');

      if (history.length === 0) {
        list.innerHTML = '<li class="empty-history">还没有抽取记录</li>';
        clearBtn.style.display = 'none';
        return;
      }

      clearBtn.style.display = 'inline';
      var html = '';
      for (var i = 0; i < history.length; i++) {
        var item = history[i];
        html += '<li class="history-item">' +
                  '<span class="num">' + item.num + '</span>' +
                  '<span class="text">' + escapeHtml(item.result) + '</span>' +
                  '<span class="time">' + item.time + '</span>' +
                '</li>';
      }
      list.innerHTML = html;
    }

    function clearHistory() {
      history = [];
      renderHistory();
      showToast('历史记录已清空');
    }

    /* ========== Copy result ========== */
    function copyResult() {
      var text = document.getElementById('result-value').textContent;
      if (!text) {
        showToast('请先抽取一次');
        return;
      }
      navigator.clipboard.writeText(text).then(function() {
        showToast('已复制: ' + text);
      }).catch(function() {
        showToast('复制失败，请手动选择');
      });
    }

    /* ========== Toast ========== */
    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }

    /* ========== Escape HTML ========== */
    function escapeHtml(text) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(text));
      return div.innerHTML;
    }

    /* ========== Handle window resize for confetti canvas ========== */
    window.addEventListener('resize', function() {
      var canvas = document.getElementById('confetti-canvas');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
