      const text = document.getElementById('input').value;
      if (!text.trim()) { showToast('请输入文本'); return; }

      const map = direction === 's2t' ? s2tMap : {};
      const t2sMap = {};
      for (const [s, t] of Object.entries(s2tMap)) {
        t2sMap[t] = s;
      }
      const targetMap = direction === 's2t' ? s2tMap : t2sMap;

      let result = '';
      for (const char of text) {
        result += targetMap[char] || char;
      }
      document.getElementById('result').textContent = result;
    }

    function copyResult() {
      const text = document.getElementById('result').textContent;
      if (!text) { showToast('请先转换'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('已复制'));
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
