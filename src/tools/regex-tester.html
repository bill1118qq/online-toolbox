  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"什么是正则表达式？","acceptedAnswer":{"@type":"Answer","text":"正则表达式（Regular Expression，简称Regex）是一种用于匹配字符串模式的强大工具。它使用特定语法定义搜索模式，广泛应用于文本搜索、数据验证、日志分析等场景。例如\\d+可以匹配一个或多个数字。"}},{"@type":"Question","name":"正则表达式中g和i标志是什么意思？","acceptedAnswer":{"@type":"Answer","text":"g是global（全局匹配）标志，会找出文本中所有匹配项而不仅是第一个；i是ignoreCase（忽略大小写）标志，匹配时不区分英文字母大小写。还有m（多行模式）标志使^和$匹配每行的开头和结尾，s（dotAll）标志使.匹配包括换行符在内的所有字符。"}},{"@type":"Question","name":"正则表达式常用有哪些匹配模式？","acceptedAnswer":{"@type":"Answer","text":"常用的正则匹配模式包括：\\d匹配数字、\\w匹配字母数字下划线、\\s匹配空白字符、.匹配任意字符、^匹配行首、$匹配行尾、*匹配0或多次、+匹配1或多次、?匹配0或1次。方括号[]用于字符集合，圆括号()用于分组。"}},{"@type":"Question","name":"正则表达式可以用来验证什么？","acceptedAnswer":{"@type":"Answer","text":"正则表达式常用于验证电子邮件格式、手机号码、身份证号、URL地址、日期格式、密码强度等。通过定义精确的匹配规则，可以有效过滤不合规的输入数据，是前端表单验证和后端数据校验的重要工具。"}}]}
  </script>

<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>正则表达式测试</h1>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 16px;">
      <span style="display: flex; align-items: center; font-size: 1.2rem; font-weight: 600;">/</span>
      <input type="text" id="regex" placeholder="输入正则表达式，如: \d+" style="flex: 1; font-family: monospace;">
      <span style="display: flex; align-items: center; font-size: 1.2rem; font-weight: 600;">/</span>
      <input type="text" id="flags" value="g" placeholder="标志" style="width: 60px; font-family: monospace;">
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;">
      <label><input type="checkbox" id="flagG" checked onchange="syncFlags()"> g (全局)</label>
      <label><input type="checkbox" id="flagI" onchange="syncFlags()"> i (忽略大小写)</label>
      <label><input type="checkbox" id="flagM" onchange="syncFlags()"> m (多行)</label>
      <label><input type="checkbox" id="flagS" onchange="syncFlags()"> s (dotAll)</label>
    </div>

    <h3 style="margin-bottom: 8px;">测试文本</h3>
    <textarea id="testText" placeholder="输入测试文本..." style="min-height: 100px;">Hello World 123
测试中文 abc@example.com
2026-03-22 https://example.com</textarea>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="testRegex()">测试匹配</button>
      <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px;">
      <div>
        <h3 style="margin-bottom: 8px;">匹配结果 (高亮)</h3>
        <div id="highlighted" class="result-box" style="min-height: 80px;"></div>
      </div>
      <div>
        <h3 style="margin-bottom: 8px;">匹配列表</h3>
        <div id="matches" class="result-box" style="min-height: 80px; font-size: 0.85rem;"></div>
      </div>
    </div>

    <h3 style="margin: 24px 0 12px;">常用正则模板</h3>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <button class="btn btn-secondary" onclick="useTemplate('[\\u4e00-\\u9fff]+', 'g', '中文')">中文</button>
      <button class="btn btn-secondary" onclick="useTemplate('\\b\\w+@[\\w.]+\\w\\b', 'g', '邮箱')">邮箱</button>
      <button class="btn btn-secondary" onclick="useTemplate('https?://[\\w./-]+', 'g', 'URL')">URL</button>
      <button class="btn btn-secondary" onclick="useTemplate('1[3-9]\\d{9}', 'g', '手机号')">手机号</button>
      <button class="btn btn-secondary" onclick="useTemplate('\\d{4}-\\d{2}-\\d{2}', 'g', '日期')">日期</button>
      <button class="btn btn-secondary" onclick="useTemplate('\\d+\\.\\d+\\.\\d+\\.\\d+', 'g', 'IP')">IP地址</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const regexInput = document.getElementById('regex');
    const testTextInput = document.getElementById('testText');

    regexInput.addEventListener('input', testRegex);
    testTextInput.addEventListener('input', testRegex);

    function syncFlags() {
      let flags = '';
      if (document.getElementById('flagG').checked) flags += 'g';
      if (document.getElementById('flagI').checked) flags += 'i';
      if (document.getElementById('flagM').checked) flags += 'm';
      if (document.getElementById('flagS').checked) flags += 's';
      document.getElementById('flags').value = flags;
      testRegex();
    }

    function testRegex() {
      const pattern = regexInput.value;
      const text = testTextInput.value;
      const highlighted = document.getElementById('highlighted');
      const matches = document.getElementById('matches');

      if (!pattern) {
        highlighted.innerHTML = text;
        matches.textContent = '';
        return;
      }

      try {
        const flags = document.getElementById('flags').value;
        const regex = new RegExp(pattern, flags);
        const matchList = [...text.matchAll(regex)];

        if (matchList.length === 0) {
          highlighted.textContent = text;
          matches.textContent = '无匹配';
          return;
        }

        let result = '';
        let lastIndex = 0;
        matchList.forEach(m => {
          result += escapeHtml(text.substring(lastIndex, m.index));
          result += '<mark style="background: #ffeb3b; padding: 1px 2px; border-radius: 2px;">' + escapeHtml(m[0]) + '</mark>';
          lastIndex = m.index + m[0].length;
        });
        result += escapeHtml(text.substring(lastIndex));
        highlighted.innerHTML = result;

        matches.innerHTML = matchList.map((m, i) =>
          `<div><strong>[${i}]</strong> "${escapeHtml(m[0])}" (位置 ${m.index})</div>`
        ).join('');
      } catch (e) {
        highlighted.textContent = text;
        matches.innerHTML = '<span style="color: red;">正则语法错误: ' + escapeHtml(e.message) + '</span>';
      }
    }

    function useTemplate(pattern, flags, label) {
      regexInput.value = pattern;
      document.getElementById('flags').value = flags;
      document.getElementById('flagG').checked = flags.includes('g');
      document.getElementById('flagI').checked = flags.includes('i');
      document.getElementById('flagM').checked = flags.includes('m');
      testRegex();
    }

    function clearAll() {
      regexInput.value = '';
      testTextInput.value = '';
      document.getElementById('highlighted').textContent = '';
      document.getElementById('matches').textContent = '';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
