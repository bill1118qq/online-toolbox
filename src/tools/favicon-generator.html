<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favicon生成器 - 在线制作网站图标 - 在线工具箱</title>
  <meta name="description" content="免费在线Favicon生成器，上传图片或输入文字生成favicon.ico和各尺寸图标。支持16x16、32x32、48x48、64x64、128x128、256x256。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <meta property="og:title" content="Favicon生成器 - 在线制作网站图标">
  <meta property="og:description" content="上传图片或输入文字，一键生成多尺寸Favicon图标。">
  <meta property="og:url" content="https://eitools.cn/src/tools/favicon-generator.html">
  <link rel="canonical" href="https://eitools.cn/src/tools/favicon-generator.html">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"Favicon生成器","description":"在线制作网站favicon图标","url":"https://eitools.cn/src/tools/favicon-generator.html","applicationCategory":"DeveloperApplication","operatingSystem":"Any"}
  </script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>Favicon 生成器</h1>
    </div>
    <p style="color:#666;margin-bottom:20px;">上传图片或输入文字，生成多尺寸 Favicon 图标。</p>
    <div style="max-width:600px;">
      <div style="display:flex;gap:8px;margin-bottom:16px;">
        <button onclick="switchTab('upload')" id="tab-upload" class="tab-btn active">上传图片</button>
        <button onclick="switchTab('text')" id="tab-text" class="tab-btn">文字生成</button>
      </div>
      <div id="upload-area">
        <input type="file" id="fileInput" accept="image/*" onchange="fromImage(this.files[0])" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px;">
      </div>
      <div id="text-area" style="display:none;margin-bottom:16px;">
        <div style="display:grid;gap:12px;">
          <input type="text" id="genText" value="A" maxlength="2" placeholder="1-2个字符" oninput="fromText()" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:1.2rem;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><label style="font-size:0.85rem;color:#888;">背景色</label>
              <input type="color" id="genBg" value="#4361ee" onchange="fromText()" style="width:100%;height:36px;border:none;cursor:pointer;"></div>
            <div><label style="font-size:0.85rem;color:#888;">文字色</label>
              <input type="color" id="genFg" value="#ffffff" onchange="fromText()" style="width:100%;height:36px;border:none;cursor:pointer;"></div>
          </div>
          <div><label style="font-size:0.85rem;color:#888;">形状</label>
            <div style="display:flex;gap:8px;margin-top:4px;">
              <button onclick="setShape('square')" class="shape-btn active" data-s="square">方形</button>
              <button onclick="setShape('rounded')" class="shape-btn" data-s="rounded">圆角</button>
              <button onclick="setShape('circle')" class="shape-btn" data-s="circle">圆形</button>
            </div></div>
        </div>
      </div>
      <div style="background:#f0f2f5;padding:20px;border-radius:12px;">
        <p style="font-weight:600;margin-bottom:12px;">预览</p>
        <div id="preview-grid" style="display:flex;gap:16px;align-items:end;flex-wrap:wrap;"></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="downloadSize(16)" style="padding:8px 16px;font-size:0.85rem;">16x16</button>
        <button class="btn btn-primary" onclick="downloadSize(32)" style="padding:8px 16px;font-size:0.85rem;">32x32</button>
        <button class="btn btn-primary" onclick="downloadSize(48)" style="padding:8px 16px;font-size:0.85rem;">48x48</button>
        <button class="btn btn-primary" onclick="downloadSize(64)" style="padding:8px 16px;font-size:0.85rem;">64x64</button>
        <button class="btn btn-primary" onclick="downloadSize(128)" style="padding:8px 16px;font-size:0.85rem;">128x128</button>
        <button class="btn btn-primary" onclick="downloadSize(256)" style="padding:8px 16px;font-size:0.85rem;">256x256</button>
      </div>
      <div style="margin-top:16px;background:#f0f2f5;padding:16px;border-radius:12px;">
        <p style="font-size:0.85rem;color:#888;margin-bottom:8px;">使用方法 - 复制以下代码到 HTML 的 &lt;head&gt; 中：</p>
        <code id="usage-code" style="display:block;padding:12px;background:#1a1a2e;color:#a8dadc;border-radius:8px;font-size:0.8rem;word-break:break-all;">&lt;link rel="icon" href="favicon.ico" type="image/x-icon"&gt;
&lt;link rel="icon" href="favicon-32.png" sizes="32x32" type="image/png"&gt;</code>
        <button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('usage-code').textContent)" style="margin-top:8px;padding:6px 16px;font-size:0.85rem;">复制代码</button>
      </div>
    </div>
  </div>
  <script>
    let sourceImg = null, shape = 'square';
    const sizes = [16, 32, 48, 64, 128, 256];
    const style = document.createElement('style');
    style.textContent = '.tab-btn,.shape-btn{padding:8px 20px;border:1px solid #ddd;border-radius:8px;cursor:pointer;background:white;font-size:0.9rem;}.tab-btn.active,.shape-btn.active{background:#4361ee;color:white;border-color:#4361ee;}';
    document.head.appendChild(style);

    function switchTab(t) {
      document.getElementById('upload-area').style.display = t === 'upload' ? 'block' : 'none';
      document.getElementById('text-area').style.display = t === 'text' ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + t).classList.add('active');
      if (t === 'text') fromText();
    }
    function setShape(s) { shape = s; document.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('active', b.dataset.s === s)); if (!sourceImg) fromText(); }

    function fromImage(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => { sourceImg = new Image(); sourceImg.onload = updatePreview; sourceImg.src = e.target.result; };
      reader.readAsDataURL(file);
    }
    function fromText() { sourceImg = null; updatePreview(); }

    function drawFavicon(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      if (sourceImg) {
        ctx.drawImage(sourceImg, 0, 0, size, size);
      } else {
        ctx.fillStyle = document.getElementById('genBg').value;
        if (shape === 'circle') { ctx.beginPath(); ctx.arc(size/2, size/2, size/2, 0, Math.PI*2); ctx.fill(); }
        else if (shape === 'rounded') { roundRect(ctx, 0, 0, size, size, size*0.2); ctx.fill(); }
        else { ctx.fillRect(0, 0, size, size); }
        ctx.fillStyle = document.getElementById('genFg').value;
        ctx.font = `bold ${size * 0.6}px sans-serif`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(document.getElementById('genText').value || 'A', size/2, size/2);
      }
      return canvas;
    }
    function roundRect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r); ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath(); }

    function updatePreview() {
      document.getElementById('preview-grid').innerHTML = sizes.map(s => {
        const c = drawFavicon(s);
        const display = Math.min(s, 64);
        return `<div style="text-align:center;"><canvas id="prev-${s}" width="${s}" height="${s}" style="width:${display}px;height:${display}px;border-radius:${shape==='circle'?'50%':shape==='rounded'?'8px':'2px'};border:1px solid #ddd;"></canvas><p style="font-size:0.75rem;color:#888;margin-top:4px;">${s}x${s}</p></div>`;
      }).join('');
      sizes.forEach(s => { const c = drawFavicon(s); const el = document.getElementById('prev-' + s); if(el) el.getContext('2d').drawImage(c, 0, 0); });
    }

    function downloadSize(size) {
      const c = drawFavicon(size);
      c.toBlob(blob => { const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `favicon-${size}.png`; a.click(); }, 'image/png');
    }
    updatePreview();
  </script>
  <div id="share-bar"></div>
  <script src="../../js/share.js"></script>
</body>
</html>
