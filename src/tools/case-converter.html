<head>
  <meta charset="UTF-8">

  <meta name="description" content="免费在线英文大小写转换工具，支持首字母大写、全大写、全小写、驼峰命名等转换。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="../../manifest.json">
  <link rel="stylesheet" href="../../css/style.css">
  <meta property="og:type" content="website">
  <meta property="og:title" content="大小写转换 - 在线工具箱">
  <meta property="og:description" content="免费在线英文大小写转换工具，支持首字母大写、全大写、全小写、驼峰命名等转换。">

  <link rel="canonical" href="https://eitools.cn/src/tools/case-converter.html">
  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"WebApplication","name":"大小写转换","url":"https://eitools.cn/src/tools/case-converter.html","description":"免费在线英文大小写转换工具，支持首字母大写、全大写、全小写、驼峰命名等转换。","applicationCategory":"UtilityApplication","operatingSystem":"Any","offers":{"@type":"Offer","price":"0"}}
  </script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHMQZC85HG"></script>
  <script src="../../js/analytics.js"></script>
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>大小写转换</h1>
    </div>

    <textarea id="input" placeholder="输入需要转换的文本...">hello world test example</textarea>

    <div class="btn-group" style="flex-wrap: wrap;">
      <button class="btn btn-primary" onclick="convert('upper')">全部大写 UPPER</button>
      <button class="btn btn-primary" onclick="convert('lower')">全部小写 lower</button>
      <button class="btn btn-secondary" onclick="convert('title')">首字母大写 Title</button>
      <button class="btn btn-secondary" onclick="convert('sentence')">句首大写 Sentence</button>
      <button class="btn btn-secondary" onclick="convert('camel')">驼峰命名 camelCase</button>
      <button class="btn btn-secondary" onclick="convert('snake')">蛇形命名 snake_case</button>
      <button class="btn btn-secondary" onclick="convert('kebab')">短横线 kebab-case</button>
      <button class="btn btn-secondary" onclick="convert('toggle')">大小写互换</button>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 12px;">
      <button class="btn btn-secondary" onclick="copyResult()">复制结果</button>
      <button class="btn btn-secondary" onclick="document.getElementById('input').value = document.getElementById('result').textContent">结果回填</button>
    </div>

    <div id="result" class="result-box" style="min-height: 120px; margin-top: 16px;"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function convert(type) {
      const text = document.getElementById('input').value;
      if (!text) { showToast('请输入文本'); return; }
      let result = '';
      switch (type) {
        case 'upper': result = text.toUpperCase(); break;
        case 'lower': result = text.toLowerCase(); break;
        case 'title': result = text.replace(/\b\w/g, c => c.toUpperCase()); break;
        case 'sentence': result = text.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, c => c.toUpperCase()); break;
        case 'camel':
          result = text.toLowerCase().replace(/[-_\s]+(.)/g, (_, c) => c.toUpperCase());
          break;
        case 'snake':
          result = text.replace(/\s+/g, '_').replace(/([A-Z])/g, '_$1').replace(/^_/, '').toLowerCase();
          break;
        case 'kebab':
          result = text.replace(/\s+/g, '-').replace(/([A-Z])/g, '-$1').replace(/^-/, '').toLowerCase();
          break;
        case 'toggle':
          result = text.split('').map(c => c === c.toUpperCase() ? c.toLowerCase() : c.toUpperCase()).join('');
          break;
      }
      document.getElementById('result').textContent = result;
    }

    function copyResult() {
      const text = document.getElementById('result').textContent;
      if (!text) { showToast('请先转换'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('已复制'));
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
