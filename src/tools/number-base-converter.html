<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>进制转换 - 在线工具箱</title>
  <meta name="description" content="免费在线进制转换工具，支持二进制、八进制、十进制、十六进制互相转换。">
  <link rel="icon" href="../../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; 返回首页</a>
      <h1>进制转换</h1>
    </div>

    <div style="background: white; padding: 20px; border-radius: 12px;">
      <label style="display: block; margin-bottom: 12px;">
        <strong>输入数值：</strong>
        <input type="text" id="input" placeholder="输入数字" style="margin-top: 8px; font-family: monospace;" oninput="convert()">
      </label>
      <label style="display: block; margin-bottom: 16px;">
        <strong>输入进制：</strong>
        <select id="fromBase" style="padding: 6px 10px; border-radius: 6px; border: 2px solid #e0e0e0;" onchange="convert()">
          <option value="10" selected>十进制 (10)</option>
          <option value="2">二进制 (2)</option>
          <option value="8">八进制 (8)</option>
          <option value="16">十六进制 (16)</option>
        </select>
      </label>

      <div style="display: grid; gap: 12px;">
        <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
          <div><strong>二进制 (2)</strong><br><code id="bin" style="word-break: break-all;"></code></div>
          <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.8rem;" onclick="copyVal('bin')">复制</button>
        </div>
        <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
          <div><strong>八进制 (8)</strong><br><code id="oct"></code></div>
          <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.8rem;" onclick="copyVal('oct')">复制</button>
        </div>
        <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
          <div><strong>十进制 (10)</strong><br><code id="dec"></code></div>
          <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.8rem;" onclick="copyVal('dec')">复制</button>
        </div>
        <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center;">
          <div><strong>十六进制 (16)</strong><br><code id="hex" style="text-transform: uppercase;"></code></div>
          <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.8rem;" onclick="copyVal('hex')">复制</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function convert() {
      const input = document.getElementById('input').value.trim();
      const fromBase = parseInt(document.getElementById('fromBase').value);

      if (!input) {
        ['bin', 'oct', 'dec', 'hex'].forEach(id => document.getElementById(id).textContent = '');
        return;
      }

      try {
        const decimal = parseInt(input, fromBase);
        if (isNaN(decimal)) {
          ['bin', 'oct', 'dec', 'hex'].forEach(id => document.getElementById(id).textContent = '无效输入');
          return;
        }
        document.getElementById('bin').textContent = decimal.toString(2);
        document.getElementById('oct').textContent = decimal.toString(8);
        document.getElementById('dec').textContent = decimal.toString(10);
        document.getElementById('hex').textContent = decimal.toString(16).toUpperCase();
      } catch (e) {
        ['bin', 'oct', 'dec', 'hex'].forEach(id => document.getElementById(id).textContent = '转换错误');
      }
    }

    function copyVal(id) {
      const text = document.getElementById(id).textContent;
      if (!text || text.includes('无效') || text.includes('错误')) { showToast('无有效值'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('已复制'));
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
<div id="share-bar"></div>
<script src="../../js/share.js"></script>
</body>
</html>
