      { char: "诚", pinyin: "cheng", meaning: "诚实、真诚", wx: "metal", styles: ["elegant","grand"], gender: ["m","n"] },
      { char: "勃", pinyin: "bo", meaning: "蓬勃、旺盛", wx: "water", styles: ["grand"], gender: ["m","n"] },
      { char: "尧", pinyin: "yao", meaning: "高远、圣明", wx: "wood", styles: ["grand","classical"], gender: ["m","n"] },
      { char: "弈", pinyin: "yi", meaning: "围棋、智慧", wx: "wood", styles: ["classical","elegant"], gender: ["m","n"] },
      { char: "砚", pinyin: "yan", meaning: "砚台、文雅", wx: "earth", styles: ["classical","elegant"], gender: ["m","n"] },
      { char: "疏", pinyin: "shu", meaning: "疏朗、超脱", wx: "metal", styles: ["classical"], gender: ["m","f","n"] },
      { char: "凛", pinyin: "lin", meaning: "凛然、威严", wx: "water", styles: ["grand","classical"], gender: ["m","n"] },
      { char: "霄", pinyin: "xiao", meaning: "云霄、凌霄", wx: "water", styles: ["grand","classical"], gender: ["m","n"] },
      { char: "澈", pinyin: "che", meaning: "清澈见底", wx: "water", styles: ["elegant","classical"], gender: ["m","f","n"] },
      { char: "灿", pinyin: "can", meaning: "灿烂、光彩", wx: "fire", styles: ["grand","cute"], gender: ["m","f","n"] },
      { char: "颖", pinyin: "ying", meaning: "聪慧出众", wx: "wood", styles: ["elegant","cute"], gender: ["f","n"] },
      { char: "桢", pinyin: "zhen", meaning: "坚硬的木头", wx: "wood", styles: ["elegant","grand"], gender: ["m","n"] },
      { char: "淳", pinyin: "chun", meaning: "淳朴、淳厚", wx: "water", styles: ["elegant"], gender: ["m","n"] },
      { char: "洵", pinyin: "xun", meaning: "确实、诚实", wx: "water", styles: ["classical","elegant"], gender: ["m","f","n"] },
      { char: "筝", pinyin: "zheng", meaning: "古筝、雅韵", wx: "wood", styles: ["classical","elegant"], gender: ["f","n"] },
      { char: "臻", pinyin: "zhen", meaning: "达到完美", wx: "fire", styles: ["elegant","grand"], gender: ["m","f","n"] },
      { char: "颂", pinyin: "song", meaning: "赞颂、雅颂", wx: "wood", styles: ["elegant","classical"], gender: ["m","f","n"] },
      { char: "霁", pinyin: "ji", meaning: "雨后初晴", wx: "water", styles: ["classical","elegant"], gender: ["m","f","n"] },
      { char: "舸", pinyin: "ge", meaning: "大船、远航", wx: "wood", styles: ["grand","classical"], gender: ["m","n"] },
      { char: "麟", pinyin: "lin", meaning: "麒麟、祥瑞", wx: "fire", styles: ["grand","classical"], gender: ["m","n"] },
      { char: "栩", pinyin: "xu", meaning: "栩栩如生", wx: "wood", styles: ["elegant","classical"], gender: ["m","f","n"] },
      { char: "漫", pinyin: "man", meaning: "漫天、自由", wx: "water", styles: ["classical","cute"], gender: ["f","n"] },
      { char: "窈", pinyin: "yao", meaning: "窈窕淑女", wx: "fire", styles: ["classical"], gender: ["f","n"] },
      { char: "瞳", pinyin: "tong", meaning: "眼瞳、清澈", wx: "fire", styles: ["elegant","cute"], gender: ["f","n"] },
      { char: "宥", pinyin: "you", meaning: "宽容、宽宏", wx: "earth", styles: ["elegant","classical"], gender: ["m","n"] },
      { char: "允", pinyin: "yun", meaning: "公允、真诚", wx: "earth", styles: ["elegant","classical"], gender: ["m","n"] },
      { char: "妤", pinyin: "yu", meaning: "聪慧美丽", wx: "water", styles: ["elegant","classical"], gender: ["f","n"] },
      { char: "洛", pinyin: "luo", meaning: "洛水、灵秀", wx: "water", styles: ["elegant","classical"], gender: ["f","n"] }
    ];

    // Deduplicate by char
    var seen = {};
    CHAR_DB = CHAR_DB.filter(function(c) {
      if (seen[c.char]) return false;
      seen[c.char] = true;
      return true;
    });

    // Common surnames
    var COMMON_SURNAMES = [
      "赵","钱","孙","李","周","吴","郑","王","冯","陈",
      "褚","卫","蒋","沈","韩","杨","朱","秦","尤","许",
      "何","吕","施","张","孔","曹","严","华","金","魏",
      "陶","姜","戚","谢","邹","喻","柏","水","窦","章",
      "云","苏","潘","葛","奚","范","彭","郎","鲁","韦",
      "昌","马","苗","凤","花","方","俞","任","袁","柳",
      "酆","鲍","史","唐","费","廉","岑","薛","雷","贺",
      "倪","汤","滕","殷","罗","毕","郝","邬","安","常",
      "乐","于","时","傅","皮","卞","齐","康","伍","余",
      "元","卜","顾","孟","平","黄","和","穆","萧","尹",
      "姚","邵","湛","汪","祁","毛","禹","狄","米","贝",
      "明","臧","计","伏","成","戴","谈","宋","茅","庞",
      "熊","纪","舒","屈","项","祝","董","梁","杜","阮",
      "蓝","闵","席","季","麻","强","贾","路","娄","危"
    ];

    // Wuxing mapping from birth date (simplified: based on year stem)
    var WUXING_NAMES = {
      metal: "金", wood: "木", water: "水", fire: "火", earth: "土"
    };
    var WUXING_COLORS = {
      metal: "#c9a54e", wood: "#4a8c5c", water: "#4a7fb5", fire: "#c75c3a", earth: "#a07850"
    };

    // ========== Initialization ==========
    (function init() {
      renderSurnameHints();
      setupRadioGroups();
    })();

    function renderSurnameHints() {
      var container = document.getElementById("surname-hints");
      var hints = COMMON_SURNAMES.slice(0, 24);
      container.innerHTML = hints.map(function(s) {
        return '<span class="surname-hint" onclick="selectSurname(this)">' + s + '</span>';
      }).join("");
    }

    function selectSurname(el) {
      document.getElementById("surname").value = el.textContent;
    }

    function setupRadioGroups() {
      document.querySelectorAll(".radio-group").forEach(function(group) {
        group.querySelectorAll(".radio-btn").forEach(function(btn) {
          btn.addEventListener("click", function() {
            group.querySelectorAll(".radio-btn").forEach(function(b) {
              b.classList.remove("active");
              b.querySelector("input").checked = false;
            });
            btn.classList.add("active");
            btn.querySelector("input").checked = true;
          });
        });
      });
    }

    // ========== Wuxing from Birth Date ==========
    function getWuxingFromDate(dateStr) {
      if (!dateStr) return null;
      var parts = dateStr.split("-");
      var year = parseInt(parts[0]);
      // Simplified: heavenly stem cycle, index by (year - 4) % 10
      var stemIndex = (year - 4) % 10;
      var stemWuxing = ["wood","wood","fire","fire","earth","earth","metal","metal","water","water"];
      return stemWuxing[stemIndex];
    }

    function getWuxingSuggestion(wuxing) {
      if (!wuxing) return "";
      // Generative cycle: wood->fire->earth->metal->water->wood
      var generates = { metal: "water", water: "wood", wood: "fire", fire: "earth", earth: "metal" };
      var suggested = generates[wuxing];
      return "日主五行属【" + WUXING_NAMES[wuxing] + "】，建议补充【" + WUXING_NAMES[suggested] + "】属性的字";
    }

    document.getElementById("birthdate").addEventListener("change", function() {
      var wx = getWuxingFromDate(this.value);
      var info = document.getElementById("wuxing-info");
      if (wx) {
        info.textContent = getWuxingSuggestion(wx);
        info.style.color = WUXING_COLORS[wx] || "#9a7b5f";
      } else {
        info.textContent = "选择出生日期后将自动推算日主五行";
        info.style.color = "#9a7b5f";
      }
    });

    // ========== Name Generation ==========
    function generateNames() {
      var surname = document.getElementById("surname").value.trim();
      if (!surname) {
        showToast("请输入姓氏");
        return;
      }
      if (surname.length > 2) {
        showToast("姓氏最多两个字");
        return;
      }

      var gender = document.querySelector('input[name="gender"]:checked').value;
      var style = document.querySelector('input[name="style"]:checked').value;
      var birthdate = document.getElementById("birthdate").value;
      var preferredWx = getWuxingFromDate(birthdate);

      var genderFilter = gender === "neutral" ? ["m","f","n"] : (gender === "male" ? ["m","n"] : ["f","n"]);
      var pool = CHAR_DB.filter(function(c) {
        return c.gender.some(function(g) { return genderFilter.indexOf(g) >= 0; })
          && c.styles.indexOf(style) >= 0;
      });

      // If wuxing preference, sort: preferred wuxing chars first
      if (preferredWx) {
        var generates = { metal: "water", water: "wood", wood: "fire", fire: "earth", earth: "metal" };
        var suggestedWx = generates[preferredWx];
        pool = pool.slice().sort(function(a, b) {
          var aMatch = a.wx === suggestedWx ? 0 : (a.wx === preferredWx ? 1 : 2);
          var bMatch = b.wx === suggestedWx ? 0 : (b.wx === preferredWx ? 1 : 2);
          return aMatch - bMatch;
        });
      }

      if (pool.length < 2) {
        showToast("可用汉字不足，请调整条件");
        return;
      }

      var results = [];
      var usedNames = {};
      var maxAttempts = 200;
      var attempts = 0;

      while (results.length < 8 && attempts < maxAttempts) {
        attempts++;
        var nameLen = Math.random() < 0.45 ? 1 : 2;
        var chars = [];

        if (nameLen === 1) {
          var idx = Math.floor(Math.random() * pool.length);
          chars.push(pool[idx]);
        } else {
          var i1 = Math.floor(Math.random() * pool.length);
          var i2 = Math.floor(Math.random() * pool.length);
          if (i1 === i2) continue;
          chars.push(pool[i1], pool[i2]);
        }

        var fullName = surname + chars.map(function(c) { return c.char; }).join("");
        if (usedNames[fullName]) continue;
        usedNames[fullName] = true;

        var pinyin = chars.map(function(c) { return c.pinyin; }).join(" ");
        var meaning = chars.map(function(c) { return c.char + "（" + c.meaning + "）"; }).join("，");

        var traits = generateTraits(chars, style);
        var wuxingDesc = chars.map(function(c) { return c.char + "属" + WUXING_NAMES[c.wx]; }).join("、");

        results.push({
          fullName: fullName,
          surname: surname,
          chars: chars,
          pinyin: pinyin,
          meaning: meaning,
          traits: traits,
          wuxingDesc: wuxingDesc,
          isWuxingRecommended: preferredWx ? chars.some(function(c) {
            var generates = { metal: "water", water: "wood", wood: "fire", fire: "earth", earth: "metal" };
            return c.wx === preferredWx || c.wx === generates[preferredWx];
          }) : false
        });
      }

      if (results.length === 0) {
        showToast("生成失败，请调整条件后重试");
        return;
      }

      renderResults(results, preferredWx);
    }

    function generateTraits(chars, style) {
      var traitMap = {
        elegant: {
          "清": ["文雅","清高","内涵"],
          "雅": ["高贵","优雅","品味"],
          "诗": ["才情","诗意","浪漫"],
          "涵": ["涵养","知性","温柔"],
          "静": ["沉稳","安静","内敛"],
          "舒": ["从容","舒朗","优雅"],
          "书": ["博学","儒雅","知性"],
          "默": ["深邃","内敛","沉稳"],
          default: ["文雅","有内涵","气质出众"]
        },
        grand: {
          "浩": ["胸怀广阔","志向高远"],
          "鹏": ["志向远大","气魄非凡"],
          "坤": ["厚德载物","稳重可靠"],
          "泰": ["泰然自若","胸怀天下"],
          "震": ["振兴家业","气势磅礴"],
          default: ["志向远大","气度不凡","光明磊落"]
        },
        cute: {
          "萌": ["可爱活泼","萌趣十足"],
          "朵": ["甜美纯真","活泼可爱"],
          "桃": ["青春活力","甜美可人"],
          "暖": ["温暖贴心","善解人意"],
          default: ["活泼可爱","纯真善良","讨人喜欢"]
        },
        classical: {
          "之": ["典雅古朴","书卷气"],
          "若": ["淡然超脱","诗意"],
          "墨": ["满腹经纶","书卷气"],
          "卿": ["温婉端庄","古韵悠长"],
          default: ["古韵悠长","气质非凡","才情出众"]
        }
      };

      var allTraits = [];
      chars.forEach(function(c) {
        var styleTraits = traitMap[style] || traitMap.elegant;
        var t = styleTraits[c.char] || styleTraits.default;
        if (t && t.length) {
          allTraits = allTraits.concat(t);
        }
      });

      // Deduplicate and limit
      var unique = [];
      allTraits.forEach(function(t) {
        if (unique.indexOf(t) < 0) unique.push(t);
      });
      return unique.slice(0, 4);
    }

    function renderResults(results, preferredWx) {
      var container = document.getElementById("results-list");
      var html = "";

      results.forEach(function(r) {
        var wuxingBadge = "";
        if (r.isWuxingRecommended) {
          wuxingBadge = ' <span style="display:inline-block;padding:2px 8px;background:linear-gradient(135deg,#fdf2e9,#fce8d0);color:#a06830;border-radius:10px;font-size:0.72rem;font-weight:600;margin-left:6px;vertical-align:middle;">五行推荐</span>';
        }

        var charHtml = '<div class="char-breakdown">';
        // Show surname
        charHtml += '<div class="char-detail"><span class="char">' + r.surname + '</span><span class="py">姓</span></div>';
        r.chars.forEach(function(c) {
          charHtml += '<div class="char-detail"><span class="char">' + c.char + '</span><span class="py">' + c.pinyin + '</span><span class="meaning">' + c.meaning + '</span></div>';
        });
        charHtml += '</div>';

        var traitHtml = r.traits.map(function(t) {
          return '<span class="trait-tag">' + t + '</span>';
        }).join("");

        html += '<div class="name-card">' +
          '<button class="name-card-copy" onclick="copyName(\'' + r.fullName + '\')">复制</button>' +
          '<div class="name-card-header">' +
            '<span class="name-card-name">' + r.fullName + '</span>' +
            wuxingBadge +
            '<span class="name-card-pinyin">' + r.pinyin + '</span>' +
          '</div>' +
          charHtml +
          '<div class="name-card-meaning">释义：' + r.meaning + '。五行：' + r.wuxingDesc + '。</div>' +
          '<div class="name-card-traits">性格特质：' + traitHtml + '</div>' +
        '</div>';
      });

      container.innerHTML = html || '<div class="no-result-hint">未能生成名字，请调整条件后重试</div>';
    }

    function copyName(name) {
      navigator.clipboard.writeText(name).then(function() {
        showToast("已复制：" + name);
      }).catch(function() {
        showToast("复制失败");
      });
    }

    function showToast(msg) {
      var toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.classList.add("show");
      setTimeout(function() { toast.classList.remove("show"); }, 2000);
    }
  </script>
