    function minifyJS() {
      try {
        var code = document.getElementById('jsInput').value;
        if (!code.trim()) {
          showToast('请输入 JavaScript 代码');
          return;
        }
        var result = '';
        var i = 0;
        var len = code.length;
        var inString = false;
        var stringChar = '';
        var inLineComment = false;
        var inBlockComment = false;
        var inTemplateLiteral = false;
        var lastNonSpace = '';

        while (i < len) {
          var ch = code[i];
          var next = i + 1 < len ? code[i + 1] : '';

          // Template literals
          if (ch === '`' && !inString && !inLineComment && !inBlockComment) {
            inTemplateLiteral = !inTemplateLiteral;
            result += ch;
            i++;
            continue;
          }

          if (inTemplateLiteral) {
            if (ch === '\\') {
              result += ch + next;
              i += 2;
            } else {
              result += ch;
              i++;
            }
            continue;
          }

          // Block comments
          if (inBlockComment) {
            if (ch === '*' && next === '/') {
              inBlockComment = false;
              i += 2;
              // Keep a space to separate tokens
              if (result.length > 0 && result[result.length - 1] !== ' ' && result[result.length - 1] !== '\n') {
                result += ' ';
              }
            } else {
              i++;
            }
            continue;
          }

          // Line comments
          if (inLineComment) {
            if (ch === '\n') {
              inLineComment = false;
              result += '\n';
            }
            i++;
            continue;
          }

          // Strings
          if (inString) {
            result += ch;
            if (ch === '\\') {
              i++;
              if (i < len) result += code[i];
            } else if (ch === stringChar) {
              inString = false;
            }
            i++;
            continue;
          }

          // Detect strings
          if (ch === '"' || ch === "'" || ch === '`') {
            inString = true;
            stringChar = ch;
            result += ch;
            i++;
            continue;
          }

          // Detect comments
          if (ch === '/' && next === '/') {
            inLineComment = true;
            i += 2;
            continue;
          }
          if (ch === '/' && next === '*') {
            inBlockComment = true;
            i += 2;
            continue;
          }

          // Regular expression detection (simplified)
          if (ch === '/' && next !== '/' && next !== '*') {
            result += ch;
            i++;
            // Read until closing /, handle escape
            while (i < len) {
              if (code[i] === '\\') {
                result += code[i] + code[i + 1];
                i += 2;
              } else if (code[i] === '/') {
                result += code[i];
                i++;
                // flags
                while (i < len && /[gimsuy]/.test(code[i])) {
                  result += code[i];
                  i++;
                }
                break;
              } else {
                result += code[i];
                i++;
              }
            }
            continue;
          }

          // Handle whitespace
          if (/\s/.test(ch)) {
            // Skip whitespace but keep space between identifiers/numbers
            var prev = result.length > 0 ? result[result.length - 1] : '';
            // Look ahead for next non-space
            var j = i + 1;
            while (j < len && /\s/.test(code[j])) j++;
            var nextNonSpace = j < len ? code[j] : '';
            var prevIsIdent = /[a-zA-Z0-9_$]/.test(prev);
            var nextIsIdent = /[a-zA-Z0-9_$]/.test(nextNonSpace);
            var prevIsOp = /[+\-*/%=<>!&|^~?:]/.test(prev);
            var nextIsOp = /[+\-*/%=<>!&|^~?:]/.test(nextNonSpace);

            if (ch === '\n' && prev !== ';') {
              // Only add newline if it could separate statements
              result += ch;
            } else if ((prevIsIdent && nextIsIdent) ||
                       (prevIsIdent && nextIsOp) ||
                       (prevIsOp && nextIsIdent) ||
                       (prev === '+' && next === '+') ||
                       (prev === '-' && next === '-')) {
              result += ' ';
            }
            i = j;
            continue;
          }

          result += ch;
          i++;
        }

        // Final cleanup: remove unnecessary semicolons after closing braces
        result = result.replace(/}\s*;/g, '}');

        document.getElementById('jsOutput').value = result.trim();

    function beautifyJS() {
      try {
        var code = document.getElementById('jsInput').value;
        if (!code.trim()) {
          showToast('请输入 JavaScript 代码');
          return;
        }
        var result = '';
        var indent = 0;
        var indentStr = '  ';
        var i = 0;
        var len = code.length;
        var inString = false;
        var stringChar = '';
        var inLineComment = false;
        var inBlockComment = false;

        // First, normalize line endings
        code = code.replace(/\r\n/g, '\n');

        while (i < len) {
          var ch = code[i];
          var next = i + 1 < len ? code[i + 1] : '';

          if (inLineComment) {
            result += ch;
            if (ch === '\n') inLineComment = false;
            i++;
            continue;
          }

          if (inBlockComment) {
            result += ch;
            if (ch === '*' && next === '/') {
              result += next;
              inBlockComment = false;
              i += 2;
            } else {
              i++;
            }
            continue;
          }

          if (inString) {
            result += ch;
            if (ch === '\\') {
              i++;
              if (i < len) result += code[i];
            } else if (ch === stringChar) {
              inString = false;
            }
            i++;
            continue;
          }

          if (ch === '"' || ch === "'") {
            inString = true;
            stringChar = ch;
            result += ch;
            i++;
            continue;
          }

          if (ch === '/' && next === '/') {
            inLineComment = true;
            result += ch;
            i++;
            continue;
          }

          if (ch === '/' && next === '*') {
            inBlockComment = true;
            result += ch;
            i++;
            continue;
          }

          if (ch === '{') {
            result += ' {\n';
            indent++;
            i++;
            // Skip leading whitespace
            while (i < len && code[i] === ' ') i++;
            result += indentStr.repeat(indent);
            continue;
          }

          if (ch === '}') {
            indent = Math.max(0, indent - 1);
            // Remove trailing space
            result = result.replace(/\s+$/, '');
            result += '\n' + indentStr.repeat(indent) + '}\n';
            i++;
            // Add newline and indent after }
            while (i < len && code[i] === ' ') i++;
            if (i < len && code[i] !== '\n' && code[i] !== ';' && code[i] !== ')' && code[i] !== ']' && code[i] !== ',') {
              result += indentStr.repeat(indent);
            }
            continue;
          }

          if (ch === ';') {
            result += ';\n';
            i++;
            // Skip whitespace and add indent
            while (i < len && code[i] === ' ') i++;
            if (i < len && code[i] !== '}' && code[i] !== '\n') {
              result += indentStr.repeat(indent);
            }
            continue;
          }

          result += ch;
          i++;

        document.getElementById('jsOutput').value = result.trim();
        updateStats();
        showToast('格式化完成');
      } catch (e) {
        document.getElementById('jsOutput').value = '错误: ' + e.message;
        showToast('格式化失败: ' + e.message);
      }

        // Find var/let/const declarations
        var varRegex = /\b(var|let|const)\s+([a-zA-Z_$][a-zA-Z0-9_$]*)\b/g;
        var match;
        while ((match = varRegex.exec(minified)) !== null) {
          var vName = match[2];
          if (!nameMap[vName] && !/^(var|let|const|function|return|if|else|for|while|do|switch|case|break|continue|new|this|true|false|null|undefined|typeof|instanceof|in|of|try|catch|finally|throw|class|extends|import|export|default|from|async|await|yield|delete|void|with|debugger|super|static|get|set|console|Math|JSON|Array|Object|String|Number|Boolean|Date|RegExp|Error|Map|Set|Promise|Symbol|parseInt|parseFloat|isNaN|isFinite|encodeURI|decodeURI|encodeURIComponent|decodeURIComponent|eval|window|document|navigator|location|alert|confirm|prompt|setTimeout|setInterval|clearTimeout|clearInterval|requestAnimationFrame|fetch|XMLHttpRequest|localStorage|sessionStorage|addEventListener|removeEventListener|getElementById|querySelector|querySelectorAll|createElement|appendChild|innerHTML|textContent|className|style|getAttribute|setAttribute|log|error|warn|info)$/.test(vName)) {
            nameMap[vName] = '_0x' + counter.toString(16);
            counter++;
          }
        }

        var result = minified;
        // Replace variable names (sort by length descending to avoid partial replacements)
        var sortedNames = Object.keys(nameMap).sort(function(a, b) { return b.length - a.length; });
        for (var idx = 0; idx < sortedNames.length; idx++) {
          var origName = sortedNames[idx];
          var obfName = nameMap[origName];

        // Encode strings as hex
        result = result.replace(/(["'])([^"']{2,})\1/g, function(match, quote, str) {

            hex += '\\x' + ('0' + cc.toString(16)).slice(-2);

            return quote + hex + quote;

          return match;
