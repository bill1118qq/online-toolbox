      <h2>什么是代码压缩？</h2>
      <p>代码压缩（Minification）是去除源代码中不影响功能的多余字符，包括：</p>
      <ul>
        <li>多余的空格和缩进</li>
        <li>换行符</li>
        <li>代码注释</li>
        <li>不必要的分号</li>
      </ul>

      <h2>压缩效果对比</h2>
      <table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:0.9rem;">
        <tr style="background:#f0f2f5;"><th style="padding:10px;">文件类型</th><th style="padding:10px;">原始大小</th><th style="padding:10px;">Minify后</th><th style="padding:10px;">+Gzip</th></tr>
        <tr style="border-bottom:1px solid #eee;"><td style="padding:8px 10px;">HTML</td><td style="padding:8px 10px;">100%</td><td style="padding:8px 10px;">70-85%</td><td style="padding:8px 10px;">15-25%</td></tr>
        <tr style="border-bottom:1px solid #eee;"><td style="padding:8px 10px;">CSS</td><td style="padding:8px 10px;">100%</td><td style="padding:8px 10px;">65-80%</td><td style="padding:8px 10px;">15-20%</td></tr>
        <tr><td style="padding:8px 10px;">JavaScript</td><td style="padding:8px 10px;">100%</td><td style="padding:8px 10px;">50-70%</td><td style="padding:8px 10px;">15-25%</td></tr>
      </table>

      <h2>压缩注意事项</h2>
      <ul>
        <li><b>pre标签</b>：包含的空白是有意义的，不应被压缩</li>
        <li><b>script/style</b>：内部代码的空白需要保留</li>
        <li><b>IE条件注释</b>：如 `<!--[if lt IE 9]>` 不应去除</li>
        <li><b>源码管理</b>：压缩版本不要提交到版本库</li>
      </ul>
