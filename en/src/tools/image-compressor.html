<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; Home</a>
      <a href="../../src/tools/image-compressor.html" class="back-link" style="margin-left:12px;">中文</a>
      <h1>Image Compressor</h1>
    </div>

    <div id="dropZone" style="border: 2px dashed #ccc; border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; background: #fafafa; margin-bottom: 24px;">
      <p style="font-size: 1.1rem; color: #666;">Drag images here, or click to select files</p>
      <p style="font-size: 0.85rem; color: #999; margin-top: 8px;">Supports JPG, PNG, WebP. All processing is done locally</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple style="display: none;">
    </div>

    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
      <label style="font-weight: 600;">Compression Quality:</label>
      <input type="range" id="qualitySlider" min="10" max="100" value="80" style="flex: 1;">
      <span id="qualityValue" style="font-weight: 600; min-width: 40px;">80%</span>
    </div>

    <div id="results" style="display: flex; flex-direction: column; gap: 16px;"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const qualitySlider = document.getElementById('qualitySlider');
    const qualityValue = document.getElementById('qualityValue');
    const resultsDiv = document.getElementById('results');

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#4361ee'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = '#ccc'; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '#ccc';
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => handleFiles(fileInput.files));

    qualitySlider.addEventListener('input', () => {
      qualityValue.textContent = qualitySlider.value + '%';
    });

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.type.match(/^image\/(jpeg|png|webp)$/)) {
          showToast('Unsupported format: ' + file.name);
          return;
        }
        compressImage(file);
      });
    }

    function compressImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          const quality = qualitySlider.value / 100;
          const format = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
          const dataUrl = canvas.toDataURL(format, quality);

          const originalSize = file.size;
          const compressedBlob = dataURLtoBlob(dataUrl);
          const compressedSize = compressedBlob.size;
          const ratio = ((1 - compressedSize / originalSize) * 100).toFixed(1);

          const resultItem = document.createElement('div');
          resultItem.style.cssText = 'background: white; padding: 16px; border-radius: 8px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;';
          resultItem.innerHTML = `
            <img src="${dataUrl}" style="max-width: 80px; max-height: 80px; border-radius: 4px; object-fit: cover;">
            <div style="flex: 1; min-width: 200px;">
              <p style="font-weight: 600;">${file.name}</p>
              <p style="font-size: 0.85rem; color: #666;">
                Original: ${formatSize(originalSize)} &rarr; Compressed: ${formatSize(compressedSize)}
                <span style="color: ${ratio > 0 ? '#4caf50' : '#f44336'}; font-weight: 600;">
                  (${ratio > 0 ? '-' : '+'}${Math.abs(ratio)}%)
                </span>
              </p>
            </div>
            <a href="${dataUrl}" download="compressed_${file.name}" class="btn btn-primary" style="text-decoration: none;">Download</a>
          `;
          resultsDiv.prepend(resultItem);
          showToast('Compressed: ' + file.name);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function dataURLtoBlob(dataURL) {
      const parts = dataURL.split(',');
      const mime = parts[0].match(/:(.*?);/)[1];
      const bstr = atob(parts[1]);
      const u8arr = new Uint8Array(bstr.length);
      for (let i = 0; i < bstr.length; i++) u8arr[i] = bstr.charCodeAt(i);
      return new Blob([u8arr], { type: mime });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
