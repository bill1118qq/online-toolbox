  <script type="application/ld+json">
  {"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"What is URL encoding?","acceptedAnswer":{"@type":"Answer","text":"URL encoding (also called percent-encoding) converts unsafe characters in a URL into a % followed by two hexadecimal digits. For example, a space becomes %20 and the Chinese characters for 'hello' become %E4%BD%A0%E5%A5%BD. This ensures URLs only contain ASCII-safe characters."}},{"@type":"Question","name":"What is the difference between encodeURI and encodeURIComponent?","acceptedAnswer":{"@type":"Answer","text":"encodeURI encodes a full URL and does not encode reserved characters such as ://, ?, &, =. It is suitable for encoding an entire URL address. encodeURIComponent encodes all non-alphanumeric characters including reserved characters, making it suitable for encoding query parameter values."}},{"@type":"Question","name":"Why do Chinese characters need to be URL-encoded?","acceptedAnswer":{"@type":"Answer","text":"The URL standard only allows the ASCII character set (letters, numbers, and certain symbols). Chinese characters are Unicode and outside the ASCII range. Placing them directly in a URL may cause parsing errors or display issues. URL encoding converts them to ASCII-compatible %XX format."}},{"@type":"Question","name":"Is URL encoding safe for sensitive data?","acceptedAnswer":{"@type":"Answer","text":"This URL encoding tool runs entirely in your browser. No input data is sent to any server. All encoding and decoding operations are performed locally, ensuring no data leakage risk."}}]}

<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; Home</a>
      <a href="../../src/tools/url-encoder.html" class="back-link" style="margin-left:12px;">中文</a>
      <h1>URL Encoder/Decoder</h1>
    </div>

    <textarea id="input" placeholder="Enter text to encode or decode..."></textarea>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="encode()">Encode URI</button>
      <button class="btn btn-primary" onclick="decode()">Decode URI</button>
      <button class="btn btn-secondary" onclick="encodeComponent()">encodeURIComponent</button>
      <button class="btn btn-secondary" onclick="decodeComponent()">decodeURIComponent</button>
      <button class="btn btn-secondary" onclick="copyResult()">Copy Result</button>
    </div>

    <div id="result" class="result-box" style="min-height: 120px;"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) { showToast('Please enter some text'); return; }
      document.getElementById('result').textContent = encodeURI(text);
    }

    function decode() {
      const text = document.getElementById('input').value;
      if (!text) { showToast('Please enter some text'); return; }
      try {
        document.getElementById('result').textContent = decodeURI(text);
      } catch (e) {
        document.getElementById('result').textContent = 'Decode failed: ' + e.message;
      }
    }

    function encodeComponent() {
      const text = document.getElementById('input').value;
      if (!text) { showToast('Please enter some text'); return; }
      document.getElementById('result').textContent = encodeURIComponent(text);
    }

    function decodeComponent() {
      const text = document.getElementById('input').value;
      if (!text) { showToast('Please enter some text'); return; }
      try {
        document.getElementById('result').textContent = decodeURIComponent(text);
      } catch (e) {
        document.getElementById('result').textContent = 'Decode failed: ' + e.message;
      }
    }

    function copyResult() {
      const text = document.getElementById('result').textContent;
      if (!text) { showToast('Please generate a result first'); return; }
      navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard'));
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
