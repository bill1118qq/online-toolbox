  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Word Counter",
    "url": "https://eitools.cn/en/src/tools/word-counter.html",
    "description": "Free online word counter supporting English and Chinese text",
    "applicationCategory": "UtilityApplication",
    "operatingSystem": "All"
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How do I count the words in my text?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Simply paste your text into the input box. The tool will automatically count total characters, Chinese characters, English words, paragraphs, lines, and characters without spaces in real time. No button click needed."
        }
      },
      {
        "@type": "Question",
        "name": "How are Chinese and English words counted differently?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Chinese characters are counted individually, where each character counts as one word. English words are counted by splitting on spaces, where each space-separated group of letters counts as one word. This tool can recognize and count both languages separately."
        }
      },
      {
        "@type": "Question",
        "name": "When should I use a word counter?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Word counters are useful in many situations: checking if an essay meets a word limit, controlling character counts for social media posts, counting manuscript words for writers, optimizing article length for SEO, and comparing word counts in translation tasks."
        }
      },
      {
        "@type": "Question",
        "name": "Is the online word counter safe?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Completely safe. This word counter runs entirely in your browser locally. All text data is processed only on your device and is never uploaded to any server."
        }
      }
    ]
  }
  </script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HHMQZC85HG"></script>
<script src="../../js/analytics.js"></script>

<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; Home</a>
      <a href="../../src/tools/word-counter.html" class="back-link" style="margin-left:12px;">中文</a>
      <h1>Word Counter</h1>
    </div>

    <textarea id="textInput" placeholder="Type or paste your text here..." style="min-height: 200px;"></textarea>

    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; margin-top: 24px;">
      <div style="background: white; padding: 20px; border-radius: 12px; text-align: center;">
        <div id="totalChars" style="font-size: 2rem; font-weight: 700; color: #4361ee;">0</div>
        <div style="color: #666; font-size: 0.9rem;">Total Characters</div>
      </div>
      <div style="background: white; padding: 20px; border-radius: 12px; text-align: center;">
        <div id="chineseChars" style="font-size: 2rem; font-weight: 700; color: #4361ee;">0</div>
        <div style="color: #666; font-size: 0.9rem;">Chinese Characters</div>
      </div>
      <div style="background: white; padding: 20px; border-radius: 12px; text-align: center;">
        <div id="englishWords" style="font-size: 2rem; font-weight: 700; color: #4361ee;">0</div>
        <div style="color: #666; font-size: 0.9rem;">English Words</div>
      </div>
      <div style="background: white; padding: 20px; border-radius: 12px; text-align: center;">
        <div id="paragraphs" style="font-size: 2rem; font-weight: 700; color: #4361ee;">0</div>
        <div style="color: #666; font-size: 0.9rem;">Paragraphs</div>
      </div>
      <div style="background: white; padding: 20px; border-radius: 12px; text-align: center;">
        <div id="lines" style="font-size: 2rem; font-weight: 700; color: #4361ee;">0</div>
        <div style="color: #666; font-size: 0.9rem;">Lines</div>
      </div>
      <div style="background: white; padding: 20px; border-radius: 12px; text-align: center;">
        <div id="noSpaces" style="font-size: 2rem; font-weight: 700; color: #4361ee;">0</div>
        <div style="color: #666; font-size: 0.9rem;">Characters (no spaces)</div>
      </div>
    </div>
  </div>

  <div class="related-tools" style="margin-top:30px;padding:20px;background:#f8f9fa;border-radius:8px;">
    <h3>Related Tools</h3>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px;">
      <a href="base64.html" style="padding:6px 14px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;text-decoration:none;color:#4361ee;font-size:14px;">Base64 Encode/Decode</a>
      <a href="url-encoder.html" style="padding:6px 14px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;text-decoration:none;color:#4361ee;font-size:14px;">URL Encoder/Decoder</a>
    </div>
  </div>

  <script>
    const textInput = document.getElementById('textInput');

    textInput.addEventListener('input', countWords);

    function countWords() {
      const text = textInput.value;

      const totalChars = text.length;
      document.getElementById('totalChars').textContent = totalChars;

      const chineseMatch = text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g);
      document.getElementById('chineseChars').textContent = chineseMatch ? chineseMatch.length : 0;

      const englishWords = text.match(/[a-zA-Z]+/g);
      document.getElementById('englishWords').textContent = englishWords ? englishWords.length : 0;

      const paraList = text.split(/\n\s*\n/).filter(p => p.trim().length > 0);
      document.getElementById('paragraphs').textContent = paraList.length || (text.trim().length > 0 ? 1 : 0);

      document.getElementById('lines').textContent = text ? text.split('\n').length : 0;

      document.getElementById('noSpaces').textContent = text.replace(/\s/g, '').length;
    }
  </script>

</html>
