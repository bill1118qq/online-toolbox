<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; Home</a>
      <a href="../../src/tools/json-formatter.html" class="back-link" style="margin-left:12px;">中文</a>
      <h1>JSON Formatter</h1>
    </div>

    <textarea id="jsonInput" placeholder='Paste your JSON data here, e.g.: {"name": "John", "age": 25}'></textarea>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="formatJSON()">Format (Beautify)</button>
      <button class="btn btn-secondary" onclick="compressJSON()">Minify</button>
      <button class="btn btn-secondary" onclick="validateJSON()">Validate</button>
      <button class="btn btn-secondary" onclick="copyResult()">Copy Result</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>

    <div id="resultBox" class="result-box"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const input = document.getElementById('jsonInput');
    const resultBox = document.getElementById('resultBox');

    function formatJSON() {
      try {
        const parsed = JSON.parse(input.value);
        resultBox.textContent = JSON.stringify(parsed, null, 2);
        resultBox.style.borderColor = '#4caf50';
        showToast('Formatted successfully');
      } catch (e) {
        resultBox.textContent = 'Error: ' + e.message;
        resultBox.style.borderColor = '#f44336';
      }
    }

    function compressJSON() {
      try {
        const parsed = JSON.parse(input.value);
        resultBox.textContent = JSON.stringify(parsed);
        resultBox.style.borderColor = '#4caf50';
        showToast('Minified successfully');
      } catch (e) {
        resultBox.textContent = 'Error: ' + e.message;
        resultBox.style.borderColor = '#f44336';
      }
    }

    function validateJSON() {
      try {
        JSON.parse(input.value);
        resultBox.textContent = 'Valid JSON';
        resultBox.style.borderColor = '#4caf50';
        showToast('Validation passed');
      } catch (e) {
        resultBox.textContent = 'Invalid JSON: ' + e.message;
        resultBox.style.borderColor = '#f44336';
      }
    }

    function copyResult() {
      if (!resultBox.textContent) {
        showToast('No content to copy');
        return;
      }
      navigator.clipboard.writeText(resultBox.textContent).then(() => {
        showToast('Copied to clipboard');
      });
    }

    function clearAll() {
      input.value = '';
      resultBox.textContent = '';
      resultBox.style.borderColor = '#e0e0e0';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
