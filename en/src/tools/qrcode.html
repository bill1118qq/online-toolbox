<body>
  <div class="tool-page">
    <div class="tool-page-header">
      <a href="../../index.html" class="back-link">&larr; Home</a>
      <a href="../../src/tools/qrcode.html" class="back-link" style="margin-left:12px;">中文</a>
      <h1>QR Code Generator</h1>
    </div>

    <textarea id="qrInput" placeholder="Enter text or URL, e.g., https://example.com" style="min-height: 80px;"></textarea>

    <div class="btn-group">
      <button class="btn btn-primary" onclick="generateQR()">Generate QR Code</button>
      <button class="btn btn-secondary" onclick="downloadQR()">Download</button>
      <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    </div>

    <div style="text-align: center; margin-top: 24px;">
      <canvas id="qrCanvas" style="display: none; border: 1px solid #e0e0e0; border-radius: 8px;"></canvas>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const qrInput = document.getElementById('qrInput');
    const qrCanvas = document.getElementById('qrCanvas');

    function generateQR() {
      const text = qrInput.value.trim();
      if (!text) {
        showToast('Please enter some content');
        return;
      }

      try {
        const qr = qrcode(0, 'M');
        qr.addData(text);
        qr.make();

        const moduleCount = qr.getModuleCount();
        const cellSize = Math.max(4, Math.floor(300 / moduleCount));
        const size = moduleCount * cellSize;

        qrCanvas.width = size;
        qrCanvas.height = size;
        qrCanvas.style.display = 'inline-block';

        const ctx = qrCanvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = '#1a1a2e';
        for (let row = 0; row < moduleCount; row++) {
          for (let col = 0; col < moduleCount; col++) {
            if (qr.isDark(row, col)) {
              ctx.fillRect(col * cellSize, row * cellSize, cellSize, cellSize);
            }
          }
        }

        showToast('QR code generated successfully');
      } catch (e) {
        showToast('Generation failed: ' + e.message);
      }
    }

    function downloadQR() {
      if (qrCanvas.style.display === 'none') {
        showToast('Please generate a QR code first');
        return;
      }
      const link = document.createElement('a');
      link.download = 'qrcode.png';
      link.href = qrCanvas.toDataURL('image/png');
      link.click();
      showToast('Downloaded successfully');
    }

    function clearAll() {
      qrInput.value = '';
      qrCanvas.style.display = 'none';
    }

    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
